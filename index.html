<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROP MGR - Management Suite</title>
    <!-- 1. React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 2. Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 3. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="module">
        // --- FIREBASE MODULAR SDK ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useMemo, useEffect, useRef } = window.React;

        // --- ICON SYSTEM ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const paths = {
                Building2: <><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></>,
                LayoutGrid: <><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></>,
                BellRing: <><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></>,
                LayoutDashboard: <><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></>,
                Receipt: <><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5V6.5"/></>,
                Wallet: <><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></>,
                ChevronLeft: <path d="m15 18-6-6 6-6"/>,
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                ChevronUp: <path d="m18 15-6-6-6 6"/>,
                ChevronDown: <path d="m6 9 6 6 6-6"/>,
                Plus: <path d="M12 5v14M5 12h14"/>,
                PlusCircle: <><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></>,
                Home: <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 22V12h6v10"/>,
                Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                CheckCircle2: <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
                AlertTriangle: <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></>,
                User: <><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></>,
                Settings: <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>,
                History: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5M12 7v5l4 2"/></>,
                Trash: <><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></>,
                X: <path d="M18 6 6 18M6 6l12 12"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyASq1ntgInCnv4ZBL0b1KZxcSTS8HzmcJI",
            authDomain: "propertycal1.firebaseapp.com",
            projectId: "propertycal1",
            storageBucket: "propertycal1.firebasestorage.app",
            messagingSenderId: "39254504887",
            appId: "1:39254504887:web:368ca09e2a2b1b46376432"
        };

        // Detect if we are in Canvas or Live
        const configToUse = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
        const app = initializeApp(configToUse);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Path logic
        const envAppId = typeof __app_id !== 'undefined' ? __app_id : 'prop-mgr-v2-main';
        const urlParams = new URLSearchParams(window.location.search);
        const urlUser = urlParams.get('user') || 'manager_1';
        const TODAY = new Date(2026, 2, 21);

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('calendar');
            const [selectedProperty, setSelectedProperty] = useState('All');
            const [viewDate, setViewDate] = useState(new Date(2026, 2, 1));
            
            // Safety Ref: Only sync to cloud if we've successfully downloaded initial data
            const isReadyToSync = useRef(false);

            const [rooms, setRooms] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [paymentLog, setPaymentLog] = useState({});
            const [utilityLog, setUtilityLog] = useState({});
            const [properties, setProperties] = useState(['Property A', 'Property B']);

            const [showModal, setShowModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [showLedgerInModal, setShowLedgerInModal] = useState(false);
            const [formData, setFormData] = useState({ 
                guestName: '', contact: '', room: '', property: '', start: '', end: '', monthlyRate: 5000, isFixedPrice: false, manualStatus: 'auto'
            });

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const isTodayVisible = TODAY.getFullYear() === year && TODAY.getMonth() === month;
            const todayDay = TODAY.getDate();

            // --- HELPERS ---
            const toISODate = (date) => date.toLocaleDateString('sv-SE');
            const getMonthYearShort = (date) => `${new Intl.DateTimeFormat('en-US', { month: 'short' }).format(date).toUpperCase()} ${date.getFullYear()}`;
            const formatBarDate = (dateStr) => {
                if (!dateStr) return '...';
                const d = new Date(dateStr);
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                return `${d.getDate()}${months[d.getMonth()]}`;
            };

            // --- PERSISTENCE ---
            useEffect(() => {
                const initAuth = async () => {
                    const cred = await signInAnonymously(auth);
                    setUser(cred.user);
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const docRef = doc(db, 'artifacts', envAppId, 'public', 'data', 'propertyData', urlUser);
                
                const unsub = onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        const d = snap.data();
                        setBookings(d.bookings || []);
                        setRooms(d.rooms || []);
                        setPaymentLog(d.paymentLog || {});
                        setUtilityLog(d.utilityLog || {});
                        setProperties(d.properties || ['Property A', 'Property B']);
                    } else {
                        // Create initial data if brand new user
                        const initR = Array.from({ length: 12 }, (_, i) => ({ id: `r${i}`, name: `${101 + i}`, property: 'Property A' }));
                        setDoc(docRef, { rooms: initR, properties: ['Property A', 'Property B'], bookings: [], paymentLog: {}, utilityLog: {} });
                    }
                    isReadyToSync.current = true;
                }, (err) => console.error("Snapshot error:", err));
                
                return () => unsub();
            }, [user]);

            const sync = async (update) => {
                if (!user || !isReadyToSync.current) return;
                const docRef = doc(db, 'artifacts', envAppId, 'public', 'data', 'propertyData', urlUser);
                await setDoc(docRef, update, { merge: true });
            };

            // --- CALCULATIONS ---
            const getPaymentSchedule = (booking) => {
                if (!booking || !booking.start || !booking.end) return [];
                const start = new Date(booking.start), end = new Date(booking.end);
                const schedule = [];
                let current = new Date(start.getFullYear(), start.getMonth(), 1);
                let isFirst = true;
                while (current <= end) {
                    const cY = current.getFullYear(), cM = current.getMonth();
                    const mD = new Date(cY, cM + 1, 0).getDate();
                    const sInM = cM === start.getMonth() && cY === start.getFullYear() ? start.getDate() : 1;
                    const eInM = cM === end.getMonth() && cY === end.getFullYear() ? end.getDate() : mD + 1;
                    const days = Math.max(0, eInM - sInM);
                    if (days > 0) {
                        let rent = booking.isFixedPrice ? (isFirst ? booking.monthlyRate : 0) : Math.round((days >= mD ? booking.monthlyRate : (booking.monthlyRate / mD) * days));
                        isFirst = false;
                        const key = `${booking.id}_${cM}_${cY}`;
                        const util = utilityLog[key] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 200 };
                        let utilOwed = util.elecEnd > 0 ? Math.round(Math.max(0, (util.elecEnd - util.elecStart) * util.elecRate) + util.water) : 0;
                        const paid = (paymentLog[key] || []).reduce((s, p) => s + p.amount, 0);
                        schedule.push({ monthIndex: cM, year: cY, label: new Intl.DateTimeFormat('en-US', { month: 'short' }).format(current), rent, utilOwed, owed: rent + utilOwed, paid, util });
                    }
                    current = new Date(cY, cM + 1, 1);
                }
                return schedule;
            };

            const filteredRooms = rooms.filter(r => selectedProperty === 'All' || r.property === selectedProperty);
            const filteredBookings = bookings.filter(b => rooms.some(r => r.name === b.room && (selectedProperty === 'All' || r.property === selectedProperty)));

            const getStatus = (b) => {
                if (b.manualStatus === 'checked-in') return { label: 'In', icon: 'Home', color: 'text-emerald-500' };
                if (b.manualStatus === 'checked-out') return { label: 'Out', icon: 'CheckCircle2', color: 'text-slate-400' };
                const s = new Date(b.start), e = new Date(b.end);
                if (TODAY < s) return { label: 'Future', icon: 'Clock', color: 'text-blue-500' };
                if (TODAY >= s && TODAY < e) return { label: 'In', icon: 'Home', color: 'text-emerald-500' };
                return { label: 'Out', icon: 'CheckCircle2', color: 'text-slate-400' };
            };

            const getBarColor = (b, bal) => {
                const s = getStatus(b);
                if (s.label === 'Out') return 'bg-slate-400';
                if (s.label === 'Future') return 'bg-blue-600';
                return bal > 0 ? 'bg-rose-600' : 'bg-emerald-600';
            };

            const handleSaveBooking = async (e) => {
                e.preventDefault();
                const newB = editingId ? bookings.map(b => b.id === editingId ? { ...formData, id: editingId } : b) : [...bookings, { ...formData, id: Date.now().toString(), manualStatus: 'auto' }];
                setBookings(newB); 
                await sync({ bookings: newB }); 
                setShowModal(false);
            };

            const addPayLocal = async (bookingId, m, y, amount) => {
                if (!amount || amount <= 0) return;
                const key = `${bookingId}_${m}_${y}`;
                const newLog = { ...paymentLog, [key]: [...(paymentLog[key] || []), { amount: Math.round(Number(amount)), date: toISODate(new Date()) }] };
                setPaymentLog(newLog); await sync({ paymentLog: newLog });
            };

            return (
                <div className="min-h-screen text-slate-900 bg-slate-100 font-sans p-1 pb-20">
                    <div className="max-w-[1800px] mx-auto">
                        
                        {/* HEADER */}
                        <div className="flex flex-wrap justify-between items-center mb-1 gap-1 bg-white p-1 rounded-2xl shadow-sm border border-slate-300">
                            <div className="flex items-center gap-3 pl-1">
                                <div className="flex items-center gap-2">
                                    <div className="bg-indigo-800 p-1.5 rounded-xl text-white shadow-sm"><Icon name="Building2" size={20} /></div>
                                    <h1 className="text-[14px] font-black tracking-tighter uppercase mr-3">PROP MGR</h1>
                                </div>
                                <div className="flex items-center bg-slate-100 p-0.5 rounded-xl border border-slate-200 gap-0.5">
                                    <button onClick={() => setActiveTab('calendar')} className={`flex items-center gap-1.5 px-4 py-1.5 rounded-lg text-[11px] font-black transition-all ${activeTab === 'calendar' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                                        <Icon name="LayoutGrid" size={14} /> CALENDAR
                                    </button>
                                    <button onClick={() => setActiveTab('reminders')} className={`flex items-center gap-1.5 px-4 py-1.5 rounded-lg text-[11px] font-black transition-all ${activeTab === 'reminders' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                                        <Icon name="BellRing" size={14} /> TASKS
                                    </button>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 pr-1">
                                <div className="flex items-center gap-1 bg-slate-100 px-2 py-1 rounded-xl border border-slate-200">
                                    <select className="bg-transparent text-[11px] font-black text-indigo-700 outline-none cursor-pointer" value={selectedProperty} onChange={e => setSelectedProperty(e.target.value)}>
                                        <option value="All">All View</option>
                                        {properties.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                    <button onClick={() => setShowSettings(true)} className="p-1 text-slate-400 hover:text-indigo-600 transition-colors"><Icon name="Settings" size={14} /></button>
                                </div>
                            </div>
                        </div>

                        {activeTab === 'calendar' && (
                            <div className="space-y-1 animate-in fade-in duration-300">
                                <div className="flex flex-wrap items-center justify-between px-2 py-1">
                                    <div className="flex items-center gap-2 bg-white/60 border border-slate-300 px-3 py-1.5 rounded-xl shadow-sm text-[10px] font-bold text-slate-500 uppercase">
                                        <div className="flex items-center gap-1"><Icon name="Home" size={12} className="text-emerald-500" /> IN</div>
                                        <div className="flex items-center gap-1"><Icon name="Clock" size={12} className="text-blue-500" /> FUT</div>
                                        <div className="w-px h-3 bg-slate-300 mx-1" />
                                        <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-rose-500" /> OWES</div>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <div className="flex items-center bg-white p-0.5 rounded-xl border border-slate-300 shadow-sm">
                                            <button onClick={() => setViewDate(new Date(year, month-1, 1))} className="pl-3 pr-2 py-1 hover:bg-slate-50 flex items-center gap-1.5 text-[10px] font-black text-slate-400 transition-colors group">
                                                <Icon name="ChevronLeft" size={14} className="group-hover:text-indigo-600"/> <span>PREV</span>
                                            </button>
                                            <span className="font-black px-4 min-w-[110px] text-center text-[12px] uppercase text-indigo-700 bg-indigo-50/50 py-1.5 rounded-lg">{getMonthYearShort(viewDate)}</span>
                                            <button onClick={() => setViewDate(new Date(year, month+1, 1))} className="pl-2 pr-3 py-1 hover:bg-slate-50 flex items-center gap-1.5 text-[10px] font-black text-slate-400 transition-colors group">
                                                <span>NEXT</span> <Icon name="ChevronRight" size={14} className="group-hover:text-indigo-600"/>
                                            </button>
                                        </div>
                                        <button onClick={() => { setEditingId(null); setFormData({guestName:'', contact:'', room: (filteredRooms[0]?.name || ''), property: (filteredRooms[0]?.property || properties[0]), start:toISODate(TODAY), end:toISODate(new Date(TODAY.getTime() + 86400000)), monthlyRate: 5000, isFixedPrice: false, manualStatus:'auto'}); setShowModal(true); }} className="bg-indigo-600 text-white px-4 py-1.5 rounded-xl font-black text-[12px] shadow-md hover:bg-indigo-700 transition-all active:scale-95">+ NEW STAY</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-xl border-2 border-slate-400 overflow-hidden relative">
                                    <div className="overflow-x-auto">
                                        <div className="min-w-[1200px] relative">
                                            {/* GRID HEADER */}
                                            <div className="grid border-b-2 border-slate-400 bg-slate-50 sticky top-0 z-40" style={{ gridTemplateColumns: `85px repeat(${daysInMonth}, 1fr)` }}>
                                                <div className="p-1 font-black text-slate-400 text-[11px] uppercase border-r-2 border-slate-400 sticky left-0 z-50 bg-slate-50 text-center flex items-center justify-center">Unit</div>
                                                {Array.from({length: daysInMonth}).map((_,i) => {
                                                    const isToday = isTodayVisible && (i+1) === todayDay;
                                                    return (
                                                        <div key={i} className={`py-1 text-center border-r border-slate-300 relative ${isToday ? 'bg-indigo-600/10' : ''}`}>
                                                            <span className={`text-[10px] font-bold uppercase ${isToday ? 'text-indigo-600' : 'text-slate-400'}`}>{new Date(year, month, i+1).toLocaleDateString('en',{weekday:'short'}).charAt(0)}</span>
                                                            <span className={`text-[12px] font-black block ${isToday ? 'text-indigo-700 animate-pulse underline underline-offset-2' : 'text-slate-700'}`}>{i+1}</span>
                                                            {isToday && <div className="absolute inset-y-0 right-0 w-[1px] bg-indigo-500/30 z-0" />}
                                                        </div>
                                                    );
                                                })}
                                            </div>

                                            {/* ROWS */}
                                            {filteredRooms.map(r => (
                                                <div key={r.id} className="grid border-b border-slate-300 last:border-0 relative min-h-[52px]" style={{ gridTemplateColumns: `85px repeat(${daysInMonth}, 1fr)` }}>
                                                    <div className="p-1 sticky left-0 z-30 bg-white border-r-2 border-slate-400 flex flex-col items-center justify-center shadow-lg">
                                                        <span className="font-black text-[13px] text-slate-700 leading-none">{r.name}</span>
                                                        <span className="text-[7px] font-black text-slate-300 uppercase mt-1 tracking-tighter">{r.property.split(' ').pop()}</span>
                                                    </div>
                                                    {Array.from({length: daysInMonth}).map((_,i) => (
                                                        <div key={i} className={`border-r border-slate-200 last:border-0 ${isTodayVisible && (i+1) === todayDay ? 'bg-indigo-600/5 border-x-2 border-indigo-400/10' : ''}`} />
                                                    ))}
                                                    {filteredBookings.filter(b => b.room === r.name).map(booking => {
                                                        const sch = getPaymentSchedule(booking).find(s => s.monthIndex === month && s.year === year);
                                                        const bal = sch ? Math.round(sch.owed - sch.paid) : 0;
                                                        const s = getStatus(booking);
                                                        const bS = new Date(booking.start), bE = new Date(booking.end);
                                                        const mS = new Date(year, month, 1), mE = new Date(year, month, daysInMonth);
                                                        if (bE <= mS || bS > mE) return null;
                                                        const startCol = Math.max(1, (bS.getMonth() === month && bS.getFullYear() === year ? bS.getDate() : 1));
                                                        const endCol = Math.min(daysInMonth, (bE.getMonth() === month && bE.getFullYear() === year ? bE.getDate() : daysInMonth));
                                                        return (
                                                            <div key={booking.id} onClick={(e) => { e.stopPropagation(); setEditingId(booking.id); setFormData({...booking}); setShowModal(true); }} className={`absolute inset-y-1.5 border border-white/20 flex items-center px-3 z-20 cursor-pointer shadow-md rounded-xl ${getBarColor(booking, bal)}`} style={{ gridColumnStart: startCol+1, gridColumnEnd: endCol+2, left: '1px', right: '1px' }}>
                                                                <div className="flex items-center gap-2 w-full text-white whitespace-nowrap overflow-hidden font-black text-[13px] tracking-tight uppercase">
                                                                    <div className={`w-3 h-3 rounded-full border border-white/40 shrink-0 ${bal <= 0 ? 'bg-emerald-400' : 'bg-rose-100 animate-pulse'}`} />
                                                                    <Icon name={s.icon} size={15} className="shrink-0 opacity-90" />
                                                                    <span className="truncate">{booking.guestName}</span>
                                                                    <span className="opacity-40 font-normal">|</span>
                                                                    <span className="shrink-0">{formatBarDate(booking.start)} - {formatBarDate(booking.end)}</span>
                                                                    <span className="opacity-40 font-normal">|</span>
                                                                    <span className="shrink-0 font-bold">{bal > 0 ? `฿${bal.toLocaleString()}` : "PAID ✓"}</span>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TASK VIEW (Simplified for Persistence Check) */}
                        {activeTab === 'reminders' && (
                            <div className="p-8 text-center bg-white rounded-3xl m-2 border-2 border-slate-200">
                                <Icon name="BellRing" size={48} className="mx-auto text-slate-300 mb-4" />
                                <h2 className="text-xl font-black text-slate-400 uppercase tracking-widest">Tasks & Maintenance</h2>
                                <p className="text-slate-400 mt-2">Active database connection confirmed.</p>
                            </div>
                        )}

                        {/* GUEST MODAL */}
                        {showModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 overflow-y-auto">
                                <div className="bg-white rounded-[2rem] w-full max-w-lg shadow-2xl overflow-hidden my-auto animate-in zoom-in duration-200">
                                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                                        <h2 className="text-[12px] font-black uppercase tracking-widest pl-2">{editingId ? 'Profile' : 'New Guest'}</h2>
                                        <button onClick={() => setShowModal(false)} className="p-2 text-slate-400 hover:text-rose-500"><Icon name="X" size={24}/></button>
                                    </div>
                                    <form onSubmit={handleSaveBooking} className="p-4 space-y-3">
                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="text" required placeholder="Guest Name" className="bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[14px] focus:bg-white outline-none" value={formData.guestName} onChange={e=>setFormData({...formData, guestName:e.target.value})} />
                                            <input type="text" placeholder="Contact/WA" className="bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[14px] focus:bg-white outline-none" value={formData.contact} onChange={e=>setFormData({...formData, contact:e.target.value})} />
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 flex items-center gap-3">
                                            <span className="text-[11px] font-black text-slate-400 uppercase shrink-0">Unit:</span>
                                            <select 
                                                className="flex-1 bg-transparent font-black text-[14px] text-indigo-700 outline-none" 
                                                value={formData.room} 
                                                onChange={e => {
                                                    const r = rooms.find(x => x.name === e.target.value);
                                                    setFormData({...formData, room: e.target.value, property: r ? r.property : properties[0]});
                                                }}
                                            >
                                                {rooms.map(r => <option key={r.id} value={r.name}>{r.name} ({r.property})</option>)}
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div><label className="text-[10px] font-black text-slate-400 uppercase ml-2">In</label><input type="date" required className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[14px]" value={formData.start} onChange={e=>setFormData({...formData, start:e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400 uppercase ml-2">Out</label><input type="date" required className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[14px]" value={formData.end} onChange={e=>setFormData({...formData, end:e.target.value})} /></div>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 flex justify-between items-center">
                                            <span className="text-[11px] font-black text-slate-400 uppercase">Status Override:</span>
                                            <div className="flex gap-1">
                                                {['auto', 'checked-in', 'checked-out'].map(s => (
                                                    <button key={s} type="button" onClick={() => setFormData({...formData, manualStatus: s})} className={`px-2.5 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all ${formData.manualStatus === s ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-400'}`}>{s}</button>
                                                ))}
                                            </div>
                                        </div>
                                        {editingId && (
                                            <div className="border-t border-slate-100 pt-3">
                                                <button type="button" onClick={() => setShowLedgerInModal(!showLedgerInModal)} className="w-full flex items-center justify-between p-3 bg-indigo-600 text-white rounded-xl shadow-lg font-black text-[12px] uppercase">
                                                    <div className="flex items-center gap-2"><Icon name="History" size={16} /><span>Ledger & Payments</span></div>
                                                    <Icon name={showLedgerInModal ? "ChevronUp" : "ChevronDown"} size={20}/>
                                                </button>
                                                {showLedgerInModal && (
                                                    <div className="mt-3 space-y-2 max-h-[300px] overflow-y-auto">
                                                        {getPaymentSchedule(formData).map((mon, idx) => {
                                                            const key = `${editingId}_${mon.monthIndex}_${mon.year}`;
                                                            return (
                                                                <div key={idx} className="bg-slate-50 border border-slate-200 rounded-2xl p-3 space-y-2 shadow-sm">
                                                                    <div className="flex justify-between items-center text-[12px] font-black uppercase border-b border-slate-200 pb-2">
                                                                        <span className="text-indigo-600">{mon.label} {mon.year}</span>
                                                                        <span className={mon.paid >= mon.owed ? 'text-emerald-600' : 'text-rose-600'}>Owed: ฿{(mon.owed-mon.paid).toLocaleString()}</span>
                                                                    </div>
                                                                    <div className="flex gap-2">
                                                                        <input type="number" id={`pay-${idx}`} className="flex-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-[14px] font-black outline-none" placeholder="฿ amount" />
                                                                        <button type="button" onClick={()=>{const el=document.getElementById(`pay-${idx}`); addPayLocal(editingId, mon.monthIndex, mon.year, el.value); el.value='';}} className="bg-slate-900 text-white p-2.5 rounded-xl active:scale-90 transition-all"><Icon name="PlusCircle" size={20}/></button>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                        <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl hover:bg-indigo-700 transition-all">Update Database</button>
                                        {editingId && <button type="button" onClick={async () => { if(confirm('Delete permanently?')) { const n=bookings.filter(b=>b.id!==editingId); setBookings(n); await sync({bookings:n}); setShowModal(false); } }} className="w-full text-slate-300 font-bold text-[10px] uppercase mt-2">Delete Stay</button>}
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* SETTINGS */}
                        {showSettings && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2">
                                <div className="bg-white rounded-[2rem] w-full max-w-lg shadow-2xl overflow-hidden my-auto animate-in zoom-in">
                                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                                        <h2 className="text-[12px] font-black uppercase pl-2">System Config</h2>
                                        <button onClick={() => setShowSettings(false)} className="p-2 text-slate-400 hover:text-slate-600"><Icon name="X" size={24}/></button>
                                    </div>
                                    <div className="p-4 space-y-6 max-h-[70vh] overflow-y-auto">
                                        <section className="space-y-2">
                                            <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest border-b pb-1 ml-1">Properties</h3>
                                            {properties.map((p, i) => (
                                                <div key={i} className="flex gap-2">
                                                    <input type="text" className="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[14px]" value={p} onChange={e => {
                                                        const n = [...properties]; n[i] = e.target.value; setProperties(n); sync({properties: n});
                                                    }} />
                                                    <button onClick={() => { if(confirm('Delete?')) { const n = properties.filter((_, idx) => idx !== i); setProperties(n); sync({properties: n}); } }} className="p-2.5 text-rose-500 hover:bg-rose-50 rounded-xl"><Icon name="Trash" size={18} /></button>
                                                </div>
                                            ))}
                                            <button onClick={() => { const n = [...properties, `New Prop`]; setProperties(n); sync({properties: n}); }} className="w-full py-2.5 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-black text-[10px] uppercase tracking-widest">+ ADD PROPERTY</button>
                                        </section>
                                        <section className="space-y-2">
                                            <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest border-b pb-1 ml-1">Units</h3>
                                            {rooms.map(r => (
                                                <div key={r.id} className="grid grid-cols-2 gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-200 items-center">
                                                    <div className="flex flex-col">
                                                        <span className="text-[8px] font-bold text-slate-400 uppercase ml-1">ID</span>
                                                        <input type="text" className="bg-white p-1.5 rounded-lg font-black text-[13px] border border-slate-200" value={r.name} onChange={e => {
                                                            const n = rooms.map(x => x.id === r.id ? {...x, name: e.target.value} : x);
                                                            setRooms(n); sync({rooms: n});
                                                        }} />
                                                    </div>
                                                    <div className="flex gap-2 items-end">
                                                        <div className="flex flex-col flex-1">
                                                            <span className="text-[8px] font-bold text-slate-400 uppercase ml-1">Property</span>
                                                            <select className="bg-white p-1.5 rounded-lg font-black text-[11px] border border-slate-200" value={r.property} onChange={e => {
                                                                const n = rooms.map(x => x.id === r.id ? {...x, property: e.target.value} : x);
                                                                setRooms(n); sync({rooms: n});
                                                            }}>
                                                                {properties.map(p => <option key={p} value={p}>{p}</option>)}
                                                            </select>
                                                        </div>
                                                        <button onClick={() => { if(confirm('Delete unit?')) { const n = rooms.filter(x => x.id !== r.id); setRooms(n); sync({rooms: n}); } }} className="p-2 text-rose-400 hover:bg-rose-50 rounded-xl"><Icon name="Trash" size={16} /></button>
                                                    </div>
                                                </div>
                                            ))}
                                            <button onClick={() => { const n = [...rooms, { id: `r${Date.now()}`, name: 'NEW', property: properties[0] }]; setRooms(n); sync({rooms: n}); }} className="w-full py-2.5 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-black text-[10px] uppercase tracking-widest">+ ADD UNIT</button>
                                        </section>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://loren-6q.github.io/WETNav/nav.js"></script>
</body>
</html>
