            // --- HELPERS (CORE SCOPE) ---

            const daysInView = useMemo(() => {

            const calendarDays = useMemo(() => {

            const shiftCalendar = (offset) => {
                const n = new Date(calendarStart);

            };

            const getPaymentSchedule = (booking) => {
                if (!booking || !booking.start || !booking.end) return [];
                const start = new Date(booking.start), end = new Date(booking.end);
                const schedule = [];
                let current = new Date(start.getFullYear(), start.getMonth(), 1);
                let isFirst = true;
                while (current <= end) {
                    const cY = current.getFullYear(), cM = current.getMonth();
                    const mD = new Date(cY, cM + 1, 0).getDate();
                    const sDay = (cM === start.getMonth() && cY === start.getFullYear()) ? start.getDate() : 1;
                    const eDay = (cM === end.getMonth() && cY === end.getFullYear()) ? end.getDate() : mD + 1;
                    const days = Math.max(0, eDay - sDay);
                    if (days > 0) {
                        let rent = booking.isFixedPrice ? (isFirst ? (Number(booking.monthlyRate) || 0) : 0) : Number(((days >= mD ? (Number(booking.monthlyRate) || 0) : ((Number(booking.monthlyRate) || 0) / mD) * days)).toFixed(2));
                        const key = `${booking.id}_${cM}_${cY}`;
                        const util = utilityLog[key] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 0, otherAmt: 0, otherNote: '' };
                        const electricOwed = util.elecEnd > 0 ? Number((Math.max(0, (util.elecEnd - util.elecStart) * (Number(util.elecRate) || 8))).toFixed(2)) : 0;
                        const waterOwed = Number(Number(util.water || 0).toFixed(2));
                        const otherOwed = Number(Number(util.otherAmt || 0).toFixed(2));
                        const owed = Number((rent + electricOwed + waterOwed + otherOwed).toFixed(2));
                        const paid = (paymentLog[key] || []).reduce((s, p) => s + (Number(p.amount) || 0), 0);
                        schedule.push({ monthIndex: cM, year: cY, label: mosEn[cM], rent, electricOwed, waterOwed, otherOwed, otherNote: util.otherNote, owed, paid, util, dueDate: toISODate(new Date(cY, cM, isFirst ? start.getDate() : 1)) });
                        isFirst = false;
                    }
                    current = new Date(cY, cM + 1, 1);
                }
                return schedule;
            };

            const filteredRooms = rooms.filter(r => selectedProperty === 'All' || r.property === selectedProperty);
            const filteredBookings = bookings.filter(b => rooms.some(r => r.name === b.room && (selectedProperty === 'All' || r.property === selectedProperty)));
            
            const groupedRooms = useMemo(() => {
                const props = selectedProperty === 'All' ? properties : [selectedProperty];
                return props.map(p => ({ 
                    name: p, 
                    rooms: filteredRooms.filter(r => r.property === p).sort((a,b) => (a?.name || "").localeCompare(b?.name || "", undefined, {numeric: true})) 
                })).filter(g => g.rooms.length > 0);
            }, [filteredRooms, properties, selectedProperty]);

            const { currentBills, historyBills, filteredBills } = useMemo(() => {
                let curr = [];
                let hist = [];
                let allFiltered = [];
                const thirtyDaysMs = 30 * 24 * 60 * 60 * 1000;
                const todayMs = TODAY.getTime();
                const minDate = todayMs - thirtyDaysMs;
                const maxDate = todayMs + thirtyDaysMs;

                bills.forEach(bill => {
                    if (selectedProperty !== 'All' && bill.property !== selectedProperty) return;
                    if (selectedBillCategory !== 'All' && bill.category !== selectedBillCategory) return;
                    
                    const paid = (bill.payments || []).reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
                    const bal = (Number(bill.amount) || 0) - paid;
                    
                    if (billStatusFilter === 'Paid' && bal > 0) return;
                    if (billStatusFilter === 'Unpaid' && bal <= 0) return;

                    allFiltered.push(bill);

                    const bDate = new Date(bill.dueDate).getTime();
                    
                    // CURRENT includes: Overdue bills OR any bill within +/- 30 days of today
                    const isOverdue = (bal > 0 && bDate < todayMs);
                    const isWithinWindow = (bDate >= minDate && bDate <= maxDate);
                    
                    let isCurrent = isOverdue || isWithinWindow;

                    // Future toggle includes EVERYTHING beyond the 30 day window
                    if (showFutureBills && bDate > maxDate) {
                        isCurrent = true;
                    }

                    if (isCurrent) {
                        curr.push(bill);
                    } else if (bDate < minDate) {
                        // HISTORY includes everything strictly older than 30 days (that isn't overdue)
                        hist.push(bill);
                    }
                });

                curr.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));
                hist.sort((a,b) => new Date(b.dueDate) - new Date(a.dueDate)); 
                return { currentBills: curr, historyBills: hist, filteredBills: allFiltered };
            }, [bills, selectedProperty, selectedBillCategory, billStatusFilter, showFutureBills]);

            const accountingData = useMemo(() => {
                let totalIncome = 0; let totalExpense = 0;
                let totalPendingIn = 0; let totalPendingOut = 0;
                let currentMonthIncome = 0; let currentMonthExpense = 0;
                let currentMonthPendingIn = 0; let currentMonthPendingOut = 0;
                
                const currentM = TODAY.getMonth();
                const currentY = TODAY.getFullYear();
                const endOfCurrentMonth = new Date(currentY, currentM + 1, 0, 23, 59, 59).getTime();

                const historyMap = {};
                const visibleBookingIds = new Set(filteredBookings.map(b => b.id));
                const bookingLookup = {}; filteredBookings.forEach(b => bookingLookup[b.id] = b);
                
                // 1. Calculate Bookings Pending In
                filteredBookings.forEach(b => {
                    const schedule = getPaymentSchedule(b);
                    schedule.forEach(s => {
                        const pending = Math.max(0, s.owed - s.paid);
                        if (pending > 0) {
                            const sDate = new Date(s.dueDate).getTime();
                            if (sDate <= endOfCurrentMonth) totalPendingIn += pending;
                            if (s.monthIndex === currentM && s.year === currentY) currentMonthPendingIn += pending;
                        }
                    });
                });

                // 2. Calculate Income (PaymentLog)
                Object.entries(paymentLog).forEach(([key, pays]) => {
                    const parts = key.split('_');
                    if (parts.length === 3 && visibleBookingIds.has(parts[0])) {
                        const b = bookingLookup[parts[0]];
                        if (!b) return;
                        const m = parseInt(parts[1]), y = parseInt(parts[2]), hKey = `${m}_${y}`;
                        pays.forEach(p => { 
                            if (!historyMap[hKey]) historyMap[hKey] = { inc: 0, exp: 0, label: `${mosEn[m]} ${y}`, m, y, transactions: [] };
                            const amt = Number(p.amount) || 0;
                            totalIncome += amt;
                            
                            const pDate = new Date(p.date);
                            if (pDate.getMonth() === currentM && pDate.getFullYear() === currentY) currentMonthIncome += amt;

                            historyMap[hKey].inc += amt;
                            historyMap[hKey].transactions.push({ date: p.date, label: `${getFirstName(b.guestName)} (${b.room})`, amount: amt, type: 'IN', payload: { bid: parts[0], m, y, pid: p.id } });
                        });
                    }
                });

                // 3. Calculate Bills Pending Out & Expenses
                filteredBills.forEach(bill => {
                    const paid = (bill.payments || []).reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
                    const pending = Math.max(0, (Number(bill.amount) || 0) - paid);
                    
                    if (pending > 0) {
                        const bDate = new Date(bill.dueDate);
                        if (bDate.getTime() <= endOfCurrentMonth) totalPendingOut += pending;
                        if (bDate.getMonth() === currentM && bDate.getFullYear() === currentY) currentMonthPendingOut += pending;
                    }

                    (bill.payments || []).forEach(p => {
                        const amt = Number(p.amount) || 0;
                        totalExpense += amt;

                        const pDate = new Date(p.date);
                        if (pDate.getMonth() === currentM && pDate.getFullYear() === currentY) currentMonthExpense += amt;

                        const m = pDate.getMonth(), y = pDate.getFullYear(), hKey = `${m}_${y}`;
                        if (!historyMap[hKey]) historyMap[hKey] = { inc: 0, exp: 0, label: `${mosEn[m]} ${y}`, m, y, transactions: [] };
                        historyMap[hKey].exp += amt;
                        historyMap[hKey].transactions.push({ date: p.date, label: `${bill.category} (${bill.property})`, amount: amt, type: 'OUT', payload: { billId: bill.id, pid: p.id } });
                    });
                });

                Object.values(historyMap).forEach(h => {
                    h.transactions.sort((a,b) => new Date(b.date) - new Date(a.date));
                });

                const currentHKey = `${currentM}_${currentY}`;
                const currentMonthData = historyMap[currentHKey] || { inc: 0, exp: 0, transactions: [] };

                return { 
                    income: totalIncome, expense: totalExpense, net: totalIncome - totalExpense,
                    totalPendingIn, totalPendingOut,
                    currentMonthIncome, currentMonthExpense, currentMonthNet: currentMonthIncome - currentMonthExpense, 
                    currentMonthPendingIn, currentMonthPendingOut,
                    currentMonthLedger: currentMonthData.transactions,
                    history: Object.values(historyMap).sort((a,b) => new Date(b.y, b.m) - new Date(a.y, a.m)).reverse()
                };
            }, [filteredBookings, filteredBills, paymentLog, utilityLog]);

            const allGuestsSorted = useMemo(() => {
                const s = historySearch.toLowerCase();
                const filtered = bookings.filter(b => ((b.guestName || "").toLowerCase().includes(s) || (b.room || "").toLowerCase().includes(s)) && (selectedProperty === 'All' || !b.property || b.property === selectedProperty));
                const { key, direction } = sortConfig;
                return [...filtered].sort((a, b) => {
                    let valA = a[key], valB = b[key];
                    if (key === 'start' || key === 'end') { 
                        valA = valA ? new Date(valA).getTime() : 0; valB = valB ? new Date(valB).getTime() : 0; 
                        return direction === 'asc' ? valA - valB : valB - valA;
                    }
                    valA = (valA ?? "").toString().toLowerCase(); valB = (valB ?? "").toString().toLowerCase();
                    if (valA < valB) return direction === 'asc' ? -1 : 1;
                    if (valA > valB) return direction === 'asc' ? 1 : -1;
                    return 0;
                });
            }, [bookings, historySearch, selectedProperty, sortConfig]);

            // --- SYNC ---
            const syncData = async (update) => { if (!user || !isReadyToSync.current) return; await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('propertyData').doc(urlUser).set(update, { merge: true }); };
            
            useEffect(() => { 
                const initAuth = async () => {

                        setDbStatus(s => ({ ...s, auth: `✓ ${cred.user.uid.slice(0,5)}` })); 
                    } catch (e) { setDbStatus(s => ({ ...s, auth: 'ERR' })); }
                }; 
                initAuth(); 
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('propertyData').doc(urlUser).onSnapshot((snap) => {
                    if (snap.exists) {
                        const d = snap.data(); 
                        setBookings(d.bookings || []);

                        setTodos(d.todos || []);
                        setAboutData(d.aboutData || { properties: {}, rooms: {} });
                        setDbStatus(s => ({ ...s, firestore: 'Synced' }));
                    } else { 
                        setRooms([]); 
                        setDbStatus(s => ({ ...s, firestore: 'Sample' })); 
                    }
                    setHasLoaded(true); isReadyToSync.current = true;
                }, err => { setDbStatus(s => ({ ...s, firestore: 'ERR' })); setHasLoaded(true); });
                return () => unsub();
            }, [user]);

            const handleCellClick = (room, date) => {
                const end = new Date(date); end.setMonth(date.getMonth() + 1);
                setEditingId(null); setFormData({ guestName: '', contact: '', room: room.name, property: room.property, start: toISODate(date), end: toISODate(end), monthlyRate: 5000, isFixedPrice: false, manualStatus: 'auto', notes: '', depositAmt: 0, depositCollected: false, depositRefunded: false }); setShowModal(true);
            };

            const handleSaveBooking = async (e) => { e.preventDefault(); const newB = editingId ? bookings.map(b => b.id === editingId ? { ...formData, id: editingId } : b) : [...bookings, { ...formData, id: Date.now().toString() }]; setBookings(newB); await syncData({ bookings: newB }); setShowModal(false); };
            const executeDelete = async () => { 
                if (!deleteTarget) return; 
                if (deleteTarget.type === 'booking') { 
                    const n = bookings.filter(x => x.id !== deleteTarget.id); setBookings(n); await syncData({ bookings: n }); setShowModal(false); 
                } else if (deleteTarget.type === 'bill') { 
                    const n = bills.filter(b => b.id !== deleteTarget.id); setBills(n); await syncData({ bills: n }); 
                } else if (deleteTarget.type === 'payment') {
                    if (deleteTarget.txType === 'IN') {
                        await deletePayLocal(deleteTarget.payload.bid, deleteTarget.payload.m, deleteTarget.payload.y, deleteTarget.payload.pid);
                    } else {
                        await handleBillPaymentDelete(deleteTarget.payload.billId, deleteTarget.payload.pid);
                    }
                } else if (deleteTarget.type === 'todo') {
                    const n = todos.filter(t => t.id !== deleteTarget.id); setTodos(n); await syncData({ todos: n });
                }
                setDeleteTarget(null); 
            };
            const addPayLocal = async (bid, m, y, amt) => { const k = `${bid}_${m}_${y}`, n = { ...paymentLog, [k]: [...(paymentLog[k] || []), { id: Date.now().toString(), amount: Number(amt), date: toISODate(new Date()) }] }; setPaymentLog(n); await syncData({ paymentLog: n }); };
            const updatePayLocal = async (bid, m, y, pid, f, v) => { const k = `${bid}_${m}_${y}`, n = { ...paymentLog, [k]: (paymentLog[k] || []).map(p => p.id === pid ? {...p, [f]: f === 'amount' ? (v === '' ? 0 : Number(v)) : v} : p) }; setPaymentLog(n); await syncData({ paymentLog: n }); };
            const deletePayLocal = async (bid, m, y, pid) => { const k = `${bid}_${m}_${y}`, n = { ...paymentLog, [k]: (paymentLog[k] || []).filter(p => p.id !== pid) }; setPaymentLog(n); await syncData({ paymentLog: n }); };
            const updateUtilLocal = async (bid, m, y, f, v) => { const k = `${bid}_${m}_${y}`, n = { ...utilityLog, [k]: { ...(utilityLog[k] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 0, otherAmt: 0, otherNote: '' }), [f]: (f === 'otherNote' ? v : (v === '' ? 0 : Number(v))) } }; setUtilityLog(n); await syncData({ utilityLog: n }); };
            const handleQuickBillPay = (bill) => { const paid = (bill.payments || []).reduce((s,p) => s + (Number(p.amount) || 0), 0); const balance = (Number(bill.amount) || 0) - paid; if (balance <= 0) return; const newBills = bills.map(b => b.id === bill.id ? { ...b, payments: [...(b.payments || []), { id: Date.now().toString(), amount: balance, date: toISODate(new Date()) }] } : b); setBills(newBills); syncData({ bills: newBills }); };
            const duplicateBill = async (bill) => { const d = new Date(bill.dueDate); d.setMonth(d.getMonth() + 1); const updated = [...bills, { ...bill, id: Date.now().toString(), payments: [], dueDate: toISODate(d) }]; setBills(updated); await syncData({ bills: updated }); };
            const handleBillUpdateField = async (id, field, val) => { const updated = bills.map(b => b.id === id ? { ...b, [field]: field === 'amount' ? (val === '' ? 0 : Number(val)) : val } : b); setBills(updated); await syncData({ bills: updated }); };
            const handleBillPaymentUpdate = async (billId, paymentId, field, val) => { const updated = bills.map(b => b.id === billId ? { ...b, payments: (b.payments || []).map(p => p.id === paymentId ? { ...p, [field]: field === 'amount' ? (val === '' ? 0 : Number(val)) : val } : p) } : b); setBills(updated); await syncData({ bills: updated }); };
            const handleBillPaymentDelete = async (billId, paymentId) => { const updated = bills.map(b => b.id === billId ? { ...b, payments: (b.payments || []).filter(p => p.id !== paymentId) } : b); setBills(updated); await syncData({ bills: updated }); };

            const handleAddTodo = async (e) => {
                e.preventDefault();
                if (!newTodo.trim()) return;
                const updated = [...todos, { id: Date.now().toString(), text: newTodo.trim(), property: newTodoProp, added: toISODate(new Date()), done: false }];
                setTodos(updated); await syncData({ todos: updated }); setNewTodo('');
            };
            const handleToggleTodo = async (id) => {
                const updated = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
                setTodos(updated); await syncData({ todos: updated });
            };
            const saveEditTodo = async (id) => {
                if (!editingTodoText.trim()) return;
                const updated = todos.map(t => t.id === id ? { ...t, text: editingTodoText.trim(), property: editingTodoProp } : t);
                setTodos(updated); await syncData({ todos: updated }); setEditingTodoId(null);
            };

            const updateAboutData = (type, id, field, value) => {
                if (!id) return;
                setAboutData(prev => ({ ...prev, [type]: { ...prev[type], [id]: { ...(prev[type]?.[id] || {}), [field]: value } } }));
                setIsAboutDirty(true);
            };
            const activeAboutPropData = aboutData?.properties?.[aboutSelection.property] || {};
            const activeAboutRoomKey = aboutSelection.property && aboutSelection.room ? `${aboutSelection.property}_${aboutSelection.room}` : '';
            const activeAboutRoomData = aboutData?.rooms?.[activeAboutRoomKey] || {};

            const isTodayInViewNow = calendarDays.some(d => toISODate(d) === toISODate(TODAY));
            const todayOffsetNow = isTodayInViewNow ? Math.floor((TODAY.getTime() - calendarStart.getTime()) / 86400000) : null;

            const renderTransaction = (item, idx) => {
                const isEditing = editingTransaction && editingTransaction.pid === item.payload.pid;
                
                if (isEditing) {
                    return (
                        <tr key={item.payload.pid || idx} className="bg-indigo-50 font-black uppercase shadow-inner border-y border-indigo-100">
                            <td className="td-custom px-2 py-1.5 w-[140px]">
                                <input type="date" className="input-base py-1 px-2 w-full text-[14px] bg-white" value={editingTransaction.date} onChange={e => setEditingTransaction({...editingTransaction, date: e.target.value})} />
                            </td>
                            <td className="td-custom text-indigo-700">{item.label}</td>
                            <td className="td-custom text-right">
                                <div className="flex items-center justify-end gap-1.5">
                                    <span className="text-indigo-400">฿</span>
                                    <input type="number" step="0.01" className="input-base py-1 px-2 w-[100px] text-[14px] text-right bg-white" value={editingTransaction.amount === 0 ? '' : editingTransaction.amount} onChange={e => setEditingTransaction({...editingTransaction, amount: Number(e.target.value)})} />
                                    <button onClick={() => {
                                        if(item.type === 'IN') {
                                            updatePayLocal(item.payload.bid, item.payload.m, item.payload.y, item.payload.pid, 'amount', editingTransaction.amount);
                                            updatePayLocal(item.payload.bid, item.payload.m, item.payload.y, item.payload.pid, 'date', editingTransaction.date);
                                        } else {
                                            handleBillPaymentUpdate(item.payload.billId, item.payload.pid, 'amount', editingTransaction.amount);
                                            handleBillPaymentUpdate(item.payload.billId, item.payload.pid, 'date', editingTransaction.date);
                                        }
                                        setEditingTransaction(null);
                                    }} className="bg-emerald-500 text-white hover:bg-emerald-600 p-1.5 rounded-lg ml-2 shadow-sm transition-all active:scale-95" title="Save"><Icon name="Check" size={16}/></button>
                                    <button onClick={() => setEditingTransaction(null)} className="bg-slate-200 text-slate-600 hover:bg-slate-300 p-1.5 rounded-lg shadow-sm transition-all active:scale-95" title="Cancel"><Icon name="X" size={16}/></button>
                                </div>
                            </td>
                        </tr>
                    );
                }

                return (
                    <tr key={item.payload.pid || idx} className="hover:bg-slate-50 font-black uppercase transition-colors">

                                                                            <input type="number" step="0.01" placeholder="Start" className="w-20 bg-white border border-slate-300 rounded-md text-center text-[16px] p-1 font-black outline-none" value={mon.util.elecStart === 0 ? '' : mon.util.elecStart} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'elecStart', e.target.value)} />
                                                                            <input type="number" step="0.01" placeholder="End" className="w-20 bg-white border border-slate-300 rounded-md text-center text-[16px] p-1 font-black outline-none" value={mon.util.elecEnd === 0 ? '' : mon.util.elecEnd} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'elecEnd', e.target.value)} />
                                                                            <input type="number" step="0.01" placeholder="Rate" className="w-16 bg-white border border-slate-300 rounded-md text-center text-[16px] text-amber-600 p-1 font-black outline-none" value={mon.util.elecRate || 8} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'elecRate', e.target.value)} />
                                                                        </div>
                                                                        <div className="flex items-center gap-1.5 bg-slate-50 p-1.5 rounded-lg border border-slate-200 flex-1 min-w-[120px]">
                                                                            <Icon name="Droplets" size={20} className="text-blue-500 fill-blue-500 shrink-0" />
                                                                            <span className="text-[14px] uppercase text-slate-500 font-black shrink-0">Water</span>
                                                                            <input type="number" step="0.01" className="flex-1 w-full min-w-[50px] bg-white border border-slate-300 rounded-md text-center text-[16px] text-blue-600 p-1 font-black outline-none" value={mon.util.water === 0 ? '' : mon.util.water} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'water', e.target.value)} />
                                                                        </div>
                                                                    </div>
                                                                    <div className="flex flex-row gap-2 px-1 pb-2 items-center">
                                                                        <div className="flex items-center gap-1.5 bg-slate-50 p-1.5 rounded-lg border border-slate-200 flex-1">
                                                                            <Icon name="MoreHorizontal" size={20} className="text-slate-400 shrink-0" />
                                                                            <span className="text-[14px] uppercase text-slate-500 font-black shrink-0">Other</span>
                                                                            <input type="number" step="0.01" placeholder="Amt" className="w-24 bg-white border border-slate-300 rounded-md text-center text-[16px] p-1 font-black outline-none" value={mon.util.otherAmt === 0 ? '' : mon.util.otherAmt} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'otherAmt', e.target.value)} />
                                                                            <input type="text" placeholder="Note" className="flex-1 bg-white border border-slate-300 rounded-md text-[16px] px-2 p-1 font-black outline-none" value={mon.util.otherNote || ''} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'otherNote', e.target.value)} />
                                                                        </div>
                                                                    </div>
                                                                    <div className="border-t border-slate-200 pt-2 px-1 mt-1">
                                                                        <p className="text-[14px] text-indigo-500 uppercase tracking-widest mb-2 px-1 font-black">Payments History</p>
                                                                        {(paymentLog[`${editingId}_${mon.monthIndex}_${mon.year}`] || []).map(p => ( 
                                                                            <div key={p.id} className="flex gap-2 items-center bg-emerald-50/60 p-1.5 rounded-lg mb-1.5 border border-emerald-100">
                                                                                <input type="date" className="w-[135px] bg-white border border-emerald-200 rounded-md text-[16px] px-2 py-1 font-condensed text-emerald-900 outline-none" value={p.date} onChange={e => updatePayLocal(editingId, mon.monthIndex, mon.year, p.id, 'date', e.target.value)} />
                                                                                <div className="flex-1 relative flex items-center">
                                                                                    <span className="absolute left-2 text-emerald-700 text-[16px]">฿</span>
                                                                                    <input type="number" step="0.01" className="w-full bg-white border border-emerald-200 rounded-md text-[16px] text-emerald-700 font-black pl-6 pr-2 py-1 text-right outline-none" value={p.amount === 0 ? '' : p.amount} onChange={e => updatePayLocal(editingId, mon.monthIndex, mon.year, p.id, 'amount', e.target.value)} />
                                                                                </div>
                                                                                <button type="button" onClick={() => deletePayLocal(editingId, mon.monthIndex, mon.year, p.id)} className="text-rose-500 px-1 hover:scale-110"><Icon name="Trash" size={22} /></button>
                                                                            </div> 
                                                                        ))}
                                                                        <div className="flex flex-wrap items-center gap-2 pt-2 border-t border-slate-100 mt-2 pb-1">
                                                                            <p className="text-[15px] text-slate-500 uppercase shrink-0 font-black">{t('ADD_PAYMENT')}</p>
                                                                            <div className="flex-1 min-w-[80px] max-w-[120px] relative">
                                                                                <span className="absolute left-2 top-1/2 -translate-y-1/2 text-indigo-400">฿</span>
                                                                                <input type="number" step="0.01" id={`pay-${idx}`} className="w-full bg-indigo-50 border border-indigo-100 rounded-lg pl-6 pr-2 py-1.5 outline-none text-[16px] text-indigo-700 font-black text-right shrink-0" defaultValue={(mon.owed - mon.paid).toFixed(2)} />
                                                                            </div>
                                                                            <button type="button" title="Fill Amount" onClick={() => { document.getElementById(`pay-${idx}`).value = (mon.owed - mon.paid).toFixed(2); }} className="bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg active:scale-90 transition-transform font-black text-[14px] uppercase tracking-wider shrink-0">Fill</button>
                                                                            <button type="button" title="Add Payment" onClick={()=>{const el=document.getElementById(`pay-${idx}`); if(el?.value){ addPayLocal(editingId, mon.monthIndex, mon.year, el.value); el.value=0; } }} className="bg-slate-900 text-white p-1.5 rounded-lg active:scale-90 transition-transform shrink-0 ml-auto"><Icon name="Check" size={20}/></button>
                                                                        </div>
                                                                    </div>
                                                                </div> 
                                                            ))}
                                                        </div>);
                                                })()}
                                            </div>
                                        )}
                                        <div className="flex gap-2 pt-1">
                                            {editingId && <button type="button" onClick={() => setDeleteTarget({type:'booking', id:editingId})} className="px-4 py-3 bg-rose-50 text-rose-600 rounded-2xl active:scale-95 transition-all"><Icon name="Trash" size={20}/></button>}
                                            <button type="submit" className="flex-1 bg-indigo-600 text-white py-0.5 pr-4 rounded-2xl font-black uppercase text-[19px] shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                                                <Icon name="Check" size={20}/> {t('UPDATE')}
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* SETTINGS MODAL */}
                        {showSettings && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[150] flex items-center justify-center p-2 font-black font-condensed">
                                <div className="bg-white rounded-[1.5rem] w-full max-w-md shadow-2xl overflow-hidden animate-in zoom-in duration-150">
                                    <div className="p-4 border-b border-slate-200 flex items-center justify-between bg-slate-50">
                                        <h2 className="text-[20px] uppercase text-indigo-800">{t('SYSTEM_CONFIG')}</h2>
                                        <button onClick={() => setShowSettings(false)} className="p-1 text-slate-400 hover:text-rose-500"><Icon name="X" size={24}/></button>
                                    </div>
                                    <div className="p-4 space-y-4">
                                        <div>
                                            <label className="badge-label">{t('PROPERTIES')}</label>
                                            <div className="space-y-1">
                                                {properties.map((p, i) => (
                                                    <div key={i} className="flex gap-2">
                                                        <input className="input-base flex-1 py-1 px-2" value={p} onChange={e => {
                                                            const n = [...properties]; n[i] = e.target.value;
                                                            setProperties(n); syncData({ properties: n });
                                                        }} />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <button onClick={() => setShowSettings(false)} className="btn-action w-full py-2">{t('UPDATE')}</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* BILL MODAL */}
                        {showBillModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[150] flex items-center justify-center p-2 font-black font-condensed">
                                <div className="bg-white rounded-[1.5rem] w-full max-w-lg shadow-2xl overflow-hidden animate-in zoom-in duration-150">
                                    <div className="p-2 border-b border-slate-200 flex items-center bg-slate-50 gap-2">
                                        <h2 className="text-[20px] uppercase text-indigo-800">{t('NEW_BILL')}</h2>
                                        <button onClick={() => setShowBillModal(false)} className="p-1 text-slate-400 hover:text-rose-500"><Icon name="X" size={24}/></button>
                                    </div>
                                    <div className="p-4 space-y-4">
                                        <div className="space-y-2">
                                            <div>
                                                <label className="badge-label">{t('CATEGORY')}</label>
                                                <select className="input-base w-full" value={billFormData.category} onChange={e => setBillFormData({...billFormData, category: e.target.value})}>
                                                    {BILL_CATEGORIES.map(c => <option key={c.id} value={c.id}>{lang==='th' ? c.labelTh : c.labelEn}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="badge-label">{t('PROPERTY')}</label>
                                                <select className="input-base w-full" value={billFormData.property} onChange={e => setBillFormData({...billFormData, property: e.target.value})}>
                                                    {properties.map(p => <option key={p} value={p}>{p}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="badge-label">{t('DUE_DATE')}</label>
                                                <input type="date" className="input-base w-full" value={billFormData.dueDate} onChange={e => setBillFormData({...billFormData, dueDate: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="badge-label">{t('AMOUNT')}</label>
                                                <input type="number" step="0.01" className="input-base w-full" value={billFormData.amount || ''} onChange={e => setBillFormData({...billFormData, amount: Number(e.target.value)})} />
                                            </div>
                                            <div>
                                                <label className="badge-label">{t('DESC')}</label>
                                                <input className="input-base w-full" value={billFormData.title} onChange={e => setBillFormData({...billFormData, title: e.target.value})} />
                                            </div>
                                        </div>
                                        <button 
                                            onClick={async () => {
                                                const newBills = [...bills, { ...billFormData, id: Date.now().toString(), payments: [] }];
                                                setBills(newBills);
                                                await syncData({ bills: newBills });
                                                setShowBillModal(false);
                                            }} 
                                            className="btn-action w-full py-2"
                                        >
                                            {t('UPDATE')}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* DELETE CONFIRMATION */}
                        {deleteTarget && (
                            <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[200] flex items-center justify-center p-4 animate-in fade-in duration-100 font-condensed">
                                <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 border-t-4 border-rose-500 font-black">
                                    <h2 className="text-[20px] uppercase text-slate-800">{t('CONFIRM_DELETE')}</h2>
                                    <p className="text-slate-500 text-[16px] leading-tight">{t('DELETE_MSG')}</p>
                                    <div className="flex gap-2 pt-2">
                                        <button onClick={() => setDeleteTarget(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-black uppercase text-[14px]">{t('CANCEL')}</button>
                                        <button onClick={() => { executeDelete(); setDeleteTarget(null); }} className="flex-1 py-3 bg-rose-600 text-white rounded-xl font-black uppercase text-[14px] shadow-lg shadow-rose-600/30">{t('DELETE')}</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="fixed bottom-0 inset-x-0 bg-slate-900 text-white text-[12px] p-2 flex gap-4 items-center justify-center border-t border-white/10 z-[200] font-black uppercase tracking-widest font-condensed">
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${dbStatus.auth.includes('✓') ? 'bg-emerald-500' : 'bg-rose-500'}`} /><span className="opacity-50">Auth:</span><span>{dbStatus.auth}</span></div>
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${dbStatus.firestore === 'Synced' ? 'bg-emerald-500' : 'bg-rose-500'}`} /><span className="opacity-50">Sync:</span><span>{dbStatus.firestore}</span></div>
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full bg-indigo-500 font-black`} /><span className="opacity-50">User:</span><span>{urlUser}</span></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
