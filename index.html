<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROP MGR - Management Suite</title>
    <!-- 1. React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 2. Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 3. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 4. Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

</head>
<body class="bg-slate-100 antialiased overflow-x-hidden font-sans text-slate-900 text-[12px]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, Fragment } = React;

        // --- 1. FIREBASE CONFIGURATION ---
        const myGithubConfig = {
            apiKey: "AIzaSyCF3LiF_63ErJmxwfAqBf-xKmucZGYcyCA", 
            authDomain: "propertycal1.firebaseapp.com",
            projectId: "propertycal1",
            storageBucket: "propertycal1.firebasestorage.app",
            messagingSenderId: "39254504887",
            appId: "1:39254504887:web:368ca09e2a2b1b46376432"
        };

        const isCanvas = typeof __firebase_config !== 'undefined';
        const hasCustomKey = myGithubConfig.apiKey !== "PASTE_YOUR_RESTRICTED_API_KEY_HERE";
        const firebaseConfig = (isCanvas && !hasCustomKey) ? JSON.parse(__firebase_config) : myGithubConfig;
        
        // Locked appId to ensure both environments see the same data
        const appId = 'prop-mgr-stable-v2';
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        const urlParams = new URLSearchParams(window.location.search);
        const urlUser = urlParams.get('user') || 'manager_main';
        const TODAY = new Date(2026, 2, 21);

        const STAY_STATUSES = {
            IN: { id: 'checked-in', label: 'In', icon: 'Home', color: 'text-emerald-500', barBg: 'bg-emerald-600' },
            FUT: { id: 'future', label: 'Future', icon: 'Clock', color: 'text-blue-500', barBg: 'bg-blue-600' },
            OUT: { id: 'checked-out', label: 'Out', icon: 'CheckCircle2', color: 'text-slate-400', barBg: 'bg-slate-400' }
        };

        const BILL_CATEGORIES = [
            { id: 'Lease', icon: 'Building2', color: 'text-indigo-600' },
            { id: 'Electric', icon: 'Zap', color: 'text-amber-500' },
            { id: 'Water', icon: 'Droplets', color: 'text-blue-500' },
            { id: 'Wifi', icon: 'Wifi', color: 'text-sky-500' },
            { id: 'Cleaning', icon: 'Sparkles', color: 'text-teal-500' },
            { id: 'Repair', icon: 'Wrench', color: 'text-orange-500' },
            { id: 'Staff', icon: 'Users', color: 'text-purple-500' },
            { id: 'Other', icon: 'MoreHorizontal', color: 'text-slate-400' },
        ];

        const Icon = ({ name, size = 16, className = "" }) => {
            const paths = {
                Building2: <Fragment><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></Fragment>,
                LayoutGrid: <Fragment><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></Fragment>,
                BellRing: <Fragment><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></Fragment>,
                LayoutDashboard: <Fragment><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></Fragment>,
                Receipt: <Fragment><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5V6.5"/></Fragment>,
                Wallet: <Fragment><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></Fragment>,
                ChevronLeft: <path d="m15 18-6-6 6-6"/>,
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                PlusCircle: <Fragment><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></Fragment>,
                Home: <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 22V12h6v10"/>,
                Clock: <Fragment><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Fragment>,
                CheckCircle2: <Fragment><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Fragment>,
                AlertTriangle: <Fragment><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></Fragment>,
                History: <Fragment><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5M12 7v5l4 2"/></Fragment>,
                Trash: <Fragment><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></Fragment>,
                Copy: <Fragment><rect width="12" height="12" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></Fragment>,
                Pencil: <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>,
                Check: <path d="M20 6 9 17l-5-5"/>,
                Zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                Droplets: <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5s-3 3.5-3 5.5a7 7 0 0 0 7 7z" />,
                Settings: <Fragment><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Fragment>,
                X: <path d="M18 6 6 18M6 6l12 12"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        function App() {
            const mos = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];

            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('calendar');
            const [selectedProperty, setSelectedProperty] = useState('All');
            const [viewDate, setViewDate] = useState(new Date(2026, 2, 1));
            const [hasLoaded, setHasLoaded] = useState(false);
            const isReadyToSync = useRef(false);
            const [dbStatus, setDbStatus] = useState({ auth: 'Wait...', firestore: 'Wait...', error: null });

            const [rooms, setRooms] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [paymentLog, setPaymentLog] = useState({});
            const [utilityLog, setUtilityLog] = useState({});
            const [bills, setBills] = useState([]);
            const [properties, setProperties] = useState(['Property A', 'Property B']);

            const [showModal, setShowModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [showLedgerInModal, setShowLedgerInModal] = useState(false);
            const [formData, setFormData] = useState({ guestName: '', contact: '', room: '', property: '', start: '', end: '', monthlyRate: 5000, isFixedPrice: false, manualStatus: 'auto' });

            const [showBillModal, setShowBillModal] = useState(false);
            const [editingBillId, setEditingBillId] = useState(null);
            const [billFormData, setBillFormData] = useState({ title: '', category: 'Electric', property: 'Property A', amount: 0, dueDate: '', payments: [] });

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const isTodayVisible = TODAY.getFullYear() === year && TODAY.getMonth() === month;
            const todayDay = TODAY.getDate();

            // --- HELPERS (Top scope of App) ---
            const toISODate = (date) => date.toLocaleDateString('sv-SE');
            const getMonthYearShort = (date) => `${mos[date.getMonth()]} ${date.getFullYear()}`;
            const formatBarDate = (dateStr) => {
                if (!dateStr) return '...';
                const d = new Date(dateStr);
                return `${d.getDate()}${mos[d.getMonth()]}`;
            };
            const formatVacancyDate = (date) => {
                if (!date) return '∞';
                const d = new Date(date);
                return `${d.getDate()}${mos[d.getMonth()]}${d.getFullYear().toString().slice(-2)}`;
            };

            const getStatus = (b) => {
                if (!b) return STAY_STATUSES.OUT;
                if (b.manualStatus === 'checked-in') return STAY_STATUSES.IN;
                if (b.manualStatus === 'checked-out') return STAY_STATUSES.OUT;
                const s = new Date(b.start), e = new Date(b.end);
                if (TODAY < s) return STAY_STATUSES.FUT;
                if (TODAY >= s && TODAY < e) return STAY_STATUSES.IN;
                return STAY_STATUSES.OUT;
            };

            const getPaymentSchedule = (booking) => {
                if (!booking || !booking.start || !booking.end) return [];
                const start = new Date(booking.start), end = new Date(booking.end);
                const schedule = [];
                let current = new Date(start.getFullYear(), start.getMonth(), 1);
                let isFirst = true;
                while (current <= end) {
                    const cY = current.getFullYear(), cM = current.getMonth();
                    const mD = new Date(cY, cM + 1, 0).getDate();
                    const sDay = (cM === start.getMonth() && cY === start.getFullYear()) ? start.getDate() : 1;
                    const eDay = (cM === end.getMonth() && cY === end.getFullYear()) ? end.getDate() : mD + 1;
                    const days = Math.max(0, eDay - sDay);
                    if (days > 0) {
                        let rent = booking.isFixedPrice ? (isFirst ? (Number(booking.monthlyRate) || 0) : 0) : Math.round((days >= mD ? (Number(booking.monthlyRate) || 0) : ((Number(booking.monthlyRate) || 0) / mD) * days));
                        isFirst = false;
                        const key = `${booking.id}_${cM}_${cY}`;
                        const util = utilityLog[key] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 0 };
                        let utilOwed = util.elecEnd > 0 ? Math.round(Math.max(0, (util.elecEnd - util.elecStart) * util.elecRate) + (Number(util.water) || 0)) : 0;
                        const paid = (paymentLog[key] || []).reduce((s, p) => s + (Number(p.amount) || 0), 0);
                        schedule.push({ monthIndex: cM, year: cY, label: mos[cM], rent, utilOwed, owed: rent + utilOwed, paid, util });
                    }
                    current = new Date(cY, cM + 1, 1);
                }
                return schedule;
            };

            const getBarColor = (b, bal) => {
                const s = getStatus(b);
                if (s.id === 'checked-out') return 'bg-slate-400';
                if (s.id === 'future') return 'bg-blue-600';
                return bal > 0 ? 'bg-rose-600' : 'bg-emerald-600';
            };

            // --- PERSISTENCE ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        setDbStatus(s => ({ ...s, auth: 'Sign-In...' }));
                        const cred = await auth.signInAnonymously();
                        setUser(cred.user);
                        setDbStatus(s => ({ ...s, auth: `Active: ${auth.currentUser?.uid.slice(0,5)}` }));
                    } catch (e) { setDbStatus(s => ({ ...s, auth: 'Auth Failed', error: e.message })); }
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('propertyData').doc(urlUser);
                setDbStatus(s => ({ ...s, firestore: 'Connecting...' }));
                return docRef.onSnapshot((snap) => {
                    if (snap.exists) {
                        const d = snap.data();
                        const cleanRooms = (d.rooms || []).map(r => ({...r, name: (r.name || "").toString().replace(/\^/g, '')}));
                        const cleanBookings = (d.bookings || []).map(b => ({...b, room: (b.room || "").toString().replace(/\^/g, '')}));
                        setBookings(cleanBookings);
                        setRooms(cleanRooms);
                        setPaymentLog(d.paymentLog || {});
                        setUtilityLog(d.utilityLog || {});
                        setBills(d.bills || []);
                        setProperties(d.properties || ['Property A', 'Property B']);
                        setDbStatus(s => ({ ...s, firestore: 'Synced ✓' }));
                    } else {
                        const initR = Array.from({ length: 12 }, (_, i) => ({ id: `r${i}`, name: `${101 + i}`, property: 'Property A' }));
                        docRef.set({ rooms: initR, properties: ['Property A', 'Property B'], bookings: [], paymentLog: {}, utilityLog: {}, bills: [] });
                        setDbStatus(s => ({ ...s, firestore: 'Ready' }));
                    }
                    setHasLoaded(true);
                    isReadyToSync.current = true;
                }, err => setDbStatus(s => ({ ...s, firestore: 'Blocked', error: err.message })));
            }, [user]);

            const sync = async (update) => {
                if (!user || !isReadyToSync.current) return;
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('propertyData').doc(urlUser);
                await docRef.set(update, { merge: true });
            };

            // --- ACTION HANDLERS ---
            const handleSaveBooking = async (e) => {
                e.preventDefault();
                const newB = editingId ? bookings.map(b => b.id === editingId ? { ...formData, id: editingId } : b) : [...bookings, { ...formData, id: Date.now().toString(), manualStatus: 'auto' }];
                setBookings(newB); await sync({ bookings: newB }); setShowModal(false);
            };

            const handleBillSave = async (e) => {
                e.preventDefault();
                const newBills = editingBillId ? bills.map(b => b.id === editingBillId ? { ...billFormData, id: editingBillId } : b) : [...bills, { ...billFormData, id: Date.now().toString(), payments: billFormData.payments || [] }];
                setBills(newBills); await sync({ bills: newBills }); setShowBillModal(false);
            };

            const addPayLocal = async (bookingId, m, y, amount) => {
                if (!amount || amount <= 0) return;
                const key = `${bookingId}_${m}_${y}`;
                const newLog = { ...paymentLog, [key]: [...(paymentLog[key] || []), { id: Date.now().toString(), amount: Math.round(Number(amount)), date: toISODate(new Date()) }] };
                setPaymentLog(newLog); await sync({ paymentLog: newLog });
            };

            const updatePayLocal = async (bookingId, m, y, payId, field, val) => {
                const key = `${bookingId}_${m}_${y}`;
                const newLog = { ...paymentLog, [key]: (paymentLog[key] || []).map(p => p.id === payId ? {...p, [field]: field === 'amount' ? Number(val) : val} : p) };
                setPaymentLog(newLog); await sync({ paymentLog: newLog });
            };

            const deletePayLocal = async (bookingId, m, y, payId) => {
                const key = `${bookingId}_${m}_${y}`;
                const newLog = { ...paymentLog, [key]: (paymentLog[key] || []).filter(p => p.id !== payId) };
                setPaymentLog(newLog); await sync({ paymentLog: newLog });
            };

            const addBillPayLocal = (billId, amount) => {
                if (!amount || amount <= 0) return;
                const newBills = bills.map(b => {
                    if (b.id === billId) {
                        return { ...b, payments: [...(b.payments || []), { id: Date.now().toString(), amount: Number(amount), date: toISODate(new Date()) }] };
                    }
                    return b;
                });
                setBills(newBills); sync({ bills: newBills });
                setBillFormData(prev => ({...prev, payments: [...(prev.payments || []), { id: Date.now().toString(), amount: Number(amount), date: toISODate(new Date()) }]}));
            };

            const updateBillPayLocal = (billId, payId, field, val) => {
                const newBills = bills.map(b => {
                    if (b.id === billId) {
                        return { ...b, payments: (b.payments || []).map(p => p.id === payId ? {...p, [field]: field === 'amount' ? Number(val) : val} : p) };
                    }
                    return b;
                });
                setBills(newBills); sync({ bills: newBills });
                setBillFormData(prev => ({...prev, payments: (prev.payments || []).map(p => p.id === payId ? {...p, [field]: field === 'amount' ? Number(val) : val} : p)}));
            };

            const deleteBillPayLocal = (billId, payId) => {
                const newBills = bills.map(b => {
                    if (b.id === billId) {
                        return { ...b, payments: (b.payments || []).filter(p => p.id !== payId) };
                    }
                    return b;
                });
                setBills(newBills); sync({ bills: newBills });
                setBillFormData(prev => ({...prev, payments: (prev.payments || []).filter(p => p.id !== payId)}));
            };

            const updateUtilLocal = async (bookingId, m, y, field, val) => {
                const key = `${bookingId}_${m}_${y}`;
                const newUtil = { ...utilityLog, [key]: { ...(utilityLog[key] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 0 }), [field]: Number(val) } };
                setUtilityLog(newUtil); await sync({ utilityLog: newUtil });
            };

            const handleQuickBillPay = (bill) => {
                const paid = (bill.payments || []).reduce((s,p) => s + (Number(p.amount) || 0), 0);
                const balance = bill.amount - paid;
                if (balance <= 0) return;
                const newBills = bills.map(b => {
                    if (b.id === bill.id) {
                        return { ...b, payments: [...(b.payments || []), { id: Date.now().toString(), amount: balance, date: toISODate(new Date()) }] };
                    }
                    return b;
                });
                setBills(newBills); sync({ bills: newBills });
            };

            const handleQuickBillDelete = (id) => {
                if(!confirm('Delete this bill permanently?')) return;
                const n = bills.filter(b => b.id !== id);
                setBills(n); sync({ bills: n });
            };

            const duplicateBill = async (bill) => {
                const d = new Date(bill.dueDate); d.setMonth(d.getMonth() + 1);
                const updated = [...bills, { ...bill, id: Date.now().toString(), payments: [], dueDate: toISODate(d) }];
                setBills(updated); await sync({ bills: updated });
            };

            // --- COMPUTED DATA ---
            const filteredRooms = rooms.filter(r => selectedProperty === 'All' || r.property === selectedProperty);
            const filteredBookings = bookings.filter(b => rooms.some(r => r.name === b.room && (selectedProperty === 'All' || r.property === selectedProperty)));
            const filteredBills = bills.filter(b => selectedProperty === 'All' || b.property === selectedProperty);

            const groupedRooms = useMemo(() => {
                const propsToGroup = selectedProperty === 'All' ? properties : [selectedProperty];
                return propsToGroup.map(p => ({
                    name: p,
                    rooms: filteredRooms.filter(r => r.property === p).sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric: true}))
                })).filter(g => g.rooms.length > 0);
            }, [filteredRooms, properties, selectedProperty]);

            const accountingData = useMemo(() => {
                let inc = 0, exp = 0;
                filteredBookings.forEach(b => getPaymentSchedule(b).forEach(s => inc += (Number(s.paid) || 0)));
                filteredBills.forEach(bill => {
                    const paySum = (bill.payments || []).reduce((s, p) => s + (Number(p.amount) || 0), 0);
                    exp += paySum;
                });
                
                const monthLedger = [];
                filteredBookings.forEach(b => {
                    Object.entries(paymentLog).forEach(([key, pays]) => {
                        const parts = key.split('_');
                        if (key.startsWith(b.id) && parts.length === 3) {
                            const [idStr, mStr, yStr] = parts;
                            if (parseInt(mStr) === month && parseInt(yStr) === year) {
                                (pays || []).forEach(p => monthLedger.push({ date: p.date, label: `${b.guestName} (${b.room})`, amount: p.amount, type: 'IN' }));
                            }
                        }
                    });
                });
                
                filteredBills.forEach(bill => {
                    (bill.payments || []).forEach(p => {
                        const d = new Date(p.date);
                        if (d.getMonth() === month && d.getFullYear() === year) {
                            monthLedger.push({ date: p.date, label: `${bill.category} (${bill.property})`, amount: p.amount, type: 'OUT' });
                        }
                    });
                });

                const sortedLedger = monthLedger.sort((a,b) => new Date(b.date) - new Date(a.date));

                const historyMap = {};
                filteredBookings.forEach(b => {
                    Object.entries(paymentLog).forEach(([key, pays]) => {
                        const parts = key.split('_');
                        if (parts.length === 3) {
                            const [idStr, mStr, yStr] = parts;
                            const hKey = `${mStr}_${yStr}`;
                            if(!historyMap[hKey]) historyMap[hKey] = { inc: 0, exp: 0, label: `${mos[mStr]} ${yStr}`, sort: new Date(yStr, mStr) };
                            (pays || []).forEach(p => historyMap[hKey].inc += (Number(p.amount) || 0));
                        }
                    });
                });
                filteredBills.forEach(bill => {
                    (bill.payments || []).forEach(p => {
                        const d = new Date(p.date);
                        const hKey = `${d.getMonth()}_${d.getFullYear()}`;

                        {/* MODALS */}
                        {showModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 overflow-y-auto">
                                <div className="bg-white rounded-[2rem] w-full max-w-lg shadow-2xl overflow-hidden my-auto animate-in zoom-in duration-200">
                                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50"><h2 className="text-[15px] font-black uppercase tracking-widest pl-2">{editingId ? 'Edit Profile' : 'New Stay'}</h2><button onClick={() => setShowModal(false)} className="p-2 text-slate-400 hover:text-rose-500"><Icon name="X" size={24}/></button></div>
                                    <form onSubmit={handleSaveBooking} className="p-4 space-y-3">
                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="text" required placeholder="Guest Name" className="bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[15px] focus:bg-white outline-none" value={formData.guestName} onChange={e=>setFormData({...formData, guestName:e.target.value})} />
                                            <input type="text" placeholder="Contact/WA" className="bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[15px] focus:bg-white transition-colors outline-none" value={formData.contact} onChange={e=>setFormData({...formData, contact:e.target.value})} />
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 flex items-center gap-3"><span className="text-[12px] font-black text-slate-400 uppercase shrink-0">Unit:</span><select className="flex-1 bg-transparent font-black text-[15px] text-indigo-700 outline-none" value={formData.room} onChange={e => { const r = rooms.find(x => x.name === e.target.value); setFormData({...formData, room: e.target.value, property: r ? r.property : properties[0]}); }}>{rooms.map(r => <option key={r.id} value={r.name}>{r.name} ({r.property})</option>)}</select></div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div><label className="text-[12px] font-black text-slate-400 uppercase ml-2">In</label><input type="date" required className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[15px]" value={formData.start} onChange={e=>setFormData({...formData, start:e.target.value})} /></div>
                                            <div><label className="text-[12px] font-black text-slate-400 uppercase ml-2">Out</label><input type="date" required className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[15px]" value={formData.end} onChange={e=>setFormData({...formData, end:e.target.value})} /></div>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 flex justify-between items-center"><div className="flex flex-col"><span className="text-[12px] font-black text-slate-400 uppercase">Monthly Rate:</span><input type="number" className="bg-transparent font-black text-[18px] text-indigo-700 outline-none" value={formData.monthlyRate} onChange={e=>setFormData({...formData, monthlyRate: Number(e.target.value)})} /></div><div className="flex items-center gap-2"><span className="text-[12px] font-black text-slate-400 uppercase">Fixed Price?</span><input type="checkbox" className="w-5 h-5 rounded border-slate-300" checked={formData.isFixedPrice} onChange={e=>setFormData({...formData, isFixedPrice: e.target.checked})} /></div></div>
                                        {editingId && (
                                            <div className="border-t border-slate-100 pt-3">
                                                <button type="button" onClick={() => setShowLedgerInModal(!showLedgerInModal)} className="w-full flex items-center justify-between p-3 bg-indigo-600 text-white rounded-xl shadow-lg active:scale-95 transition-all"><div className="flex items-center gap-2 font-black text-[15px] uppercase"><Icon name="History" size={16} /><span>Ledger & Utilities</span></div><Icon name={showLedgerInModal ? "ChevronUp" : "ChevronDown"} size={20}/></button>
                                                {showLedgerInModal && (
                                                    <div className="mt-3 space-y-3 max-h-[400px] overflow-y-auto no-scrollbar pr-1">
                                                        {getPaymentSchedule(formData).map((mon, idx) => {
                                                            const key = `${editingId}_${mon.monthIndex}_${mon.year}`;
                                                            const curPayments = paymentLog[key] || [];
                                                            const balance = mon.owed - mon.paid;
                                                            return (
                                                                <div key={idx} className="bg-slate-50 border border-slate-200 rounded-2xl p-3 space-y-3 shadow-sm">
                                                                    <div className="flex justify-between items-center text-[12px] font-black uppercase border-b border-slate-200 pb-2"><span className="text-indigo-600">{mon.label} {mon.year}</span><span className={balance <= 0 ? 'text-emerald-600' : 'text-rose-600'}>Owed: ฿{balance.toLocaleString()}</span></div>
                                                                    <div className="grid grid-cols-2 gap-2">
                                                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Elec Start</label><input type="number" className="w-full bg-white p-1.5 rounded border border-slate-200 font-black text-[13px]" value={mon.util.elecStart} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'elecStart', e.target.value)} /></div>
                                                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Elec End</label><input type="number" className="w-full bg-white p-1.5 rounded border border-slate-200 font-black text-[13px]" value={mon.util.elecEnd} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'elecEnd', e.target.value)} /></div>
                                                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Rate (฿/U)</label><input type="number" className="w-full bg-white p-1.5 rounded border border-slate-200 font-black text-[13px]" value={mon.util.elecRate} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'elecRate', e.target.value)} /></div>
                                                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Water (฿)</label><input type="number" className="w-full bg-white p-1.5 rounded border border-slate-200 font-black text-[13px]" value={mon.util.water} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'water', e.target.value)} /></div>
                                                                    </div>
                                                                    {curPayments.length > 0 && (
                                                                        <div className="space-y-1.5 py-2 border-t border-slate-200">
                                                                            {curPayments.map(p => (
                                                                                <div key={p.id} className="flex gap-2 items-center">
                                                                                    <input type="date" className="bg-white border border-slate-200 rounded px-1.5 py-0.5 text-[12px] font-black w-24 outline-none" value={p.date} onChange={e => updatePayLocal(editingId, mon.monthIndex, mon.year, p.id, 'date', e.target.value)} />
                                                                                    <input type="number" className="flex-1 bg-white border border-slate-200 rounded px-1.5 py-0.5 text-[13px] font-black outline-none" value={p.amount} onChange={e => updatePayLocal(editingId, mon.monthIndex, mon.year, p.id, 'amount', e.target.value)} />
                                                                                    <button type="button" onClick={() => deletePayLocal(editingId, mon.monthIndex, mon.year, p.id)} className="text-rose-400 hover:text-rose-600 transition-colors"><Icon name="Trash" size={14} /></button>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    )}
                                                                    <div className="flex gap-2"><div className="flex-1 relative"><input type="number" id={`pay-${idx}`} className="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-[15px] font-black outline-none pr-10" placeholder="฿ amount" /><button type="button" onClick={() => { const el = document.getElementById(`pay-${idx}`); if(el) el.value = balance > 0 ? balance : 0; }} className="absolute right-2 top-2 text-[10px] font-black text-indigo-500 hover:text-indigo-700 uppercase">Fill</button></div><button type="button" onClick={()=>{const el=document.getElementById(`pay-${idx}`); if(el){ addPayLocal(editingId, mon.monthIndex, mon.year, el.value); el.value=''; } }} className="bg-slate-900 text-white p-2.5 rounded-xl active:scale-90 transition-all"><Icon name="PlusCircle" size={20}/></button></div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                        <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl hover:bg-indigo-700 transition-all text-[15px]">Update Database</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {showBillModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 overflow-y-auto">
                                <div className="bg-white rounded-[2rem] w-full max-w-lg shadow-2xl overflow-hidden my-auto animate-in zoom-in duration-200">
                                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50"><h2 className="text-[15px] font-black uppercase tracking-widest pl-2">{editingBillId ? 'Edit Expense' : 'New Expense'}</h2><button onClick={() => setShowBillModal(false)} className="p-2 text-slate-400 hover:text-rose-500"><Icon name="X" size={24}/></button></div>
                                    <form onSubmit={handleBillSave} className="p-4 space-y-3">
                                        <div className="grid grid-cols-2 gap-2">
                                            <select className="bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[15px]" value={billFormData.category} onChange={e=>setBillFormData({...billFormData, category:e.target.value})}>{BILL_CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.id}</option>)}</select>
                                            <select className="bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[15px]" value={billFormData.property} onChange={e=>setBillFormData({...billFormData, property:e.target.value})}>{properties.map(p => <option key={p} value={p}>{p}</option>)}</select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div><label className="text-[12px] font-black text-slate-400 uppercase ml-2">Due Date</label><input type="date" required className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[15px]" value={billFormData.dueDate} onChange={e=>setBillFormData({...billFormData, dueDate:e.target.value})} /></div>
                                            <div><label className="text-[12px] font-black text-slate-400 uppercase ml-2">Total Amount</label><input type="number" required className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[15px]" value={billFormData.amount} onChange={e=>setBillFormData({...billFormData, amount:Number(e.target.value)})} /></div>
                                        </div>
                                        {editingBillId && (
                                            <div className="bg-slate-50 p-3 rounded-2xl border border-slate-200 space-y-2">
                                                <span className="text-[12px] font-black text-slate-400 uppercase tracking-widest">Payment Ledger</span>
                                                <div className="space-y-1.5 max-h-[150px] overflow-y-auto no-scrollbar">
                                                    {(billFormData.payments || []).map(p => (
                                                        <div key={p.id} className="flex gap-2 items-center bg-white p-1.5 rounded-lg border border-slate-100">
                                                            <input type="date" className="bg-white border border-slate-200 rounded px-1.5 py-0.5 text-[12px] font-black w-24 outline-none" value={p.date} onChange={e => updateBillPayLocal(editingBillId, p.id, 'date', e.target.value)} />
                                                            <input type="number" className="flex-1 bg-white border border-slate-200 rounded px-1.5 py-0.5 text-[13px] font-black text-indigo-700 outline-none" value={p.amount} onChange={e => updateBillPayLocal(editingBillId, p.id, 'amount', e.target.value)} />
                                                            <button type="button" onClick={() => deleteBillPayLocal(editingBillId, p.id)} className="text-rose-400 hover:text-rose-600 transition-colors"><Icon name="Trash" size={14} /></button>
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="flex gap-2 pt-1 border-t border-slate-200"><input type="number" id="bill-pay-amt-modal" className="flex-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-[15px] font-black outline-none" placeholder="฿ Log Payment" /><button type="button" onClick={() => { const el = document.getElementById('bill-pay-amt-modal'); if(el) { addBillPayLocal(editingBillId, el.value); el.value = ''; } }} className="bg-slate-900 text-white p-2.5 rounded-xl"><Icon name="PlusCircle" size={18}/></button></div>
                                            </div>
                                        )}
                                        <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl hover:bg-indigo-700 transition-all text-[15px]">Save Changes</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {showSettings && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 overflow-y-auto">
                                <div className="bg-white rounded-[2rem] w-full max-w-lg shadow-2xl overflow-hidden my-auto animate-in zoom-in">
                                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50"><h2 className="text-[15px] font-black uppercase tracking-widest pl-2">System Config</h2><button onClick={() => setShowSettings(false)} className="p-2 text-slate-400 hover:text-slate-600"><Icon name="X" size={24}/></button></div>
                                    <div className="p-4 space-y-6 max-h-[70vh] overflow-y-auto pr-2">
                                        <section className="space-y-2"><h3 className="text-[12px] font-black text-slate-400 uppercase tracking-widest border-b pb-1 ml-1">Properties</h3>{properties.map((p, i) => (<div key={i} className="flex gap-2"><input type="text" className="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[15px]" value={p} onChange={e => { const n = [...properties]; n[i] = e.target.value; setProperties(n); sync({properties: n}); }} /><button onClick={() => { if(confirm('Delete?')) { const n = properties.filter((_, idx) => idx !== i); setProperties(n); sync({properties: n}); } }} className="p-2.5 text-rose-500 hover:bg-rose-50 rounded-xl transition-all"><Icon name="Trash" size={18} /></button></div>))}<button onClick={() => { const n = [...properties, `New Prop`]; setProperties(n); sync({properties: n}); }} className="w-full py-2.5 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-black text-[12px] uppercase tracking-widest hover:border-indigo-600 transition-all">+ ADD PROPERTY</button></section>
                                        <section className="space-y-2"><h3 className="text-[12px] font-black text-slate-400 uppercase tracking-widest border-b pb-1 ml-1">Units</h3>{rooms.map(r => (<div key={r.id} className="grid grid-cols-2 gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-200 items-center"><div className="flex flex-col"><span className="text-[12px] font-bold text-slate-400 uppercase ml-1">ID</span><input type="text" className="bg-white p-1.5 rounded-lg font-black text-[15px] border border-slate-200 focus:bg-indigo-50 transition-colors" value={r.name} onChange={e => { const n = rooms.map(x => x.id === r.id ? {...x, name: e.target.value} : x); setRooms(n); sync({rooms: n}); }} /></div><div className="flex gap-2 items-end"><div className="flex flex-col flex-1"><span className="text-[12px] font-bold text-slate-400 uppercase ml-1">Property</span><select className="bg-white p-1.5 rounded-lg font-black text-[12px] border border-slate-200" value={r.property} onChange={e => { const n = rooms.map(x => x.id === r.id ? {...x, property: e.target.value} : x); setRooms(n); sync({rooms: n}); }}>{properties.map(p => <option key={p} value={p}>{p}</option>)}</select></div><button onClick={() => { if(confirm('Delete unit?')) { const n = rooms.filter(x => x.id !== r.id); setRooms(n); sync({rooms: n}); } }} className="p-2 text-rose-400 hover:bg-rose-50 rounded-xl transition-all"><Icon name="Trash" size={16} /></button></div></div>))}<button onClick={() => { const n = [...rooms, { id: `r${Date.now()}`, name: 'NEW', property: (properties[0] || 'Property A') }]; setRooms(n); sync({rooms: n}); }} className="w-full py-2.5 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-black text-[12px] uppercase tracking-widest hover:border-indigo-600 transition-all">+ ADD UNIT</button></section>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="fixed bottom-0 inset-x-0 bg-slate-900 text-white text-[10px] p-2 flex gap-4 items-center justify-center border-t border-white/10 z-[200]">
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${dbStatus.auth.includes('Active') ? 'bg-emerald-500' : 'bg-rose-500'}`} /><span className="opacity-50 uppercase">Auth:</span><span>{dbStatus.auth}</span></div>
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${dbStatus.firestore === 'Synced ✓' ? 'bg-emerald-500' : 'bg-rose-500'}`} /><span className="opacity-50 uppercase">App ID:</span><span>{appId}</span></div>
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full bg-sky-500`} /><span className="opacity-50 uppercase">Project:</span><span>{firebaseConfig.projectId}</span></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://loren-6q.github.io/WETNav/nav.js"></script>
</body>
</html>
