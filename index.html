        function App() {

            const [historySearch, setHistorySearch] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: 'start', direction: 'asc' });
            const [showAllBills, setShowAllBills] = useState(false);
            const [rooms, setRooms] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [paymentLog, setPaymentLog] = useState({});
            const [utilityLog, setUtilityLog] = useState({});
            const [bills, setBills] = useState([]);
            const [properties, setProperties] = useState(['Property A', 'Property B']);
            const [dbStatus, setDbStatus] = useState({ auth: 'Wait...', firestore: 'Wait...', error: null });
            const [hasLoaded, setHasLoaded] = useState(false);
            const isReadyToSync = useRef(false);
            const [deleteTarget, setDeleteTarget] = useState(null); 
            const [showModal, setShowModal] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [showLedgerInModal, setShowLedgerInModal] = useState(false);
            const [showNotesInModal, setShowNotesInModal] = useState(false);
            const [showBillLedgerId, setShowBillLedgerId] = useState(null);
            const [formData, setFormData] = useState({ guestName: '', contact: '', room: '', property: '', start: '', end: '', monthlyRate: 5000, isFixedPrice: false, manualStatus: 'auto', notes: '' });
            const [billFormData, setBillFormData] = useState({ title: '', category: 'Electric', property: 'Property A', amount: 0, dueDate: '', payments: [] });

            const t = (key) => TRANSLATIONS[lang][key] || key;
            const toISODate = (date) => date.toLocaleDateString('sv-SE');
            const getMonthYearShort = (date) => `${lang === 'th' ? mosTh[date.getMonth()] : mosEn[date.getMonth()]} ${date.getFullYear()}`;
            const formatRemDate = (dateStr) => { if (!dateStr) return '...'; const d = new Date(dateStr); return `${d.getDate()}${mosEn[d.getMonth()]}`; };
            const formatBarDate = (dateStr) => { if (!dateStr) return ''; const d = new Date(dateStr); return `${d.getDate()}${mosEn[d.getMonth()]}`; };
            
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const getStatus = (b) => {
                if (!b) return STAY_STATUSES.OUT;
                if (b.manualStatus === 'checked-in') return STAY_STATUSES.IN;
                if (b.manualStatus === 'checked-out') return STAY_STATUSES.OUT;
                if (b.manualStatus === 'future') return STAY_STATUSES.FUT;
                const s = new Date(b.start), e = new Date(b.end);
                return (TODAY < s) ? STAY_STATUSES.FUT : (TODAY >= s && TODAY < e) ? STAY_STATUSES.IN : STAY_STATUSES.OUT;
            };

            const getBarColor = (b, bal) => {
                const s = getStatus(b);
                if (s.id === 'checked-out') return 'bg-slate-400';
                if (s.id === 'future') return 'bg-blue-600';
                return bal > 0 ? 'bg-rose-600' : 'bg-emerald-600';
            };

            const getPaymentSchedule = (booking) => {
                if (!booking || !booking.start || !booking.end) return [];
                const start = new Date(booking.start), end = new Date(booking.end);
                const schedule = [];
                let current = new Date(start.getFullYear(), start.getMonth(), 1);
                let isFirst = true;
                while (current <= end) {
                    const cY = current.getFullYear(), cM = current.getMonth();
                    const mD = new Date(cY, cM + 1, 0).getDate();
                    const sDay = (cM === start.getMonth() && cY === start.getFullYear()) ? start.getDate() : 1;
                    const eDay = (cM === end.getMonth() && cY === end.getFullYear()) ? end.getDate() : mD + 1;
                    const days = Math.max(0, eDay - sDay);
                    if (days > 0) {
                        let rent = booking.isFixedPrice ? (isFirst ? (Number(booking.monthlyRate) || 0) : 0) : Math.round((days >= mD ? (Number(booking.monthlyRate) || 0) : ((Number(booking.monthlyRate) || 0) / mD) * days));
                        const key = `${booking.id}_${cM}_${cY}`;
                        const util = utilityLog[key] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 0, otherAmt: 0, otherNote: '' };
                        const electricOwed = util.elecEnd > 0 ? Math.round(Math.max(0, (util.elecEnd - util.elecStart) * (Number(util.elecRate) || 8))) : 0;
                        const owed = rent + electricOwed + (Number(util.water) || 0) + (Number(util.otherAmt) || 0);
                        const paid = (paymentLog[key] || []).reduce((s, p) => s + (Number(p.amount) || 0), 0);
                        schedule.push({ monthIndex: cM, year: cY, label: mosEn[cM], rent, electricOwed, waterOwed: util.water, otherOwed: util.otherAmt, otherNote: util.otherNote, owed, paid, util, dueDate: toISODate(new Date(cY, cM, isFirst ? start.getDate() : 1)) });
                        isFirst = false;
                    }
                    current = new Date(cY, cM + 1, 1);
                }
                return schedule;
            };

            const filteredRooms = rooms.filter(r => selectedProperty === 'All' || r.property === selectedProperty);
            const filteredBookings = bookings.filter(b => rooms.some(r => r.name === b.room && (selectedProperty === 'All' || r.property === selectedProperty)));
            const groupedRooms = useMemo(() => {
                const props = selectedProperty === 'All' ? properties : [selectedProperty];
                return props.map(p => ({ name: p, rooms: filteredRooms.filter(r => r.property === p).sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric: true})) })).filter(g => g.rooms.length > 0);
            }, [filteredRooms, properties, selectedProperty]);

            const filteredBills = useMemo(() => {
                let list = bills.filter(b => (selectedProperty === 'All' || b.property === selectedProperty) && (selectedBillCategory === 'All' || b.category === selectedBillCategory));
                if (!showAllBills) {
                    const cut = new Date(TODAY); cut.setDate(cut.getDate() - 60);
                    list = list.filter(bill => ((Number(bill.amount) - (bill.payments || []).reduce((s, p) => s + (Number(p.amount) || 0), 0)) > 0) || new Date(bill.dueDate) >= cut);
                }
                return list.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));
            }, [bills, selectedProperty, selectedBillCategory, showAllBills]);

            const accountingData = useMemo(() => {
                let totalIncome = 0; let totalExpense = 0;
                const currentMonthLedger = []; const historyMap = {};
                const visibleBookingIds = new Set(filteredBookings.map(b => b.id));
                const bookingLookup = {}; filteredBookings.forEach(b => bookingLookup[b.id] = b);
                Object.entries(paymentLog).forEach(([key, pays]) => {
                    const parts = key.split('_');
                    if (parts.length === 3 && visibleBookingIds.has(parts[0])) {

                                    </div>
                                </div>
                                <div className="card-standard"><div className="overflow-x-auto"><table className="w-full text-left"><thead><tr><th className="th-custom">{t('CATEGORY')}</th><th className="th-custom">{t('PROPERTY')}</th><th className="th-custom">{t('DUE_DATE')}</th><th className="th-custom">{t('AMOUNT')}</th><th className="th-custom">{t('AMT_DUE')}</th><th className="th-custom text-right"></th></tr></thead><tbody className="divide-y divide-slate-100">{filteredBills.map(bill => {
                                    const paid = (bill.payments || []).reduce((s,p)=>s+p.amount, 0); const bal = Number(bill.amount) - paid; const isExp = showBillLedgerId === bill.id;
                                    const catInfo = BILL_CATEGORIES.find(c => c.id === bill.category);
                                    return (<Fragment key={bill.id}><tr className={`hover:bg-slate-50 transition-colors ${isExp ? 'bg-indigo-50/30' : ''}`}><td className="td-custom"><div className="flex items-center gap-2"><div className={`p-1.5 rounded-lg ${bal<=0?'bg-emerald-50 text-emerald-600':'bg-rose-50 text-rose-600'}`}><Icon name={catInfo?.icon || 'Receipt'} size={18}/></div><span>{lang==='th' ? catInfo?.labelTh : bill.category}</span></div></td><td className="td-custom opacity-70">{bill.property}</td><td className="td-custom opacity-70 uppercase">{formatRemDate(bill.dueDate)}</td><td className="td-custom">฿{bill.amount.toLocaleString()}</td><td className={`td-custom ${bal > 0 ? 'text-rose-600' : 'text-emerald-600 opacity-50'}`}>฿{bal.toLocaleString()}</td><td className="td-custom text-right"><div className="flex justify-end gap-1">{bal > 0 && (<button onClick={() => handleQuickBillPay(bill)} className="p-1.5 text-emerald-600 hover:bg-emerald-50 rounded-lg"><Icon name="Check" size={20}/></button>)}<button onClick={() => setShowBillLedgerId(isExp ? null : bill.id)} className={`p-1.5 rounded-lg transition-colors ${isExp ? 'bg-indigo-600 text-white' : 'text-indigo-600 hover:bg-indigo-50'}`}><Icon name="Pencil" size={20}/></button><button onClick={() => duplicateBill(bill)} className="p-1.5 text-slate-400 hover:bg-slate-100 rounded-lg"><Icon name="Copy" size={20}/></button><button onClick={() => setDeleteTarget({type: 'bill', id: bill.id})} className="p-1.5 text-rose-400 hover:bg-rose-50 rounded-lg"><Icon name="Trash" size={20}/></button></div></td></tr>
                                    {isExp && (<tr><td colSpan="6" className="p-0 bg-white border-b"><div className="p-3 bg-indigo-50/50 space-y-3 animate-in slide-in-from-top-2 duration-200"><div className="flex flex-wrap items-end gap-2"><div className="w-[140px]"><label className="badge-label">{t('CATEGORY')}</label><select className="input-base w-full p-1.5 text-[15px] font-condensed" value={bill.category} onChange={e=>handleBillUpdateField(bill.id, 'category', e.target.value)}>{BILL_CATEGORIES.map(c=><option key={c.id} value={c.id}>{lang==='th'?c.labelTh:c.labelEn}</option>)}</select></div><div className="w-[140px]"><label className="badge-label">{t('PROPERTY')}</label><select className="input-base w-full p-1.5 text-[15px] font-condensed" value={bill.property} onChange={e=>handleBillUpdateField(bill.id, 'property', e.target.value)}>{properties.map(p=><option key={p} value={p}>{p}</option>)}</select></div><div className="w-[140px]"><label className="badge-label">{t('DUE_DATE')}</label><input type="date" className="input-base w-full p-1.5 text-[15px] font-condensed" value={bill.dueDate} onChange={e=>handleBillUpdateField(bill.id, 'dueDate', e.target.value)} /></div><div className="w-[120px]"><label className="badge-label">{t('AMOUNT')}</label><input type="number" className="input-base w-full p-1.5 text-[15px] font-condensed" value={bill.amount} onChange={e=>handleBillUpdateField(bill.id, 'amount', e.target.value)} /></div><div className="flex-1 min-w-[200px]"><label className="badge-label">{t('DESC')}</label><input className="input-base w-full p-1.5 text-[15px] font-condensed" placeholder="Details..." value={bill.title||''} onChange={e=>handleBillUpdateField(bill.id, 'title', e.target.value)} /></div></div><div className="border-t border-indigo-200 pt-2"><p className="badge-label mb-1">Payments Log</p><div className="space-y-1">{(bill.payments || []).map(p => (<div key={p.id} className="flex items-center gap-2"><input type="date" className="input-base py-1 px-2 text-[14px] font-condensed w-[130px]" value={p.date} onChange={e => handleBillPaymentUpdate(bill.id, p.id, 'date', e.target.value)} /><div className="relative w-[110px]"><span className="absolute left-1.5 top-1/2 -translate-y-1/2 text-slate-400 text-[12px]">฿</span><input type="number" className="input-base py-1 pl-4 pr-1 text-[14px] font-condensed w-full" value={p.amount} onChange={e => handleBillPaymentUpdate(bill.id, p.id, 'amount', e.target.value)} /></div><button onClick={() => handleBillPaymentDelete(bill.id, p.id)} className="text-rose-400 hover:text-rose-600 transition-colors"><Icon name="Trash" size={16}/></button></div>))}</div></div></div></td></tr>)}</Fragment>);
                                })}</tbody></table></div></div>
                            </div>
                        )}

                        {/* GUESTS TAB - Fixed Filter */}
                        {activeTab === 'history' && (
                            <div className="max-w-[1800px] mx-auto p-2 animate-in fade-in duration-300 font-black">
                                <div className="bg-white p-2 px-4 rounded-2xl border border-slate-300 shadow-sm flex flex-wrap items-center justify-between gap-3 mb-2 font-black">
                                    <h2 className="text-[18px] uppercase text-indigo-700 flex items-center gap-2"><Icon name="Users" size={18}/> {t('GUESTS')}</h2>
                                    <div className="relative flex-1 max-w-xs"><Icon name="Search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16}/><input className="w-full bg-slate-100 border-none rounded-xl pl-10 pr-3 py-1.5 outline-none focus:ring-2 focus:ring-indigo-500 font-black font-condensed text-[18px]" placeholder={t('SEARCH')} value={historySearch} onChange={e=>setHistorySearch(e.target.value)} /></div>
                                </div>
                                <div className="card-standard"><div className="overflow-x-auto"><table className="w-full text-left table-fixed"><thead><tr><th className="th-custom hover:bg-slate-100 cursor-pointer w-[25%]" onClick={() => handleSort('guestName')}>Guest {getSortIcon('guestName')}</th><th className="th-custom hover:bg-slate-100 cursor-pointer w-[20%]" onClick={() => handleSort('property')}>Property {getSortIcon('property')}</th><th className="th-custom hover:bg-slate-100 cursor-pointer w-[15%]" onClick={() => handleSort('room')}>Room {getSortIcon('room')}</th><th className="th-custom hover:bg-slate-100 cursor-pointer w-[15%]" onClick={() => handleSort('start')}>Start {getSortIcon('start')}</th><th className="th-custom hover:bg-slate-100 cursor-pointer w-[15%]" onClick={() => handleSort('end')}>End {getSortIcon('end')}</th></tr></thead><tbody className="divide-y text-[15px]">{allGuestsSorted.map(b => (<tr key={b.id} onClick={() => { setEditingId(b.id); setFormData({...b}); setShowModal(true); }} className="hover:bg-slate-50 font-black cursor-pointer uppercase"><td className="td-custom truncate">{b.guestName}</td><td className="td-custom opacity-70 truncate">{b.property}</td><td className="td-custom text-indigo-600 truncate">{b.room}</td><td className="td-custom opacity-70 truncate">{b.start}</td><td className="td-custom opacity-70 truncate">{b.end}</td></tr>))}</tbody></table></div></div>
                            </div>
                        )}

                        {/* ACCOUNTING TAB */}
                        {activeTab === 'accounting' && (
                            <div className="p-2 max-w-[1800px] mx-auto space-y-4 animate-in fade-in duration-500 font-black">
                                <div className="grid grid-cols-1 min-[500px]:grid-cols-3 gap-2"><div className="bg-white p-3 rounded-2xl border border-slate-300 shadow-sm font-black"><p className="badge-label !ml-0 !mb-0 text-[15px]">{t('TOTAL_INCOME')}</p><h2 className="text-[20px] text-emerald-600">฿{accountingData.income.toLocaleString()}</h2></div><div className="bg-white p-3 rounded-2xl border border-slate-300 shadow-sm font-black"><p className="badge-label !ml-0 !mb-0 text-[15px]">{t('TOTAL_EXPENSE')}</p><h2 className="text-[20px] text-rose-600">฿{accountingData.expense.toLocaleString()}</h2></div><div className="bg-indigo-700 p-3 rounded-2xl text-white shadow-xl font-black"><p className="text-[12px] text-indigo-300 uppercase tracking-tighter">Current Net</p><h2 className="text-[20px]">฿{accountingData.net.toLocaleString()}</h2></div></div>
                                <div className="card-standard"><div className="bg-slate-50 px-4 py-2 border-b font-black uppercase text-indigo-700">{t('LEDGER')} • {getMonthYearShort(viewDate)}</div><div className="overflow-x-auto"><table className="w-full text-left"><thead><tr><th className="th-custom">Date</th><th className="th-custom">Reference</th><th className="th-custom text-right">Amount</th></tr></thead><tbody className="divide-y text-[15px]">{accountingData.monthLedger.map((item, idx) => (<tr key={idx} className="hover:bg-slate-50 font-black uppercase"><td className="td-custom text-slate-400">{item.date}</td><td className="td-custom">{item.label}</td><td className={`td-custom text-right ${item.type==='IN'?'text-emerald-600':'text-rose-600'}`}>{item.type==='IN'?'+':'-'}฿{item.amount.toLocaleString()}</td></tr>))}</tbody></table></div></div>
                                <div className="card-standard"><div className="bg-slate-50 px-4 py-2 border-b font-black uppercase text-indigo-700">{t('HISTORY')}</div><div className="overflow-x-auto"><table className="w-full text-left"><thead><tr><th className="th-custom">Month</th><th className="th-custom">Income</th><th className="th-custom">Expense</th><th className="th-custom text-right">Net</th></tr></thead><tbody className="divide-y text-[15px]">{accountingData.history.map((h, i) => (<tr key={i} onClick={() => setViewDate(new Date(h.y, h.m, 1))} className="hover:bg-indigo-50 cursor-pointer font-black"><td className="td-custom uppercase">{h.label}</td><td className="td-custom text-emerald-600">฿{h.inc.toLocaleString()}</td><td className="td-custom text-rose-600">฿{h.exp.toLocaleString()}</td><td className={`td-custom text-right ${h.inc-h.exp>=0?'text-emerald-700':'text-rose-700'}`}>฿{(h.inc-h.exp).toLocaleString()}</td></tr>))}</tbody></table></div></div>
                            </div>
                        )}

                        {/* GUEST MODAL - Fixed Icons & Input */}
                        {showModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 font-black font-condensed">
                                <div className="bg-white rounded-[1.5rem] w-full max-w-lg shadow-2xl overflow-hidden animate-in zoom-in duration-150">
                                    <div className="p-2 border-b border-slate-200 flex items-center bg-slate-50 gap-2">
                                        <input type="text" required placeholder={t('GUEST_NAME')} className="flex-1 bg-transparent text-[22px] font-black uppercase text-indigo-800 border-none focus:ring-0 outline-none placeholder:text-indigo-200" value={formData.guestName} onChange={e=>setFormData({...formData, guestName:e.target.value})} />
                                        <button onClick={() => setShowModal(false)} className="p-1 text-slate-400 hover:text-rose-500"><Icon name="X" size={24}/></button>
                                    </div>

                                    <form onSubmit={handleSaveBooking} className="p-3 space-y-2">
                                        <div className="grid grid-cols-3 gap-2">
                                            <div><label className="badge-label text-[15px]">{t('CONTACT')}</label><input type="text" className="input-base w-full py-1.5 px-2 text-[20px]" value={formData.contact} onChange={e=>setFormData({...formData, contact:e.target.value})} /></div>
                                            <div><label className="badge-label text-[15px]">{t('UNIT')}</label><select className="input-base w-full py-1.5 text-indigo-700 text-[20px]" value={formData.room} onChange={e => { const r = rooms.find(x => x.name === e.target.value); setFormData({...formData, room: e.target.value, property: r?.property || properties[0]}); }}>{rooms.map(r => <option key={r.id} value={r.name}>{r.name}</option>)}</select></div>
                                            <div><label className="badge-label text-[15px]">Status</label><select className="input-base w-full py-1.5 text-indigo-700 uppercase text-[20px]" value={formData.manualStatus} onChange={e=>setFormData({...formData, manualStatus:e.target.value})}><option value="auto">Auto</option><option value="future">Future</option><option value="checked-in">In</option><option value="checked-out">Out</option></select></div>
                                        </div>

                                        <div className="grid grid-cols-4 gap-2">
                                            <div><label className="badge-label text-[15px]">In</label><input type="date" required className="w-full input-base py-1.5 px-2 text-[17px]" value={formData.start} onChange={e=>setFormData({...formData, start:e.target.value})} /></div>
                                            <div><label className="badge-label text-[15px]">Out</label><input type="date" required className="w-full input-base py-1.5 px-2 text-[17px]" value={formData.end} onChange={e=>setFormData({...formData, end:e.target.value})} /></div>
                                            <div><label className="badge-label text-[15px]">{t('RATE')}</label><input type="number" className="w-full input-base py-1.5 text-indigo-700 text-[20px]" value={formData.monthlyRate} onChange={e=>setFormData({...formData, monthlyRate: Number(e.target.value)})} /></div>
                                            <div className="flex flex-col items-center justify-end pb-1.5"><label className="badge-label text-[15px] !mb-1">{t('FIXED')}</label><input type="checkbox" className="w-7 h-7 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500" checked={formData.isFixedPrice} onChange={e=>setFormData({...formData, isFixedPrice: e.target.checked})} /></div>
                                        </div>

                                        <div className="pt-1">
                                            <button type="button" onClick={() => setShowNotesInModal(!showNotesInModal)} className="w-full flex items-center justify-between p-2.5 bg-slate-100 text-slate-500 rounded-xl font-black uppercase text-[19px]">
                                                <div className="flex items-center gap-2"><Icon name="StickyNote" size={20} /><span>{t('GUEST_NOTES')}</span></div>
                                                <Icon name={showNotesInModal ? "ChevronUp" : "ChevronDown"} size={22}/>
                                            </button>
                                            {showNotesInModal && <textarea className="w-full mt-1.5 input-base h-20 text-[18px]" placeholder="..." value={formData.notes || ''} onChange={e => setFormData({...formData, notes: e.target.value})} />}
                                        </div>

                                        {editingId && (
                                            <div className="pt-0.5">
                                                <button type="button" onClick={() => setShowLedgerInModal(!showLedgerInModal)} className="w-full flex items-center justify-between p-2.5 bg-indigo-50 text-indigo-600 rounded-xl font-black uppercase text-[19px] border border-indigo-100 shadow-sm">
                                                    <div className="flex items-center gap-2"><Icon name="History" size={20} /><span>{t('PAYMENTS')}</span></div>
                                                    <Icon name={showLedgerInModal ? "ChevronUp" : "ChevronDown"} size={22}/>
                                                </button>
                                                {showLedgerInModal && <div className="mt-2 space-y-1.5 max-h-[350px] overflow-y-auto no-scrollbar font-black">
                                                    {getPaymentSchedule(formData).map((mon, idx) => ( 
                                                        <div key={idx} className="bg-white border-2 border-slate-200 rounded-xl p-2.5 space-y-2 font-black text-[17px]">
                                                            <div className="flex justify-between items-center uppercase text-slate-400 border-b border-slate-100 pb-1 gap-1">
                                                                <span className="text-indigo-600 shrink-0 w-20">{mon.label}</span>
                                                                <div className="flex-1 flex gap-2 text-[13px] overflow-hidden truncate">
                                                                    <span>{t('RENT')}: {mon.rent}</span>
                                                                    <span className="text-amber-600">{t('ELEC')}: {mon.electricOwed}</span>
                                                                    <span className="text-blue-600">{t('WATER')}: {mon.waterOwed}</span>
                                                                    <span>{t('OTHER')}: {mon.otherOwed}</span>
                                                                </div>
                                                                <span className={`shrink-0 ${mon.owed-mon.paid <= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>OWES: ฿{(mon.owed-mon.paid).toLocaleString()}</span>
                                                            </div>
                                                            <div className="grid grid-cols-3 gap-2">
                                                                <div className="col-span-2 flex items-center gap-1.5 bg-slate-50 p-1.5 rounded-lg border">
                                                                    <Icon name="Zap" size={16} className="text-amber-500" />
                                                                    <span className="text-[13px] uppercase text-slate-400 mr-auto">{t('ELEC')}</span>
                                                                    <input type="number" placeholder="Start" className="w-18 bg-white border rounded text-center text-[15px]" value={mon.util.elecStart} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'elecStart', e.target.value)} />
                                                                    <input type="number" placeholder="End" className="w-18 bg-white border rounded text-center text-[15px]" value={mon.util.elecEnd} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'elecEnd', e.target.value)} />
                                                                    <input type="number" className="w-12 bg-white border rounded text-center text-[15px] text-amber-600" value={mon.util.elecRate} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'elecRate', e.target.value)} />
                                                                </div>
                                                                <div className="col-span-1 flex items-center gap-1.5 bg-slate-50 p-1.5 rounded-lg border">
                                                                    <Icon name="Droplets" size={16} className="text-blue-500" />
                                                                    <span className="text-[13px] uppercase text-slate-400 mr-auto">{t('WATER')}</span>
                                                                    <input type="number" className="w-20 bg-white border rounded text-center text-[15px] text-blue-600" value={mon.util.water} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'water', e.target.value)} />
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center gap-2 bg-slate-50 p-1.5 rounded-lg border">
                                                                <Icon name="PlusCircle" size={16} className="text-slate-400" />
                                                                <span className="text-[13px] uppercase text-slate-400">{t('OTHER')}</span>
                                                                <input type="number" className="w-24 bg-white border rounded px-1 text-[15px]" value={mon.util.otherAmt} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'otherAmt', e.target.value)} />
                                                                <input type="text" className="flex-1 bg-white border rounded px-1 text-[15px]" placeholder="Note..." value={mon.util.otherNote} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'otherNote', e.target.value)} />
                                                            </div>
                                                            <div className="border-t border-slate-100 pt-1.5">
                                                                <p className="text-[13px] text-indigo-400 uppercase tracking-widest mb-1">Payments History</p>
                                                                {(paymentLog[`${editingId}_${mon.monthIndex}_${mon.year}`] || []).map(p => ( 
                                                                    <div key={p.id} className="flex gap-2 items-center bg-emerald-50/40 p-1 rounded-lg">
                                                                        <span className="text-[14px] w-28">{p.date}</span>
                                                                        <span className="flex-1 text-emerald-700 text-right pr-1 font-black">฿{p.amount}</span>
                                                                        <button type="button" onClick={() => deletePayLocal(editingId, mon.monthIndex, mon.year, p.id)} className="text-rose-400 px-1 hover:scale-110"><Icon name="Trash" size={18} /></button>
                                                                    </div> 
                                                                ))}
                                                                <div className="flex items-center gap-2 pt-1 border-t border-slate-100 mt-1">
                                                                    <p className="text-[13px] text-slate-400 uppercase shrink-0">{t('ADD_PAYMENT')}</p>
                                                                    <input type="number" id={`pay-${idx}`} className="flex-1 bg-indigo-50 border-indigo-100 rounded-lg px-2 py-1 outline-none text-[17px] text-indigo-700" defaultValue={Math.max(0, Math.round(mon.owed - mon.paid))} />
                                                                    <button type="button" onClick={()=>{const el=document.getElementById(`pay-${idx}`); if(el?.value){ addPayLocal(editingId, mon.monthIndex, mon.year, el.value); el.value=0; } }} className="bg-slate-900 text-white p-1.5 rounded-lg"><Icon name="Check" size={20}/></button>
                                                                </div>
                                                            </div>
                                                        </div> 
                                                    ))}
                                                </div>}
                                            </div>
                                        )}
                                        <div className="flex gap-2 pt-1">
                                            {editingId && <button type="button" onClick={() => setDeleteTarget({type:'booking', id:editingId})} className="px-4 py-3 bg-rose-50 text-rose-600 rounded-2xl active:scale-95 transition-all"><Icon name="Trash" size={20}/></button>}
                                            <button type="submit" className="flex-1 bg-indigo-600 text-white py-1 pr-4 rounded-2xl font-black uppercase text-[19px] shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                                                <Icon name="Check" size={20}/> {t('UPDATE')}
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* DELETE CONFIRMATION */}
                        {deleteTarget && (
                            <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[200] flex items-center justify-center p-4 animate-in fade-in duration-100 font-condensed">
                                <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl space-y-4 border-t-4 border-rose-500 font-black">
                                    <h2 className="text-[20px] uppercase text-slate-800">{t('CONFIRM_DELETE')}</h2>
                                    <p className="text-slate-500 text-[16px] leading-tight">{t('DELETE_MSG')}</p>
                                    <div className="flex gap-2 pt-2">
                                        <button onClick={() => setDeleteTarget(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-black uppercase text-[14px]">{t('CANCEL')}</button>
                                        <button onClick={() => { executeDelete(); setDeleteTarget(null); }} className="flex-1 py-3 bg-rose-600 text-white rounded-xl font-black uppercase text-[14px] shadow-lg shadow-rose-600/30">{t('DELETE')}</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* DIAGNOSTIC PANEL */}
                        <div className="fixed bottom-0 inset-x-0 bg-slate-900 text-white text-[12px] p-2 flex gap-4 items-center justify-center border-t border-white/10 z-[200] font-black uppercase tracking-widest font-condensed">
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${dbStatus.auth.includes('✓') ? 'bg-emerald-500' : 'bg-rose-500'}`} /><span className="opacity-50">Auth:</span><span>{dbStatus.auth}</span></div>
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${dbStatus.firestore === 'Synced' ? 'bg-emerald-500' : 'bg-rose-500'}`} /><span className="opacity-50">Sync:</span><span>{dbStatus.firestore}</span></div>
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full bg-indigo-500 font-black`} /><span className="opacity-50">User:</span><span>{urlUser}</span></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
