<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROP MGR - Management Suite</title>
    <!-- 1. React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 2. Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 3. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 4. Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- ROBUST INLINE ICON SYSTEM ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const paths = {
                Building2: <><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></>,
                LayoutGrid: <><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></>,
                BellRing: <><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></>,
                LayoutDashboard: <><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></>,
                Receipt: <><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5V6.5"/></>,
                Wallet: <><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></>,
                ChevronLeft: <path d="m15 18-6-6 6-6"/>,
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                ChevronUp: <path d="m18 15-6-6-6 6"/>,
                ChevronDown: <path d="m6 9 6 6 6-6"/>,
                Plus: <path d="M12 5v14M5 12h14"/>,
                PlusCircle: <><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></>,
                Home: <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 22V12h6v10"/>,
                Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                CheckCircle2: <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
                AlertTriangle: <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></>,
                Zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                Droplets: <path d="M7 16.3c2.2 0 4-1.8 4-4 0-3.3-4-6.2-4-6.2s-4 2.9-4 6.2c0 2.2 1.8 4 4 4zm10 0c2.2 0 4-1.8 4-4 0-3.3-4-6.2-4-6.2s-4 2.9-4 6.2c0 2.2 1.8 4 4 4z"/>,
                Wifi: <path d="M5 13a10 10 0 0 1 14 0M8.5 16.5a5 5 0 0 1 7 0M2 8.82a15 15 0 0 1 20 0M12 20h.01"/>,
                Sparkles: <path d="m12 3-1.9 5.8a2 2 0 0 1-1.2 1.2L3 12l5.9 1.9a2 2 0 0 1 1.2 1.2l1.9 5.9 1.9-5.9a2 2 0 0 1 1.2-1.2l5.9-1.9-5.9-1.9a2 2 0 0 1-1.2-1.2L12 3z"/>,
                Wrench: <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77z"/>,
                Users: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>,
                MoreHorizontal: <><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>,
                X: <path d="M18 6 6 18M6 6l12 12"/>,
                User: <><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></>,
                Settings: <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>,
                Check: <polyline points="20 6 9 17 4 12"/>,
                Copy: <><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>,
                History: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5M12 7v5l4 2"/></>,
                Trash: <><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></>,
                FileText: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14.5 2 14.5 7.5 20 7.5"/></>,
                CalendarClock: <><path d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5"/><path d="M16 2v4M8 2v4M3 10h5"/><circle cx="18" cy="18" r="4"/><path d="M18 16.5V18l1 1"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // --- CONFIG ---
        const firebaseConfig = JSON.parse(__firebase_config);
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'prop-mgr-v2-stable';
        const urlParams = new URLSearchParams(window.location.search);
        const urlUser = urlParams.get('user') || 'default_user';
        const TODAY = new Date(2026, 2, 21); // March 21, 2026

        const BILL_CATEGORIES = [
            { id: 'Lease', icon: 'Building2', color: 'text-indigo-600' },
            { id: 'Electric', icon: 'Zap', color: 'text-amber-500' },
            { id: 'Water', icon: 'Droplets', color: 'text-blue-500' },
            { id: 'Wifi', icon: 'Wifi', color: 'text-sky-500' },
            { id: 'Cleaning', icon: 'Sparkles', color: 'text-teal-500' },
            { id: 'Repair', icon: 'Wrench', color: 'text-orange-500' },
            { id: 'Staff', icon: 'Users', color: 'text-purple-500' },
            { id: 'Other', icon: 'MoreHorizontal', color: 'text-slate-400' },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('calendar');
            const [selectedProperty, setSelectedProperty] = useState('All');
            const [viewDate, setViewDate] = useState(new Date(2026, 2, 1));
            const [hasLoaded, setHasLoaded] = useState(false);
            
            const [rooms, setRooms] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [paymentLog, setPaymentLog] = useState({});
            const [utilityLog, setUtilityLog] = useState({});
            const [bills, setBills] = useState([]);
            const [properties, setProperties] = useState(['Property A', 'Property B']);

            const [showModal, setShowModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [showLedgerInModal, setShowLedgerInModal] = useState(false);
            const [formData, setFormData] = useState({ 
                guestName: '', contact: '', room: '', property: 'Property A', start: '', end: '', monthlyRate: 5000, isFixedPrice: false, manualStatus: 'auto'
            });

            const [showBillModal, setShowBillModal] = useState(false);
            const [editingBillId, setEditingBillId] = useState(null);
            const [billFormData, setBillFormData] = useState({ title: '', category: 'Electric', property: 'Property A', amount: 0, dueDate: '', payments: [] });

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const isTodayVisible = TODAY.getFullYear() === year && TODAY.getMonth() === month;
            const todayDay = TODAY.getDate();

            // --- HELPERS ---
            const toISODate = (date) => date.toLocaleDateString('sv-SE');
            const getMonthYearShort = (date) => `${new Intl.DateTimeFormat('en-US', { month: 'short' }).format(date).toUpperCase()} ${date.getFullYear()}`;
            
            const formatBarDate = (dateStr) => {
                if (!dateStr) return '...';
                const d = new Date(dateStr);
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                return `${d.getDate()}${months[d.getMonth()]}`;
            };

            const formatVacancyDate = (date) => {
                if (!date) return '∞';
                const d = new Date(date);
                return `${d.getDate()}${new Intl.DateTimeFormat('en-US', { month: 'short' }).format(d).toUpperCase()}${d.getFullYear().toString().slice(-2)}`;
            };

            // --- DATABASE ---
            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await auth.signInWithCustomToken(__initial_auth_token);
                    else await auth.signInAnonymously();
                };
                initAuth();
                const unsub = auth.onAuthStateChanged(setUser);
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('propertyData').doc(urlUser);
                const unsub = docRef.onSnapshot((snap) => {
                    if (snap.exists) {
                        const d = snap.data();
                        setBookings(d.bookings || []);
                        setRooms(d.rooms || []);
                        setPaymentLog(d.paymentLog || {});
                        setUtilityLog(d.utilityLog || {});
                        setBills(d.bills || []);
                        setProperties(d.properties || ['Property A', 'Property B']);
                    } else {
                        const initR = Array.from({ length: 12 }, (_, i) => ({ id: `r${i}`, name: `${101 + i}`, property: 'Property A' }));
                        setRooms(initR);
                        docRef.set({ rooms: initR, properties: ['Property A', 'Property B'], bookings: [], paymentLog: {}, utilityLog: {}, bills: [] });
                    }
                    setHasLoaded(true);
                }, (err) => console.error("Firestore Snapshot Error:", err));
                return unsub;
            }, [user]);

            const sync = async (update) => {
                if (!user || !hasLoaded) return;
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('propertyData').doc(urlUser).set(update, { merge: true });
                } catch (err) {
                    console.error("Firestore Sync Error:", err);
                }
            };

            // --- CALCULATIONS ---
            const getPaymentSchedule = (booking) => {
                if (!booking || !booking.start || !booking.end) return [];
                const start = new Date(booking.start), end = new Date(booking.end);
                const schedule = [];
                let current = new Date(start.getFullYear(), start.getMonth(), 1);
                let isFirst = true;
                while (current <= end) {
                    const cY = current.getFullYear(), cM = current.getMonth();
                    const mD = new Date(cY, cM + 1, 0).getDate();
                    const sInM = cM === start.getMonth() && cY === start.getFullYear() ? start.getDate() : 1;
                    const eInM = cM === end.getMonth() && cY === end.getFullYear() ? end.getDate() : mD + 1;
                    const days = Math.max(0, eInM - sInM);
                    if (days > 0) {
                        let rent = booking.isFixedPrice ? (isFirst ? booking.monthlyRate : 0) : Math.round((days >= mD ? booking.monthlyRate : (booking.monthlyRate / mD) * days));
                        isFirst = false;
                        const key = `${booking.id}_${cM}_${cY}`;
                        const util = utilityLog[key] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 200 };
                        let utilOwed = util.elecEnd > 0 ? Math.round(Math.max(0, (util.elecEnd - util.elecStart) * util.elecRate) + util.water) : 0;
                        const paid = (paymentLog[key] || []).reduce((s, p) => s + p.amount, 0);
                        schedule.push({ monthIndex: cM, year: cY, label: new Intl.DateTimeFormat('en-US', { month: 'short' }).format(current), rent, utilOwed, owed: rent + utilOwed, paid, util, payments: paymentLog[key] || [] });
                    }
                    current = new Date(cY, cM + 1, 1);
                }
                return schedule;
            };

            const filteredRooms = useMemo(() => rooms.filter(r => selectedProperty === 'All' || r.property === selectedProperty), [rooms, selectedProperty]);
            const filteredBookings = useMemo(() => bookings.filter(b => {
                const room = rooms.find(r => r.name === b.room);
                return selectedProperty === 'All' || (room && room.property === selectedProperty);
            }), [bookings, rooms, selectedProperty]);
            const filteredBills = useMemo(() => bills.filter(b => selectedProperty === 'All' || b.property === selectedProperty), [bills, selectedProperty]);

            const getStatus = (b) => {
                if (b.manualStatus === 'checked-in') return { label: 'In', icon: 'Home', color: 'text-emerald-500' };
                if (b.manualStatus === 'checked-out') return { label: 'Out', icon: 'CheckCircle2', color: 'text-slate-400' };
                const s = new Date(b.start), e = new Date(b.end);
                if (TODAY < s) return { label: 'Future', icon: 'Clock', color: 'text-blue-500' };
                if (TODAY >= s && TODAY < e) return { label: 'In', icon: 'Home', color: 'text-emerald-500' };
                return { label: 'Out', icon: 'CheckCircle2', color: 'text-slate-400' };
            };

            const getBarColor = (b, bal) => {
                const s = getStatus(b);
                if (s.label === 'Out') return 'bg-slate-400';
                if (s.label === 'Future') return 'bg-blue-600';
                return bal > 0 ? 'bg-rose-600' : 'bg-emerald-600';
            };

            const handleSave = async (e) => {
                e.preventDefault();
                const newB = editingId ? bookings.map(b => b.id === editingId ? { ...formData, id: editingId } : b) : [...bookings, { ...formData, id: Date.now().toString(), color: 'bg-indigo-600', manualStatus: 'auto' }];
                setBookings(newB); 
                await sync({ bookings: newB }); 
                setShowModal(false);
            };

            const handleBillSave = async (e) => {
                e.preventDefault();
                const newBills = editingBillId ? bills.map(b => b.id === editingBillId ? { ...billFormData, id: editingBillId } : b) : [...bills, { ...billFormData, id: Date.now().toString() }];
                setBills(newBills);
                await sync({ bills: newBills });
                setShowBillModal(false);
            };

            const addPayLocal = async (bookingId, m, y, amount) => {
                if (!amount || amount <= 0) return;
                const key = `${bookingId}_${m}_${y}`;
                const newLog = { ...paymentLog, [key]: [...(paymentLog[key] || []), { amount: Math.round(Number(amount)), date: toISODate(new Date()) }] };
                setPaymentLog(newLog); await sync({ paymentLog: newLog });
            };

            const quickPayBill = async (bill) => {
                const paid = (bill.payments || []).reduce((s, p) => s + p.amount, 0);
                const bal = bill.amount - paid;
                if (bal <= 0) return;
                const updated = bills.map(b => b.id === bill.id ? { ...b, payments: [...(b.payments || []), { amount: bal, date: toISODate(new Date()) }] } : b);
                setBills(updated); await sync({ bills: updated });
            };

            const duplicateBill = async (bill) => {
                const d = new Date(bill.dueDate); d.setMonth(d.getMonth() + 1);
                const updated = [...bills, { ...bill, id: Date.now().toString(), payments: [], dueDate: toISODate(d) }];
                setBills(updated); await sync({ bills: updated });
            };

            const vacancies = useMemo(() => {
                const list = [];
                filteredRooms.forEach(room => {
                    const roomBookings = filteredBookings.filter(b => b.room === room.name).sort((a, b) => new Date(a.start) - new Date(b.start));
                    let last = new Date(TODAY);
                    roomBookings.forEach(b => {
                        const start = new Date(b.start);
                        if (start > last) list.push({ room: room.name, from: new Date(last), to: new Date(start) });
                        if (new Date(b.end) > last) last = new Date(b.end);
                    });
                    list.push({ room: room.name, from: new Date(last), to: null });
                });
                return list.sort((a, b) => a.from - b.from);
            }, [filteredBookings, filteredRooms]);

            const remindersData = useMemo(() => {
                const res = { overdue: [], current: [], upcoming: [], billOverdue: [] };
                filteredBookings.forEach(b => {
                    getPaymentSchedule(b).forEach(s => {
                        const bal = s.owed - s.paid;
                        if (bal > 0) {
                            if (new Date(s.year, s.monthIndex + 1, 0) < TODAY) res.overdue.push({ guest: b.guestName, room: b.room, amt: bal });
                            else res.current.push({ guest: b.guestName, room: b.room, amt: bal });
                        }
                    });
                    const s = new Date(b.start), e = new Date(b.end);
                    const dI = Math.ceil((s-TODAY)/86400000), dO = Math.ceil((e-TODAY)/86400000);
                    if (dI >= 0 && dI <= 7) res.upcoming.push({ text: `In: ${b.guestName}`, room: b.room, date: b.start });
                    if (dO >= 0 && dO <= 7) res.upcoming.push({ text: `Out: ${b.guestName}`, room: b.room, date: b.end });
                });
                filteredBills.forEach(bill => {
                    const paid = (bill.payments || []).reduce((s,p)=>s+p.amount,0);
                    const bal = bill.amount - paid;
                    if (bal > 0) {
                        const due = new Date(bill.dueDate);
                        const label = bill.category === 'Other' ? bill.title : bill.category.toUpperCase();
                        if (due < TODAY) res.billOverdue.push({ title: label, amt: bal, date: bill.dueDate });
                        else if (Math.ceil((due-TODAY)/86400000) <= 7) res.upcoming.push({ text: `Bill: ${label}`, room: bill.property, date: bill.dueDate });
                    }
                });
                return res;
            }, [filteredBookings, filteredBills, paymentLog, utilityLog]);

            const accountingData = useMemo(() => {
                let inc = 0, exp = 0;
                filteredBookings.forEach(b => getPaymentSchedule(b).forEach(s => inc += s.paid));
                filteredBills.forEach(bill => exp += (bill.payments || []).reduce((s, p) => s + p.amount, 0));
                return { income: inc, expense: exp, net: inc - exp };
            }, [filteredBookings, filteredBills]);

            return (
                <div className="min-h-screen text-slate-900 bg-slate-100 font-sans p-1 pb-12">
                    <div className="max-w-[1800px] mx-auto">
                        
                        {/* LINE 1: GLOBAL HEADER */}
                        <div className="flex flex-wrap justify-between items-center mb-1 gap-1 bg-white p-1 rounded-2xl shadow-sm border border-slate-300">
                            <div className="flex items-center gap-3 pl-1">
                                <div className="flex items-center gap-2">
                                    <div className="bg-indigo-800 p-1.5 rounded-xl text-white shadow-sm"><Icon name="Building2" size={20} /></div>
                                    <h1 className="text-[14px] font-black tracking-tighter uppercase mr-3">PROP MGR</h1>
                                </div>
                                <div className="flex items-center bg-slate-100 p-0.5 rounded-xl border border-slate-200 gap-0.5">
                                    {[
                                        { id: 'calendar', label: 'CALENDAR', icon: 'LayoutGrid' },
                                        { id: 'reminders', label: 'REMINDERS', icon: 'BellRing' },
                                        { id: 'vacancy', label: 'VACANCY', icon: 'LayoutDashboard' },
                                        { id: 'bills', label: 'BILLS', icon: 'Receipt' },
                                        { id: 'accounting', label: 'ACCOUNTING', icon: 'Wallet' }
                                    ].map(t => (
                                        <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-black uppercase transition-all ${activeTab === t.id ? 'bg-white text-indigo-700 shadow-sm border border-slate-200' : 'text-slate-400 hover:text-slate-600'}`}>
                                            <Icon name={t.icon} size={14} /> <span className="hidden md:inline ml-1">{t.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="flex items-center gap-2 pr-1">
                                <div className="flex items-center gap-1 bg-slate-100 px-2 py-1 rounded-xl border border-slate-200">
                                    <select className="bg-transparent text-[11px] font-black text-indigo-700 outline-none cursor-pointer" value={selectedProperty} onChange={e => setSelectedProperty(e.target.value)}>
                                        <option value="All">All View</option>
                                        {properties.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>

                                                                        <div className="grid grid-cols-5 gap-1.5 items-center">
                                                                            <div className="col-span-1 flex items-center gap-1"><Icon name="Zap" size={16} className="text-amber-500"/><span className="text-[13px] font-black text-slate-500 uppercase">ELEC</span></div>
                                                                            <input type="number" placeholder="In" className="bg-slate-50 border border-slate-200 rounded-lg p-1.5 text-[13px] font-bold text-center outline-none" value={mon.util.elecStart} onChange={e=>{const n = {...utilityLog, [key]: {...(utilityLog[key]||{elecStart:0,elecEnd:0,elecRate:8,water:200}), elecStart: Number(e.target.value)}}; setUtilityLog(n); sync({utilityLog:n});}} />
                                                                            <input type="number" placeholder="Out" className="bg-slate-50 border border-slate-200 rounded-lg p-1.5 text-[13px] font-bold text-center outline-none" value={mon.util.elecEnd} onChange={e=>{const n = {...utilityLog, [key]: {...(utilityLog[key]||{elecStart:0,elecEnd:0,elecRate:8,water:200}), elecEnd: Number(e.target.value)}}; setUtilityLog(n); sync({utilityLog:n});}} />
                                                                            <div className="flex items-center gap-0.5 bg-slate-100 rounded-lg p-1 justify-center border border-slate-200"><span className="text-[13px] font-black text-slate-400">@</span><input type="number" className="w-8 bg-transparent text-[13px] font-bold text-center outline-none" value={mon.util.elecRate} onChange={e=>{const n = {...utilityLog, [key]: {...(utilityLog[key]||{elecStart:0,elecEnd:0,elecRate:8,water:200}), elecRate: Number(e.target.value)}}; setUtilityLog(n); sync({utilityLog:n});}} /></div>
                                                                            <div className="text-right font-black text-[13px] text-amber-600">{Math.round((mon.util.elecEnd - mon.util.elecStart) * mon.util.elecRate)}฿</div>
                                                                        </div>
                                                                        <div className="grid grid-cols-5 gap-1.5 items-center border-t border-slate-100 pt-1.5">
                                                                            <div className="col-span-1 flex items-center gap-1"><Icon name="Droplets" size={16} className="text-blue-500"/><span className="text-[13px] font-black text-slate-500 uppercase">WATER</span></div>
                                                                            <div className="col-span-3 relative px-1"><span className="absolute left-2 top-1/2 -translate-y-1/2 text-[12px] font-bold text-slate-300">฿</span><input type="number" className="w-full bg-slate-50 rounded-lg p-1.5 pl-6 text-[13px] font-bold outline-none" value={mon.util.water} onChange={e=>{const n = {...utilityLog, [key]: {...(utilityLog[key]||{elecStart:0,elecEnd:0,elecRate:8,water:200}), water: Number(e.target.value)}}; setUtilityLog(n); sync({utilityLog:n});}} /></div>
                                                                        </div>
                                                                    </div>
                                                                    <div className="space-y-1">
                                                                        {(paymentLog[key] || []).map((p, pIdx) => (<div key={pIdx} className="flex gap-2 items-center bg-white p-1.5 rounded-lg border border-slate-200 shadow-sm"><span className="text-[12px] font-black text-slate-400">{p.date}</span><span className="flex-1 text-right font-black text-emerald-600">{p.amount.toLocaleString()} ฿</span><button type="button" onClick={()=>{const n={...paymentLog}; n[key].splice(pIdx,1); setPaymentLog(n); sync({paymentLog:n});}}><Icon name="Trash" size={14} className="text-slate-300 hover:text-rose-500"/></button></div>))}
                                                                        <div className="flex gap-1">
                                                                            <input type="number" id={`pay-${idx}`} className="flex-1 bg-white border border-slate-300 rounded-lg p-1 text-[13px] font-black outline-none" placeholder="Pay..." defaultValue={Math.round(mon.owed-mon.paid) > 0 ? Math.round(mon.owed-mon.paid) : ''} />
                                                                            <button type="button" onClick={()=>{const el=document.getElementById(`pay-${idx}`); addPayLocal(editingId, mon.monthIndex, mon.year, el.value); el.value='';}} className="bg-slate-900 text-white p-2 rounded-lg active:scale-90"><Icon name="Plus" size={16}/></button>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            )})}
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                            <button type="submit" className="w-full bg-indigo-600 text-white py-3.5 rounded-[1.2rem] font-black text-[13px] uppercase tracking-widest shadow-xl active:scale-95 transition-all">Save Changes</button>
                                            {editingId && <button type="button" onClick={async () => { if(confirm('Permanently Delete Stay?')) { const n=bookings.filter(b=>b.id!==editingId); setBookings(n); await sync({bookings:n}); setShowModal(false); } }} className="w-full text-slate-400 font-bold text-[10px] uppercase p-1 pt-3">Delete Stay</button>}
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showBillModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 overflow-y-auto">
                                <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg border border-slate-300 overflow-hidden my-auto animate-in zoom-in duration-200">
                                    <div className="p-3 border-b border-slate-200 flex justify-between items-center bg-slate-50/50">
                                        <div className="flex items-center gap-2 pl-2"><div className={`p-1.5 rounded-xl bg-rose-600 text-white shadow-sm ${editingBillId ? 'bg-rose-600' : 'bg-rose-500'}`}><Icon name="FileText" size={16} /></div><h2 className="text-[12px] font-black uppercase tracking-widest">{editingBillId ? 'Edit Bill' : 'New Bill'}</h2></div>
                                        <button onClick={() => setShowBillModal(false)} className="p-2 text-slate-400"><Icon name="X" size={24}/></button>
                                    </div>
                                    <div className="p-4 space-y-3">
                                        <form onSubmit={handleBillSave} className="space-y-3">
                                            <div className="grid grid-cols-2 gap-2">
                                                <select className="bg-slate-50 border border-slate-200 rounded-xl p-2 text-[14px] font-black outline-none appearance-none" value={billFormData.category} onChange={e=>setBillFormData({...billFormData, category:e.target.value})}>{BILL_CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.id}</option>)}</select>
                                                <select className="bg-slate-50 border border-slate-200 rounded-xl p-2 text-[14px] font-black outline-none appearance-none" value={billFormData.property} onChange={e=>setBillFormData({...billFormData, property:e.target.value})}>{properties.map(p => <option key={p} value={p}>{p}</option>)}</select>
                                            </div>
                                            {billFormData.category === 'Other' && (<input type="text" required className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-[14px] font-black outline-none" placeholder="Description" value={billFormData.title} onChange={e=>setBillFormData({...billFormData, title:e.target.value})} />)}
                                            <div className="grid grid-cols-2 gap-2">
                                                <div><label className="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-tighter">Due Date</label><input type="date" required className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-[14px] font-black outline-none" value={billFormData.dueDate} onChange={e=>setBillFormData({...billFormData, dueDate:e.target.value})} /></div>
                                                <div><label className="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-tighter">Amount</label><input type="number" required className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-[14px] font-black text-rose-600 outline-none" value={billFormData.amount} onChange={e=>setBillFormData({...billFormData, amount:Number(e.target.value)})} /></div>
                                            </div>
                                            <div className="space-y-2 border-t pt-2">
                                                {(billFormData.payments || []).map((p, i) => (<div key={i} className="flex gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-200 shadow-sm"><span className="text-[12px] font-black text-slate-400">{p.date}</span><span className="flex-1 text-right font-black text-emerald-600">{p.amount.toLocaleString()} ฿</span><button type="button" onClick={()=>{const n=[...billFormData.payments]; n.splice(i,1); setBillFormData({...billFormData, payments:n});}}><Icon name="Trash" size={14} className="text-slate-300 hover:text-rose-500"/></button></div>))}
                                                <div className="flex gap-2">
                                                    <input type="number" id="bill-pay-in" className="flex-1 bg-white border border-slate-300 rounded-xl p-2 text-[14px] font-black outline-none" placeholder="Pay..." />
                                                    <button type="button" onClick={()=>{
                                                        const el=document.getElementById('bill-pay-in');
                                                        const amt=Number(el.value);
                                                        if(amt>0) setBillFormData({...billFormData, payments: [...(billFormData.payments || []), {amount:amt, date: toISODate(new Date())}]});
                                                        el.value='';
                                                    }} className="bg-slate-900 text-white p-2 rounded-xl active:scale-90 transition-all"><Icon name="PlusCircle" size={20}/></button>
                                                </div>
                                            </div>
                                            <button type="submit" className="w-full bg-rose-600 text-white py-3.5 rounded-[1.2rem] font-black text-[13px] uppercase tracking-widest shadow-xl active:scale-95 transition-all">Update Bill</button>
                                            {editingBillId && <button type="button" onClick={async () => { if(confirm('Delete Bill?')) { const n=bills.filter(b=>b.id!==editingBillId); setBills(n); await sync({bills:n}); setShowBillModal(false); } }} className="w-full text-slate-400 font-bold text-[11px] uppercase p-1">Delete Bill</button>}
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showSettings && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 overflow-y-auto">
                                <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg border border-slate-300 overflow-hidden animate-in zoom-in duration-200 my-auto">
                                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                                        <h2 className="text-[14px] font-black uppercase tracking-widest pl-2">System Settings</h2>
                                        <button onClick={() => setShowSettings(false)} className="p-2 text-slate-400"><Icon name="X" size={24}/></button>
                                    </div>
                                    <div className="p-4 space-y-6 max-h-[70vh] overflow-y-auto">
                                        {/* Properties Section */}
                                        <section className="space-y-3">
                                            <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1 border-b pb-1">Manage Properties</h3>
                                            {properties.map((p, i) => (
                                                <div key={i} className="flex gap-2">
                                                    <input type="text" className="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-2.5 font-black text-[14px]" value={p} onChange={e => {
                                                        const n = [...properties]; n[i] = e.target.value; setProperties(n); sync({properties: n});
                                                    }} />
                                                    <button onClick={() => {
                                                        if (properties.length > 1 && confirm('Delete Property? All associated units will remain but lose association.')) {
                                                            const n = properties.filter((_, idx) => idx !== i);
                                                            setProperties(n); sync({properties: n});
                                                        }
                                                    }} className="p-2.5 text-rose-500 hover:bg-rose-50 rounded-xl transition-all"><Icon name="Trash" size={18} /></button>
                                                </div>
                                            ))}
                                            <button onClick={() => {
                                                const n = [...properties, `Property ${properties.length + 1}`];
                                                setProperties(n); sync({properties: n});
                                            }} className="w-full py-2.5 rounded-xl border-2 border-dashed border-slate-200 text-slate-400 font-black text-[11px] uppercase hover:border-indigo-600 hover:text-indigo-600 transition-all">+ Add Property</button>
                                        </section>

                                        {/* Units Section */}
                                        <section className="space-y-3">
                                            <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1 border-b pb-1">Manage Units (Associate with Property)</h3>
                                            <div className="space-y-2">
                                                {rooms.map((r, i) => (
                                                    <div key={r.id} className="grid grid-cols-2 gap-2 bg-slate-50 p-2 rounded-2xl border border-slate-200">
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-[10px] font-bold text-slate-400">ID:</span>
                                                            <input type="text" className="bg-white border border-slate-200 rounded-lg p-1.5 font-black text-[12px] flex-1" value={r.name} onChange={e => {
                                                                const n = rooms.map(x => x.id === r.id ? {...x, name: e.target.value} : x);
                                                                setRooms(n); sync({rooms: n});
                                                            }} />
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-[10px] font-bold text-slate-400">PROP:</span>
                                                            <select className="bg-white border border-slate-200 rounded-lg p-1.5 font-black text-[11px] flex-1" value={r.property} onChange={e => {
                                                                const n = rooms.map(x => x.id === r.id ? {...x, property: e.target.value} : x);
                                                                setRooms(n); sync({rooms: n});
                                                            }}>
                                                                {properties.map(p => <option key={p} value={p}>{p}</option>)}
                                                            </select>
                                                            <button onClick={() => {
                                                                if (confirm('Delete Unit?')) {
                                                                    const n = rooms.filter(x => x.id !== r.id);
                                                                    setRooms(n); sync({rooms: n});
                                                                }
                                                            }} className="p-1 text-rose-400 hover:text-rose-600"><Icon name="Trash" size={14} /></button>
                                                        </div>
                                                    </div>
                                                ))}
                                                <button onClick={() => {
                                                    const n = [...rooms, { id: `r${Date.now()}`, name: 'New Room', property: properties[0] }];
                                                    setRooms(n); sync({rooms: n});
                                                }} className="w-full py-2.5 rounded-xl border-2 border-dashed border-slate-200 text-slate-400 font-black text-[11px] uppercase hover:border-indigo-600 hover:text-indigo-600 transition-all">+ Add Unit</button>
                                            </div>
                                        </section>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://loren-6q.github.io/WETNav/nav.js"></script>
</body>
</html>
