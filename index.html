            const [showBillLedgerId, setShowBillLedgerId] = useState(null);

            const [formData, setFormData] = useState({ guestName: '', contact: '', room: '', property: '', start: '', end: '', monthlyRate: 5000, isFixedPrice: false, manualStatus: 'auto', notes: '' });
            const [billFormData, setBillFormData] = useState({ title: '', category: 'Electric', property: 'Property A', amount: 0, dueDate: '', payments: [] });

            const toISODate = (date) => date.toLocaleDateString('sv-SE');
            const formatRemDate = (dateStr) => { if (!dateStr) return '...'; const d = new Date(dateStr); return `${d.getDate()}${mosEn[d.getMonth()]}`; };
            const formatBarDate = (dateStr) => { if (!dateStr) return '...'; const d = new Date(dateStr); return `${d.getDate()}${mosEn[d.getMonth()]}`; };
            const formatVacancyDate = (date) => { 
                if (!date) return <span className="text-[28px] leading-none">∞</span>; 
                const d = new Date(date); 
                return `${d.getDate()}${mosEn[d.getMonth()]}${d.getFullYear().toString().slice(-2)}`; 
            };

            const getStatus = (b) => {
                if (!b) return STAY_STATUSES.OUT;
                if (b.manualStatus === 'checked-in') return STAY_STATUSES.IN;
                if (b.manualStatus === 'checked-out') return STAY_STATUSES.OUT;
                const s = new Date(b.start), e = new Date(b.end);
                return (TODAY < s) ? STAY_STATUSES.FUT : (TODAY >= s && TODAY < e) ? STAY_STATUSES.IN : STAY_STATUSES.OUT;
            };

            const getPaymentSchedule = (booking) => {
                if (!booking || !booking.start || !booking.end) return [];
                const start = new Date(booking.start), end = new Date(booking.end);
                const schedule = [];
                let current = new Date(start.getFullYear(), start.getMonth(), 1);
                let isFirst = true;
                while (current <= end) {
                    const cY = current.getFullYear(), cM = current.getMonth();
                    const mD = new Date(cY, cM + 1, 0).getDate();
                    const sDay = (cM === start.getMonth() && cY === start.getFullYear()) ? start.getDate() : 1;
                    const eDay = (cM === end.getMonth() && cY === end.getFullYear()) ? end.getDate() : mD + 1;
                    const days = Math.max(0, eDay - sDay);
                    if (days > 0) {
                        let rent = booking.isFixedPrice ? (isFirst ? (Number(booking.monthlyRate) || 0) : 0) : Math.round((days >= mD ? (Number(booking.monthlyRate) || 0) : ((Number(booking.monthlyRate) || 0) / mD) * days));
                        const dueDay = isFirst ? start.getDate() : 1;
                        const dueDateISO = toISODate(new Date(cY, cM, dueDay));
                        const key = `${booking.id}_${cM}_${cY}`;
                        const util = utilityLog[key] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 0, otherAmt: 0, otherNote: '' };
                        const electricOwed = util.elecEnd > 0 ? Math.round(Math.max(0, (util.elecEnd - util.elecStart) * (Number(util.elecRate) || 8))) : 0;
                        const waterOwed = Number(util.water) || 0;
                        const otherOwed = Number(util.otherAmt) || 0;
                        const owed = rent + electricOwed + waterOwed + otherOwed;
                        const paid = (paymentLog[key] || []).reduce((s, p) => s + (Number(p.amount) || 0), 0);
                        
                        schedule.push({ 
                            monthIndex: cM, year: cY, label: mosEn[cM], 
                            rent, electricOwed, waterOwed, otherOwed, 
                            otherNote: util.otherNote || '', owed, paid, util,
                            dueDate: dueDateISO
                        });
                        isFirst = false;
                    }
                    current = new Date(cY, cM + 1, 1);
                }
                return schedule;
            };

            const getBarColor = (b, bal) => {
                const s = getStatus(b);
                if (s.id === 'checked-out') return 'bg-slate-400';
                if (s.id === 'future') return 'bg-blue-600';
                return bal > 0 ? 'bg-rose-600' : 'bg-emerald-600';
            };

            const filteredRooms = rooms.filter(r => selectedProperty === 'All' || r.property === selectedProperty);
            const filteredBookings = bookings.filter(b => rooms.some(r => r.name === b.room && (selectedProperty === 'All' || r.property === selectedProperty)));
            const filteredBills = bills.filter(b => {
                const propMatch = selectedProperty === 'All' || b.property === selectedProperty;
                const catMatch = selectedBillCategory === 'All' || b.category === selectedBillCategory;
                return propMatch && catMatch;
            }).sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));

            const groupedRooms = useMemo(() => {
                const propsToGroup = selectedProperty === 'All' ? properties : [selectedProperty];
                return propsToGroup.map(p => ({
                    name: p,
                    rooms: filteredRooms.filter(r => r.property === p).sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric: true}))
                })).filter(g => g.rooms.length > 0);
            }, [filteredRooms, properties, selectedProperty]);

            const accountingData = useMemo(() => {
                let totalIncome = 0; let totalExpense = 0;
                const currentMonthLedger = [];
                const historyMap = {};
                const visibleBookingIds = new Set(filteredBookings.map(b => b.id));
                const bookingLookup = {};
                filteredBookings.forEach(b => bookingLookup[b.id] = b);

                Object.entries(paymentLog).forEach(([key, pays]) => {
                    const parts = key.split('_');
                    if (parts.length === 3) {
                        const bid = parts[0];
                        if (visibleBookingIds.has(bid)) {
                            const b = bookingLookup[bid];
                            const m = parseInt(parts[1]); const y = parseInt(parts[2]);
                            const hKey = `${m}_${y}`;
                            if (!historyMap[hKey]) historyMap[hKey] = { inc: 0, exp: 0, label: `${mosEn[m]} ${y}`, m, y };
                            (pays || []).forEach(p => {
                                const amt = Number(p.amount) || 0;
                                totalIncome += amt;
                                historyMap[hKey].inc += amt;
                                if (m === month && y === year) currentMonthLedger.push({ date: p.date, label: `${b.guestName} (${b.room})`, amount: amt, type: 'IN' });
                            });
                        }
                    }
                });
                
                filteredBills.forEach(bill => {
                    (bill.payments || []).forEach(p => {
                        const amt = Number(p.amount) || 0; totalExpense += amt;
                        const d = new Date(p.date); const m = d.getMonth(); const y = d.getFullYear();
                        const hKey = `${m}_${y}`;
                        if(!historyMap[hKey]) historyMap[hKey] = { inc: 0, exp: 0, label: `${mosEn[m]} ${y}`, m, y };
                        historyMap[hKey].exp += amt;
                        if (m === month && y === year) currentMonthLedger.push({ date: p.date, label: `${bill.category} (${bill.property})`, amount: amt, type: 'OUT' });
                    });
                });

                return { 
                    income: totalIncome, 
                    expense: totalExpense, 
                    net: totalIncome - totalExpense, 
                    monthLedger: currentMonthLedger.sort((a,b) => new Date(b.date) - new Date(a.date)), 
                    history: Object.values(historyMap).sort((a,b) => new Date(b.y, b.m) - new Date(a.y, a.m)).reverse() 
                };
            }, [filteredBookings, filteredBills, paymentLog, month, year]);

            const vacancyReportData = useMemo(() => {
                return rooms.map(room => {
                    const rb = bookings.filter(b => b.room === room.name).sort((a,b) => new Date(a.start) - new Date(b.start));
                    let last = new Date(TODAY); const list = [];
                    rb.forEach(b => { const start = new Date(b.start); if (start > last) list.push({ from: new Date(last), to: new Date(start) }); if (new Date(b.end) > last) last = new Date(b.end); });
                    list.push({ from: new Date(last), to: null });
                    return { room, list };
                }).sort((a, b) => (a.list[0]?.from || new Date(2100, 1, 1)) - (b.list[0]?.from || new Date(2100, 1, 1)));
            }, [rooms, bookings]);

            const allGuestsSorted = useMemo(() => {
                const s = historySearch.toLowerCase();
                const filtered = bookings.filter(b => {
                    const matchSearch = (b.guestName || "").toLowerCase().includes(s) || (b.room || "").toLowerCase().includes(s);
                    const matchProperty = selectedProperty === 'All' || b.property === selectedProperty;
                    return matchSearch && matchProperty;
                });

                const { key, direction } = sortConfig;
                return filtered.sort((a, b) => {
                    let valA = a[key];
                    let valB = b[key];
                    if (key === 'start' || key === 'end') {
                        valA = new Date(valA || 0);
                        valB = new Date(valB || 0);
                    } else if (typeof valA === 'string') {
                        valA = valA.toLowerCase();
                        valB = (valB || "").toLowerCase();
                    }
                    if (valA < valB) return direction === 'asc' ? -1 : 1;
                    if (valA > valB) return direction === 'asc' ? 1 : -1;
                    return 0;
                });
            }, [bookings, historySearch, selectedProperty, sortConfig]);

            const logisticsSorted = useMemo(() => {
                const win = new Date(TODAY.getTime() + 30 * 86400000);
                const list = [];
                filteredBookings.forEach(b => {
                    const s = new Date(b.start), e = new Date(b.end);
                    if (s >= TODAY && s <= win) list.push({ date: s, type: lang === 'th' ? 'เข้า' : 'IN', b });
                    if (e >= TODAY && e <= win) list.push({ date: e, type: lang === 'th' ? 'ออก' : 'OUT', b });
                });
                return list.sort((a, b) => a.date - b.date);
            }, [filteredBookings, lang]);

            const incomeDueSorted = useMemo(() => {
                const win = new Date(TODAY.getTime() + 30 * 86400000);
                const list = [];
                filteredBookings.forEach(b => {
                    getPaymentSchedule(b).forEach(s => {
                        const bal = s.owed - s.paid;
                        const dDate = new Date(s.dueDate);
                        if (bal > 0 && dDate >= TODAY && dDate <= win) {
                            list.push({ date: dDate, bal, b });
                        }
                    });
                });
                return list.sort((a, b) => a.date - b.date);
            }, [filteredBookings]);

            const billsDueSorted = useMemo(() => {
                const win = new Date(TODAY.getTime() + 30 * 86400000);
                return filteredBills.filter(bill => {
                    const paid = (bill.payments || []).reduce((s,p)=>s+p.amount, 0);
                    const bal = Number(bill.amount) - paid;
                    const d = new Date(bill.dueDate);
                    return bal > 0 && d >= TODAY && d <= win;
                }).map(bill => ({
                    ...bill,
                    date: new Date(bill.dueDate),
                    bal: Number(bill.amount) - (bill.payments || []).reduce((s,p)=>s+p.amount, 0)
                })).sort((a, b) => a.date - b.date);
            }, [filteredBills]);

            const syncData = async (update) => {
                if (!user || !isReadyToSync.current) return;
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('propertyData').doc(urlUser);
                await docRef.set(update, { merge: true });
            };

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        const cred = await auth.signInAnonymously();
                        setUser(cred.user);
                        setDbStatus(s => ({ ...s, auth: `✓ ${cred.user.uid.slice(0,5)}` }));
                    } catch (e) { setDbStatus(s => ({ ...s, auth: 'ERR' })); }
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('propertyData').doc(urlUser);
                return docRef.onSnapshot((snap) => {
                    if (snap.exists) {
                        const d = snap.data();
                        setBookings(d.bookings || []); setRooms(d.rooms || []); setPaymentLog(d.paymentLog || {});
                        setUtilityLog(d.utilityLog || {}); setBills(d.bills || []); setProperties(d.properties || ['Property A', 'Property B']);
                        setDbStatus(s => ({ ...s, firestore: 'Synced' }));
                    } else {
                        setRooms(SAMPLE_ROOMS); setDbStatus(s => ({ ...s, firestore: 'Sample' }));
                    }
                    setHasLoaded(true); isReadyToSync.current = true;
                }, err => setDbStatus(s => ({ ...s, firestore: 'ERR' })));
            }, [user]);

            const handleSort = (key) => {
                setSortConfig(prev => ({
                    key,
                    direction: prev.key === key && prev.direction === 'asc' ? 'desc' : 'asc'
                }));
            };

            const getSortIcon = (key) => {
                if (sortConfig.key !== key) return <Icon name="MoreHorizontal" size={10} className="opacity-20" />;
                return <Icon name={sortConfig.direction === 'asc' ? 'ArrowUp' : 'ArrowDown'} size={10} className="text-indigo-600" />;
            };

            const handlePropertyRename = async (index, newName) => {
                const updatedProps = [...properties]; updatedProps[index] = newName;
                setProperties(updatedProps);
                await syncData({ properties: updatedProps });
            };
            const handleSaveBooking = async (e) => {
                e.preventDefault();
                const newB = editingId ? bookings.map(b => b.id === editingId ? { ...formData, id: editingId } : b) : [...bookings, { ...formData, id: Date.now().toString(), manualStatus: 'auto', notes: '' }];
                setBookings(newB); await syncData({ bookings: newB }); setShowModal(false);
            };
            const handleBillUpdateField = async (id, field, val) => {
                const updated = bills.map(b => b.id === id ? { ...b, [field]: field === 'amount' ? Number(val) : val } : b);
                setBills(updated); await syncData({ bills: updated });
            };
            const handleBillSaveNew = async (e) => {
                e.preventDefault();
                const newBills = [...bills, { ...billFormData, id: Date.now().toString(), payments: [] }];
                setBills(newBills); await syncData({ bills: newBills }); setShowBillModal(false);
            };
            const handleQuickBillPay = (bill) => {
                const paid = (bill.payments || []).reduce((s,p) => s + (Number(p.amount) || 0), 0);
                const balance = Number(bill.amount) - paid;
                if (balance <= 0) return;
                const newBills = bills.map(b => b.id === bill.id ? { ...b, payments: [...(b.payments || []), { id: Date.now().toString(), amount: balance, date: toISODate(new Date()) }] } : b);
                setBills(newBills); syncData({ bills: newBills });
            };
            const handleQuickBillDelete = (id) => {
                if(!confirm('Delete permanently?')) return;
                const n = bills.filter(b => b.id !== id);
                setBills(n); syncData({ bills: n });
            };
            const duplicateBill = async (bill) => {
                const d = new Date(bill.dueDate); d.setMonth(d.getMonth() + 1);
                const updated = [...bills, { ...bill, id: Date.now().toString(), payments: [], dueDate: toISODate(d) }];
                setBills(updated); await syncData({ bills: updated });
            };
            const addPayLocal = async (bid, m, y, amt) => {
                const key = `${bid}_${m}_${y}`;
                const newLog = { ...paymentLog, [key]: [...(paymentLog[key] || []), { id: Date.now().toString(), amount: Number(amt), date: toISODate(new Date()) }] };
                setPaymentLog(newLog); await syncData({ paymentLog: newLog });
            };
            const updatePayLocal = async (bid, m, y, pid, field, val) => {
                const key = `${bid}_${m}_${y}`;
                const newLog = { ...paymentLog, [key]: (paymentLog[key] || []).map(p => p.id === pid ? {...p, [field]: field === 'amount' ? Number(val) : val} : p) };
                setPaymentLog(newLog); await syncData({ paymentLog: newLog });
            };
            const deletePayLocal = async (bid, m, y, pid) => {
                const key = `${bid}_${m}_${y}`;
                const newLog = { ...paymentLog, [key]: (paymentLog[key] || []).filter(p => p.id !== pid) };
                setPaymentLog(newLog); await syncData({ paymentLog: newLog });
            };
            const updateUtilLocal = async (bid, m, y, field, val) => {
                const key = `${bid}_${m}_${y}`;
                const newUtil = { ...utilityLog, [key]: { ...(utilityLog[key] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 0, otherAmt: 0, otherNote: '' }), [field]: field === 'otherNote' ? val : Number(val) } };
                setUtilityLog(newUtil); await syncData({ utilityLog: newUtil });
            };

            if (!hasLoaded) return <div className="min-h-screen flex items-center justify-center font-black text-indigo-700 animate-pulse">Initializing Database...</div>;

            return (
                <div className="min-h-screen font-black p-1 pb-24 text-slate-900">
                    <div className="max-w-[1800px] mx-auto space-y-1">
                        
                        {/* HEADER */}
                        <div className="card-standard">
                            <div className="flex justify-between items-center p-2 border-b border-slate-100">
                                <div className="flex items-center gap-2 pl-1">
                                    <div className="bg-indigo-800 p-1.5 rounded-xl text-white shadow-sm"><Icon name="Building2" size={20} /></div>
                                    <h1 className="text-[16px] tracking-tighter uppercase font-black">PROP MGR</h1>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="flex items-center bg-slate-100 p-0.5 rounded-xl border border-slate-200">
                                        <button onClick={() => setLang('en')} className={`px-2 py-1 rounded-lg text-[10px] ${lang==='en'?'bg-white text-indigo-700 shadow-sm':'text-slate-400'}`}>EN</button>
                                        <button onClick={() => setLang('th')} className={`px-2 py-1 rounded-lg text-[10px] ${lang==='th'?'bg-white text-indigo-700 shadow-sm':'text-slate-400'}`}>TH</button>
                                    </div>
                                    <div className="flex items-center gap-1 bg-slate-100 px-2 py-1 rounded-xl border border-slate-200">
                                        <select className="bg-transparent text-[12px] font-black text-indigo-700 outline-none" value={selectedProperty} onChange={e => setSelectedProperty(e.target.value)}>
                                            <option value="All">{t('ALL_VIEW')}</option>
                                            {properties.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                        <button onClick={() => setShowSettings(true)} className="p-1 text-slate-400 hover:text-indigo-600"><Icon name="Settings" size={14} /></button>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center p-1 bg-slate-50 gap-1 overflow-x-auto no-scrollbar">
                                {[
                                    { id: 'calendar', label: t('CALENDAR'), icon: 'LayoutGrid' },
                                    { id: 'reminders', label: t('NOTES'), icon: 'BellRing' },
                                    { id: 'vacancy', label: t('EMPTY'), icon: 'LayoutDashboard' },
                                    { id: 'bills', label: t('BILLS'), icon: 'Receipt' },
                                    { id: 'history', label: t('GUESTS'), icon: 'Users' },
                                    { id: 'accounting', label: t('ACCOUNTS'), icon: 'Wallet' }
                                ].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`nav-tab ${activeTab === tab.id ? 'nav-tab-active' : ''}`}>
                                        <Icon name={tab.icon} size={14} /> <span>{tab.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* CALENDAR */}
                        {activeTab === 'calendar' && (
                            <div className="space-y-1 animate-in fade-in duration-300">
                                <div className="flex items-center justify-between px-2 py-0.5">
                                    <div className="flex items-center gap-3 bg-white/60 border border-slate-200 px-4 py-1.5 rounded-xl uppercase tracking-tighter shadow-sm text-slate-400">
                                        <div className="flex items-center gap-1"><Icon name="Home" size={13} className="text-emerald-500" /> {lang==='th'?STAY_STATUSES.IN.labelTh:STAY_STATUSES.IN.labelEn}</div>
                                        <div className="flex items-center gap-1"><Icon name="Clock" size={13} className="text-blue-500" /> {lang==='th'?STAY_STATUSES.FUT.labelTh:STAY_STATUSES.FUT.labelEn}</div>
                                        <div className="flex items-center gap-2 ml-2">
                                            <div className="w-2.5 h-2.5 rounded-full bg-rose-400 animate-pulse border border-white/30" /> <span>{t('OWES')}</span>
                                            <div className="w-2.5 h-2.5 rounded-full bg-emerald-400 ml-1 border border-white/30" /> <span>{t('PAID')}</span>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <div className="flex items-center bg-white p-0.5 rounded-xl border border-slate-300 shadow-sm">
                                            <button onClick={() => setViewDate(new Date(year, month-1, 1))} className="p-2 hover:bg-slate-50"><Icon name="ChevronLeft" size={14} /></button>
                                            <span className="font-black px-4 min-w-[110px] text-center text-indigo-700 uppercase">{getMonthYearShort(viewDate)}</span>
                                            <button onClick={() => setViewDate(new Date(year, month+1, 1))} className="p-2 hover:bg-slate-50"><Icon name="ChevronRight" size={14} /></button>
                                        </div>
                                        <button onClick={() => { setEditingId(null); setFormData({guestName:'', contact:'', room: (filteredRooms[0]?.name || ''), property: (filteredRooms[0]?.property || properties[0]), start:toISODate(TODAY), end:toISODate(new Date(TODAY.getTime() + 86400000)), monthlyRate: 5000, isFixedPrice: false, manualStatus:'auto', notes: ''}); setShowModal(true); }} className="btn-action">+ {t('NEW_STAY')}</button>
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-2xl shadow-xl border-2 border-slate-400 overflow-hidden relative">
                                    <div className="overflow-x-auto no-scrollbar">
                                        <div className="min-w-[1200px] relative">
                                            <div className="grid border-b-2 border-slate-400 bg-slate-50 sticky top-0 z-40 font-black" style={{ gridTemplateColumns: `85px repeat(${daysInMonth}, 1fr)` }}>
                                                <div className="p-1 text-slate-400 text-[12px] border-r-2 border-slate-400 sticky left-0 z-50 bg-slate-50 text-center flex items-center justify-center uppercase">{t('UNIT')}</div>
                                                {Array.from({length: daysInMonth}).map((_,i) => {
                                                    const d = new Date(year, month, i+1);
                                                    const isToday = d.toDateString() === TODAY.toDateString();
                                                    return (
                                                        <div key={i} className={`py-1 text-center border-r-2 border-slate-300 relative ${isToday ? 'bg-indigo-600/15' : ''}`}>
                                                            <span className={`text-[10px] font-bold uppercase ${isToday ? 'text-indigo-600' : 'text-slate-400'}`}>{d.toLocaleDateString(lang==='th'?'th':'en',{weekday:'short'}).charAt(0)}</span>
                                                            <span className={`block ${isToday ? 'text-indigo-700 underline underline-offset-2 decoration-2' : 'text-slate-700'}`}>{i+1}</span>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                            {groupedRooms.map(group => (
                                                <Fragment key={group.name}>
                                                    <div className="grid border-b-2 border-slate-400 bg-indigo-50/80 sticky left-0 z-10 font-black uppercase text-indigo-700 p-2 border-r-2 border-r-slate-400">{group.name}</div>
                                                    {group.rooms.map(r => (
                                                        <div key={r.id} className="grid border-b-2 border-slate-300 relative min-h-[44px]" style={{ gridTemplateColumns: `85px repeat(${daysInMonth}, 1fr)` }}>
                                                            <div className="p-1 sticky left-0 z-30 bg-white border-r-2 border-slate-400 flex flex-col items-center justify-center font-black text-[15px] text-slate-700">{r.name}</div>
                                                            {Array.from({length: daysInMonth}).map((_,i) => (
                                                                <div key={i} className={`border-r-2 border-slate-100 last:border-0 hover:bg-slate-50 transition-colors ${isTodayInView && (i+1) === TODAY.getDate() ? 'bg-indigo-600/5' : ''}`} />
                                                            ))}
                                                            {filteredBookings.filter(b => b.room === r.name).map(booking => {
                                                                const sch = getPaymentSchedule(booking).find(s => s.monthIndex === month && s.year === year);
                                                                const bal = sch ? Math.round(sch.owed - sch.paid) : 0;
                                                                const s = getStatus(booking);
                                                                const bS = new Date(booking.start), bE = new Date(booking.end);
                                                                const mS = new Date(year, month, 1), mE = new Date(year, month, daysInMonth);
                                                                if (bE <= mS || bS > mE) return null;
                                                                const startCol = Math.max(1, (bS.getMonth() === month && bS.getFullYear() === year ? bS.getDate() : 1));
                                                                const endCol = Math.min(daysInMonth, (bE.getMonth() === month && bE.getFullYear() === year ? bE.getDate() : daysInMonth));
                                                                return (
                                                                    <div key={booking.id} onClick={(e) => { e.stopPropagation(); setEditingId(booking.id); setFormData({...booking}); setShowModal(true); }} className={`absolute inset-y-1 border border-white/20 flex items-center px-2 z-20 transition-all hover:scale-[1.01] shadow-md ${getBarColor(booking, bal)} ${bS >= mS ? 'rounded-l-xl' : ''} ${bE <= mE ? 'rounded-r-xl' : ''}`} style={{ gridColumnStart: startCol+1, gridColumnEnd: endCol+2, left: '1px', right: '1px' }}>
                                                                        <div className="flex items-center justify-between w-full text-white whitespace-nowrap font-black tracking-tight uppercase overflow-hidden text-left">
                                                                            <span className="shrink-0 flex items-center gap-1.5">
                                                                                <div className={`w-2.5 h-2.5 rounded-full shrink-0 border border-white/30 ${bal > 0 ? 'bg-rose-400 animate-pulse' : 'bg-emerald-400'}`} />
                                                                                <Icon name={s.icon} size={15} className="shrink-0 opacity-90" />
                                                                            </span>
                                                                            <div className="flex-1 truncate px-2">{booking.guestName} <span className="opacity-40 font-normal">|</span> ฿{bal.toLocaleString()}</div>
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    ))}
                                                </Fragment>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* REMINDERS / NOTES */}
                        {activeTab === 'reminders' && (
                            <div className="animate-in slide-in-from-bottom duration-300 p-2 space-y-6 font-black">
                                <h2 className="text-center text-slate-900 text-[20px] tracking-widest font-black uppercase py-2">
                                    {t('NOTIF_HEADER')}
                                </h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                    <div className="card-standard p-4">
                                        <h3 className="font-black text-[17px] uppercase mb-4 flex items-center gap-2 text-indigo-700 border-b pb-2"><Icon name="Clock" size={18}/> {t('LOGISTICS')}</h3>
                                        <div className="space-y-1">
                                            {logisticsSorted.map((item, idx) => (
                                                <div key={idx} className={`note-row ${item.type.includes('IN') || item.type.includes('เข้า') ? 'bg-emerald-50 border-emerald-100 text-emerald-900' : 'bg-amber-50 border-amber-100 text-amber-900'}`}>
                                                    {formatRemDate(toISODate(item.date))} • {item.type}: {item.b.guestName} ({item.b.room})
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="card-standard p-4">
                                        <h3 className="font-black text-[17px] uppercase mb-4 flex items-center gap-2 text-rose-600 border-b pb-2"><Icon name="Wallet" size={18}/> {t('RENT_DUE')}</h3>
                                        <div className="space-y-1">
                                            {incomeDueSorted.map((item, idx) => (
                                                <div key={idx} className="note-row bg-rose-50 border-rose-100 text-rose-700">
                                                    {formatRemDate(toISODate(item.date))} • {item.b.guestName} ({item.b.room}) • ฿{item.bal.toLocaleString()}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="card-standard p-4">
                                        <h3 className="font-black text-[17px] uppercase mb-4 flex items-center gap-2 text-orange-600 border-b pb-2"><Icon name="Receipt" size={18}/> {t('BILL_DUE')}</h3>
                                        <div className="space-y-1">

                                    <form onSubmit={handleBillSaveNew} className="p-4 space-y-3 font-black text-[15px]">
                                        <div><label className="badge-label">{t('DESC')}</label><input type="text" placeholder="e.g. AC fix" className="w-full input-base" value={billFormData.title} onChange={e=>setBillFormData({...billFormData, title:e.target.value})} /></div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div><label className="badge-label">Category</label><select className="w-full input-base" value={billFormData.category} onChange={e=>setBillFormData({...billFormData, category:e.target.value})}>{BILL_CATEGORIES.map(c => <option key={c.id} value={c.id}>{lang==='th'?c.labelTh:c.labelEn}</option>)}</select></div>
                                            <div><label className="badge-label">Property</label><select className="w-full input-base" value={billFormData.property} onChange={e=>setBillFormData({...billFormData, property:e.target.value})}>{properties.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div><label className="badge-label">{t('DUE_DATE')}</label><input type="date" required className="w-full input-base" value={billFormData.dueDate} onChange={e=>setBillFormData({...billFormData, dueDate:e.target.value})} /></div>
                                            <div><label className="badge-label">{t('AMOUNT')}</label><input type="number" required className="w-full input-base" value={billFormData.amount} onChange={e=>setBillFormData({...billFormData, amount:Number(e.target.value)})} /></div>
                                        </div>
                                        <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase text-[15px] shadow-lg active:scale-95 transition-all">{t('SAVE')}</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* SETTINGS */}
                        {showSettings && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 font-black font-condensed">
                                <div className="bg-white rounded-[2rem] w-full max-w-lg shadow-2xl overflow-hidden my-auto animate-in zoom-in font-black">
                                    <div className="p-4 border-b bg-slate-50 flex justify-between items-center font-black"><h2 className="text-[15px] uppercase tracking-widest pl-2">{t('SYSTEM_CONFIG')}</h2><button onClick={() => setShowSettings(false)} className="p-2 text-slate-400 hover:text-slate-600"><Icon name="X" size={24}/></button></div>
                                    <div className="p-4 space-y-6 max-h-[70vh] overflow-y-auto pr-2 no-scrollbar">
                                        <section className="space-y-2 font-black"><h3 className="badge-label border-b pb-1 ml-1">{t('PROPERTIES')}</h3>
                                            {properties.map((p, i) => ( 
                                                <div key={i} className="flex gap-2"><input type="text" className="flex-1 input-base w-full" value={p} onBlur={e => handlePropertyRename(i, e.target.value)} /><button onClick={() => { if(confirm('Delete?')) { const n = properties.filter((_, idx) => idx !== i); setProperties(n); syncData({properties: n}); } }} className="p-2.5 text-rose-500 hover:bg-rose-50 rounded-xl font-black"><Icon name="Trash" size={18} /></button></div> 
                                            ))}
                                            <button onClick={() => { const n = [...properties, `New Prop`]; setProperties(n); syncData({properties: n}); }} className="w-full py-2.5 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-black text-[12px] uppercase tracking-widest">+ {t('ADD_PROP')}</button>
                                        </section>
                                        <section className="space-y-2 font-black"><h3 className="badge-label border-b pb-1 ml-1">{t('UNITS')}</h3>
                                            {rooms.map(r => ( 
                                                <div key={r.id} className="grid grid-cols-2 gap-2 bg-slate-50 p-3 rounded-2xl border items-center">
                                                    <div className="flex flex-col"><span className="badge-label">ID</span><input type="text" className="bg-white p-1.5 rounded-lg border focus:bg-indigo-50 outline-none w-full font-condensed" value={r.name} onChange={e => { const n = rooms.map(x => x.id === r.id ? {...x, name: e.target.value} : x); setRooms(n); syncData({rooms: n}); }} /></div>
                                                    <div className="flex gap-2 items-end"><div className="flex flex-col flex-1"><span className="badge-label">{t('PROPERTIES')}</span><select className="bg-white p-1.5 rounded-lg text-[12px] border outline-none font-black w-full font-condensed" value={r.property} onChange={e => { const n = rooms.map(x => x.id === r.id ? {...x, property: e.target.value} : x); setRooms(n); syncData({rooms: n}); }}>{properties.map(p => <option key={p} value={p}>{p}</option>)}</select></div><button onClick={() => { if(confirm('Delete?')) { const n = rooms.filter(x => x.id !== r.id); setRooms(n); syncData({rooms: n}); } }} className="p-2 text-rose-400 font-black"><Icon name="Trash" size={16} /></button></div>
                                                </div> 
                                            ))}
                                            <button onClick={() => { const n = [...rooms, { id: `r${Date.now()}`, name: 'NEW', property: (properties[0] || 'Property A') }]; setRooms(n); syncData({rooms: n}); }} className="w-full py-2.5 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-black text-[12px] uppercase tracking-widest">+ {t('ADD_UNIT')}</button>
                                        </section>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* DIAGNOSTIC PANEL */}
                        <div className="fixed bottom-0 inset-x-0 bg-slate-900 text-white text-[10px] p-2 flex gap-4 items-center justify-center border-t border-white/10 z-[200] font-black uppercase tracking-widest font-condensed">
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${dbStatus.auth.includes('✓') ? 'bg-emerald-500' : 'bg-rose-500'}`} /><span className="opacity-50">Auth:</span><span>{dbStatus.auth}</span></div>
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${dbStatus.firestore === 'Synced' ? 'bg-emerald-500' : 'bg-rose-500'}`} /><span className="opacity-50">Sync:</span><span>{dbStatus.firestore}</span></div>
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full bg-indigo-500 font-black`} /><span className="opacity-50">User:</span><span>{urlUser}</span></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
