<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROP MGR - Management Suite</title>
    <!-- 1. React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 2. Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 3. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 4. Firebase Compat SDKs (Reverting to high-stability compat) -->
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 antialiased overflow-x-hidden font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, Fragment } = React;

        // --- 1. FIREBASE CONFIGURATION ---
        const myGithubConfig = {
            apiKey: "AIzaSyASq1ntgInCnv4ZBL0b1KZxcSTS8HzmcJI", 
            authDomain: "propertycal1.firebaseapp.com",
            projectId: "propertycal1",
            storageBucket: "propertycal1.firebasestorage.app",
            messagingSenderId: "39254504887",
            appId: "1:39254504887:web:368ca09e2a2b1b46376432"
        };

        // Strict environment and ID mapping
        const isCanvas = typeof __firebase_config !== 'undefined';
        const firebaseConfig = isCanvas ? JSON.parse(__firebase_config) : myGithubConfig;
        const appId = isCanvas ? (typeof __app_id !== 'undefined' ? __app_id : 'prop-mgr-stable-v2') : 'prop-mgr-stable-v2';
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        const urlParams = new URLSearchParams(window.location.search);
        const urlUser = urlParams.get('user') || 'manager_main';
        const TODAY = new Date(2026, 2, 21);

        // --- 2. CONSTANTS ---
        const STAY_STATUSES = {
            IN: { id: 'checked-in', label: 'In', icon: 'Home', color: 'text-emerald-500', barBg: 'bg-emerald-600' },
            FUT: { id: 'future', label: 'Future', icon: 'Clock', color: 'text-blue-500', barBg: 'bg-blue-600' },
            OUT: { id: 'checked-out', label: 'Out', icon: 'CheckCircle2', color: 'text-slate-400', barBg: 'bg-slate-400' }
        };

        const BILL_CATEGORIES = [
            { id: 'Lease', icon: 'Building2', color: 'text-indigo-600' },
            { id: 'Electric', icon: 'Zap', color: 'text-amber-500' },
            { id: 'Water', icon: 'Droplets', color: 'text-blue-500' },
            { id: 'Wifi', icon: 'Wifi', color: 'text-sky-500' },
            { id: 'Cleaning', icon: 'Sparkles', color: 'text-teal-500' },
            { id: 'Repair', icon: 'Wrench', color: 'text-orange-500' },
            { id: 'Staff', icon: 'Users', color: 'text-purple-500' },
            { id: 'Other', icon: 'MoreHorizontal', color: 'text-slate-400' },
        ];

        // --- ICON SYSTEM ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const paths = {
                Building2: <><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></>,
                LayoutGrid: <><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></>,
                BellRing: <><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></>,
                LayoutDashboard: <><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></>,
                Receipt: <><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5V6.5"/></>,
                Wallet: <><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></>,
                ChevronLeft: <path d="m15 18-6-6 6-6"/>,
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                PlusCircle: <><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></>,
                Home: <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 22V12h6v10"/>,
                Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                CheckCircle2: <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
                AlertTriangle: <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></>,
                History: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5M12 7v5l4 2"/></>,
                Trash: <><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></>,
                Copy: <><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>,
                Settings: <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>,
                X: <path d="M18 6 6 18M6 6l12 12"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('calendar');
            const [selectedProperty, setSelectedProperty] = useState('All');
            const [viewDate, setViewDate] = useState(new Date(2026, 2, 1));
            const [hasLoaded, setHasLoaded] = useState(false);
            const isReadyToSync = useRef(false);
            
            const [dbStatus, setDbStatus] = useState({ auth: 'Wait...', firestore: 'Wait...', error: null });

            const [rooms, setRooms] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [paymentLog, setPaymentLog] = useState({});
            const [utilityLog, setUtilityLog] = useState({});
            const [bills, setBills] = useState([]);
            const [properties, setProperties] = useState(['Property A', 'Property B']);

            const [showModal, setShowModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [showLedgerInModal, setShowLedgerInModal] = useState(false);
            const [formData, setFormData] = useState({ 
                guestName: '', contact: '', room: '', property: '', start: '', end: '', monthlyRate: 5000, isFixedPrice: false, manualStatus: 'auto'
            });

            const [showBillModal, setShowBillModal] = useState(false);
            const [editingBillId, setEditingBillId] = useState(null);
            const [billFormData, setBillFormData] = useState({ title: '', category: 'Electric', property: 'Property A', amount: 0, dueDate: '', payments: [] });

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const isTodayVisible = TODAY.getFullYear() === year && TODAY.getMonth() === month;
            const todayDay = TODAY.getDate();

            // --- PERSISTENCE ENGINE (STRICT RULE 3: AUTH FIRST) ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        setDbStatus(s => ({ ...s, auth: 'Authenticating...' }));
                        // Rule 3: Use custom token if in Canvas, else anonymous
                        if (isCanvas && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            const cred = await auth.signInWithCustomToken(__initial_auth_token);
                            setUser(cred.user);
                        } else {
                            const cred = await auth.signInAnonymously();
                            setUser(cred.user);
                        }
                        setDbStatus(s => ({ ...s, auth: `Active: ${auth.currentUser?.uid.slice(0,5)}` }));
                    } catch (e) {
                        setDbStatus(s => ({ ...s, auth: 'Auth Error', error: e.message }));
                    }
                };
                initAuth();
            }, []);

            useEffect(() => {
                // Rule 3 Guard: Wait for auth before querying
                if (!user) return;

                // Rule 1: Precise Path structure for data persistence
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('propertyData').doc(urlUser);
                setDbStatus(s => ({ ...s, firestore: 'Connecting...' }));

                const unsub = docRef.onSnapshot((snap) => {
                    if (snap.exists) {
                        const d = snap.data();
                        setBookings(d.bookings || []);
                        setRooms(d.rooms || []);
                        setPaymentLog(d.paymentLog || {});
                        setUtilityLog(d.utilityLog || {});
                        setBills(d.bills || []);
                        setProperties(d.properties || ['Property A', 'Property B']);
                        setDbStatus(s => ({ ...s, firestore: 'Synced ✓' }));
                    } else {
                        // Initial boilerplate if no data exists
                        const initR = Array.from({ length: 12 }, (_, i) => ({ id: `r${i}`, name: `${101 + i}`, property: 'Property A' }));
                        docRef.set({ rooms: initR, properties: ['Property A', 'Property B'], bookings: [], paymentLog: {}, utilityLog: {}, bills: [] });
                        setDbStatus(s => ({ ...s, firestore: 'Ready (New)' }));
                    }
                    setHasLoaded(true);
                    isReadyToSync.current = true;
                }, err => {
                    setDbStatus(s => ({ ...s, firestore: 'Permission Denied', error: err.message }));
                });

                return () => unsub();
            }, [user]);

            const sync = async (update) => {
                if (!user || !isReadyToSync.current) return;
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('propertyData').doc(urlUser);
                try {
                    await docRef.set(update, { merge: true });
                } catch (e) {
                    setDbStatus(s => ({ ...s, error: `Sync Fail: ${e.message}` }));
                }
            };

            // --- HELPERS ---
            const toISODate = (date) => date.toLocaleDateString('sv-SE');
            const getMonthYearShort = (date) => `${new Intl.DateTimeFormat('en-US', { month: 'short' }).format(date).toUpperCase()} ${date.getFullYear()}`;
            const formatBarDate = (dateStr) => {
                if (!dateStr) return '...';
                const d = new Date(dateStr);
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                return `${d.getDate()}${months[d.getMonth()]}`;
            };
            const formatVacancyDate = (date) => {
                if (!date) return '∞';
                const d = new Date(date);
                return `${d.getDate()}${new Intl.DateTimeFormat('en-US', { month: 'short' }).format(d).toUpperCase()}${d.getFullYear().toString().slice(-2)}`;
            };

            // --- LOGIC ---
            const getStatus = (b) => {
                if (b.manualStatus === 'checked-in') return STAY_STATUSES.IN;
                if (b.manualStatus === 'checked-out') return STAY_STATUSES.OUT;
                const s = new Date(b.start), e = new Date(b.end);
                if (TODAY < s) return STAY_STATUSES.FUT;
                if (TODAY >= s && TODAY < e) return STAY_STATUSES.IN;
                return STAY_STATUSES.OUT;
            };

            const getPaymentSchedule = (booking) => {
                if (!booking || !booking.start || !booking.end) return [];
                const start = new Date(booking.start), end = new Date(booking.end);
                const schedule = [];
                let current = new Date(start.getFullYear(), start.getMonth(), 1);
                let isFirst = true;
                while (current <= end) {
                    const cY = current.getFullYear(), cM = current.getMonth();
                    const mD = new Date(cY, cM + 1, 0).getDate();
                    const sDay = (cM === start.getMonth() && cY === start.getFullYear()) ? start.getDate() : 1;
                    const eDay = (cM === end.getMonth() && cY === end.getFullYear()) ? end.getDate() : mD + 1;
                    const days = Math.max(0, eDay - sDay);
                    if (days > 0) {
                        let rent = booking.isFixedPrice ? (isFirst ? (booking.monthlyRate || 0) : 0) : Math.round((days >= mD ? (booking.monthlyRate || 0) : ((booking.monthlyRate || 0) / mD) * days));
                        isFirst = false;
                        const key = `${booking.id}_${cM}_${cY}`;
                        const util = utilityLog[key] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 200 };
                        let utilOwed = util.elecEnd > 0 ? Math.round(Math.max(0, (util.elecEnd - util.elecStart) * util.elecRate) + util.water) : 0;
                        const paid = (paymentLog[key] || []).reduce((s, p) => s + p.amount, 0);
                        schedule.push({ monthIndex: cM, year: cY, label: new Intl.DateTimeFormat('en-US', { month: 'short' }).format(current), rent, utilOwed, owed: rent + utilOwed, paid, util });
                    }
                    current = new Date(cY, cM + 1, 1);
                }
                return schedule;
            };

            const filteredRooms = rooms.filter(r => selectedProperty === 'All' || r.property === selectedProperty);
            const filteredBookings = bookings.filter(b => rooms.some(r => r.name === b.room && (selectedProperty === 'All' || r.property === selectedProperty)));
            const filteredBills = bills.filter(b => selectedProperty === 'All' || b.property === selectedProperty);

            const getBarColor = (b, bal) => {
                const s = getStatus(b);
                if (s.id === 'checked-out') return 'bg-slate-400';
                if (s.id === 'future') return 'bg-blue-600';
                return bal > 0 ? 'bg-rose-600' : 'bg-emerald-600';
            };

            const handleSaveBooking = async (e) => {
                e.preventDefault();
                const newB = editingId ? bookings.map(b => b.id === editingId ? { ...formData, id: editingId } : b) : [...bookings, { ...formData, id: Date.now().toString(), manualStatus: 'auto' }];
                setBookings(newB); await sync({ bookings: newB }); setShowModal(false);
            };

            const handleBillSave = async (e) => {
                e.preventDefault();
                const newBills = editingBillId ? bills.map(b => b.id === editingBillId ? { ...billFormData, id: editingBillId } : b) : [...bills, { ...billFormData, id: Date.now().toString() }];
                setBills(newBills); await sync({ bills: newBills }); setShowBillModal(false);
            };

            const addPayLocal = async (bookingId, m, y, amount) => {
                if (!amount || amount <= 0) return;
                const key = `${bookingId}_${m}_${y}`;
                const newLog = { ...paymentLog, [key]: [...(paymentLog[key] || []), { amount: Math.round(Number(amount)), date: toISODate(new Date()) }] };
                setPaymentLog(newLog); await sync({ paymentLog: newLog });
            };

            const updateUtilLocal = async (bookingId, m, y, field, val) => {
                const key = `${bookingId}_${m}_${y}`;
                const newUtil = { ...utilityLog, [key]: { ...(utilityLog[key] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 200 }), [field]: Number(val) } };
                setUtilityLog(newUtil); await sync({ utilityLog: newUtil });
            };

            const duplicateBill = async (bill) => {
                const d = new Date(bill.dueDate); d.setMonth(d.getMonth() + 1);
                const updated = [...bills, { ...bill, id: Date.now().toString(), payments: [], dueDate: toISODate(d) }];
                setBills(updated); await sync({ bills: updated });
            };

            const accountingData = useMemo(() => {
                let inc = 0, exp = 0;
                filteredBookings.forEach(b => getPaymentSchedule(b).forEach(s => inc += s.paid));
                filteredBills.forEach(bill => exp += (bill.payments || []).reduce((s, p) => s + p.amount, 0));
                return { income: inc, expense: exp, net: inc - exp };
            }, [filteredBookings, filteredBills]);

            return (
                <div className="min-h-screen font-sans p-1 pb-24">
                    <div className="max-w-[1800px] mx-auto">
                        
                        {/* GLOBAL HEADER */}
                        <div className="flex flex-wrap justify-between items-center mb-1 gap-1 bg-white p-1 rounded-2xl shadow-sm border border-slate-300">
                            <div className="flex items-center gap-3 pl-1">
                                <div className="flex items-center gap-2">
                                    <div className="bg-indigo-800 p-1.5 rounded-xl text-white shadow-sm"><Icon name="Building2" size={20} /></div>
                                    <h1 className="text-[14px] font-black tracking-tighter uppercase mr-3">PROP MGR</h1>
                                </div>
                                <div className="flex items-center bg-slate-100 p-0.5 rounded-xl border border-slate-200 gap-0.5 overflow-x-auto no-scrollbar">
                                    {[
                                        { id: 'calendar', label: 'CALENDAR', icon: 'LayoutGrid' },
                                        { id: 'reminders', label: 'REMINDERS', icon: 'BellRing' },
                                        { id: 'vacancy', label: 'VACANCY', icon: 'LayoutDashboard' },
                                        { id: 'bills', label: 'BILLS', icon: 'Receipt' },
                                        { id: 'accounting', label: 'ACCOUNTING', icon: 'Wallet' }
                                    ].map(t => (
                                        <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all shrink-0 ${activeTab === t.id ? 'bg-white text-indigo-700 shadow-sm border border-slate-200' : 'text-slate-400 hover:text-slate-600'}`}>
                                            <Icon name={t.icon} size={14} /> <span className="hidden md:inline ml-1">{t.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="flex items-center gap-2 pr-1">
                                <div className="flex items-center gap-1 bg-slate-100 px-2 py-1 rounded-xl border border-slate-200">
                                    <select className="bg-transparent text-[11px] font-black text-indigo-700 outline-none cursor-pointer" value={selectedProperty} onChange={e => setSelectedProperty(e.target.value)}>
                                        <option value="All">All View</option>
                                        {properties.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                    <button onClick={() => setShowSettings(true)} className="p-1 text-slate-400 hover:text-indigo-600 transition-colors"><Icon name="Settings" size={14} /></button>
                                </div>
                            </div>
                        </div>

                        {/* TAB CONTENTS */}
                        {activeTab === 'calendar' ? (
                            <div className="space-y-1 animate-in fade-in duration-300">
                                <div className="flex flex-wrap items-center justify-between px-2 py-0.5 gap-2">
                                    {/* STATUS LEGEND */}
                                    <div className="flex items-center gap-3 bg-white/60 border border-slate-200 px-4 py-1.5 rounded-xl text-[10px] font-black text-slate-400 uppercase tracking-tighter shadow-sm">
                                        <div className="flex items-center gap-1"><Icon name="Home" size={13} className="text-emerald-500" /> IN</div>
                                        <div className="flex items-center gap-1"><Icon name="Clock" size={13} className="text-blue-500" /> FUT</div>
                                        <div className="flex items-center gap-1"><Icon name="CheckCircle2" size={13} className="text-slate-400" /> OUT</div>
                                        <div className="w-px h-3 bg-slate-200 mx-1" />
                                        <div className="flex items-center gap-1 text-emerald-600"><div className="w-2.5 h-2.5 rounded-full bg-emerald-500" /> PAID</div>
                                        <div className="flex items-center gap-1 text-rose-500"><div className="w-2.5 h-2.5 rounded-full bg-rose-500 animate-pulse" /> OWES</div>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <div className="flex items-center bg-white p-0.5 rounded-xl border border-slate-300 shadow-sm overflow-hidden">
                                            <button onClick={() => setViewDate(new Date(year, month-1, 1))} className="p-2 hover:bg-slate-50 transition-colors"><Icon name="ChevronLeft" size={14} /></button>
                                            <span className="font-black px-4 min-w-[110px] text-center text-[12px] uppercase text-indigo-700 bg-indigo-50/50 py-1.5 rounded-lg">{getMonthYearShort(viewDate)}</span>
                                            <button onClick={() => setViewDate(new Date(year, month+1, 1))} className="p-2 hover:bg-slate-50 transition-colors"><Icon name="ChevronRight" size={14} /></button>
                                        </div>
                                        <button onClick={() => { setEditingId(null); setFormData({guestName:'', contact:'', room: (filteredRooms[0]?.name || ''), property: (filteredRooms[0]?.property || properties[0]), start:toISODate(TODAY), end:toISODate(new Date(TODAY.getTime() + 86400000)), monthlyRate: 5000, isFixedPrice: false, manualStatus:'auto'}); setShowModal(true); }} className="bg-indigo-600 text-white px-4 py-1.5 rounded-xl font-black text-[12px] uppercase shadow-md active:scale-95 flex items-center gap-1 hover:bg-indigo-700 transition-all">+ NEW STAY</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-xl border-2 border-slate-400 overflow-hidden relative">
                                    <div className="overflow-x-auto">
                                        <div className="min-w-[1200px] relative">
                                            <div className="grid border-b-2 border-slate-400 bg-slate-50 sticky top-0 z-40" style={{ gridTemplateColumns: `85px repeat(${daysInMonth}, 1fr)` }}>
                                                <div className="p-1 font-black text-slate-400 text-[11px] uppercase border-r-2 border-slate-400 sticky left-0 z-50 bg-slate-50 text-center flex items-center justify-center">Unit</div>
                                                {Array.from({length: daysInMonth}).map((_,i) => {
                                                    const isToday = isTodayVisible && (i+1) === todayDay;
                                                    return (

                                                        <span className="text-[8px] font-bold text-slate-400 uppercase ml-1">ID</span>
                                                        <input type="text" className="bg-white p-1.5 rounded-lg font-black text-[13px] border border-slate-200 focus:bg-indigo-50 transition-colors" value={r.name} onChange={e => {
                                                            const n = rooms.map(x => x.id === r.id ? {...x, name: e.target.value} : x);
                                                            setRooms(n); sync({rooms: n});
                                                        }} />
                                                    </div>
                                                    <div className="flex gap-2 items-end">
                                                        <div className="flex flex-col flex-1">
                                                            <span className="text-[8px] font-bold text-slate-400 uppercase ml-1">Property</span>
                                                            <select className="bg-white p-1.5 rounded-lg font-black text-[11px] border border-slate-200" value={r.property} onChange={e => {
                                                                const n = rooms.map(x => x.id === r.id ? {...x, property: e.target.value} : x);
                                                                setRooms(n); sync({rooms: n});
                                                            }}>{properties.map(p => <option key={p} value={p}>{p}</option>)}</select>
                                                        </div>
                                                        <button onClick={() => { if(confirm('Delete unit?')) { const n = rooms.filter(x => x.id !== r.id); setRooms(n); sync({rooms: n}); } }} className="p-2 text-rose-400 hover:bg-rose-50 rounded-xl transition-all"><Icon name="Trash" size={16} /></button>
                                                    </div>
                                                </div>
                                            ))}
                                            <button onClick={() => { const n = [...rooms, { id: `r${Date.now()}`, name: 'NEW', property: properties[0] }]; setRooms(n); sync({rooms: n}); }} className="w-full py-2.5 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-black text-[10px] uppercase tracking-widest hover:border-indigo-600 hover:text-indigo-600 transition-all">+ ADD UNIT</button>
                                        </section>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showBillModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 overflow-y-auto">
                                <div className="bg-white rounded-[2rem] w-full max-w-lg shadow-2xl overflow-hidden my-auto animate-in zoom-in duration-200">
                                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                                        <h2 className="text-[12px] font-black uppercase pl-2 tracking-widest">{editingBillId ? 'Edit Bill' : 'New Bill'}</h2>
                                        <button onClick={() => setShowBillModal(false)} className="p-2 text-slate-400 hover:text-rose-500"><Icon name="X" size={24}/></button>
                                    </div>
                                    <form onSubmit={handleBillSave} className="p-4 space-y-3">
                                        <div className="grid grid-cols-2 gap-2">
                                            <select className="bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[14px]" value={billFormData.category} onChange={e=>setBillFormData({...billFormData, category:e.target.value})}>{BILL_CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.id}</option>)}</select>
                                            <select className="bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[14px]" value={billFormData.property} onChange={e=>setBillFormData({...billFormData, property:e.target.value})}>{properties.map(p => <option key={p} value={p}>{p}</option>)}</select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div><label className="text-[10px] font-black text-slate-400 uppercase ml-2">Due Date</label><input type="date" required className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[14px]" value={billFormData.dueDate} onChange={e=>setBillFormData({...billFormData, dueDate:e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400 uppercase ml-2">Amount</label><input type="number" required className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-[14px]" value={billFormData.amount} onChange={e=>setBillFormData({...billFormData, amount:Number(e.target.value)})} /></div>
                                        </div>
                                        <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl hover:bg-indigo-700 transition-all">Save Bill</button>
                                        {editingBillId && <button type="button" onClick={async () => { if(confirm('Delete bill?')) { const n=bills.filter(b=>b.id!==editingBillId); setBills(n); await sync({bills:n}); setShowBillModal(false); } }} className="w-full text-slate-300 font-bold text-[10px] uppercase mt-2 hover:text-rose-500 transition-colors">Delete Bill Record</button>}
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* DIAGNOSTIC PANEL */}
                        <div className="fixed bottom-0 inset-x-0 bg-slate-900 text-white text-[10px] p-2 flex gap-4 items-center justify-center border-t border-white/10 z-[200]">
                            <div className="flex items-center gap-1.5">
                                <div className={`w-2 h-2 rounded-full ${dbStatus.auth.includes('Active') ? 'bg-emerald-500' : 'bg-rose-500'}`} />
                                <span className="opacity-50">AUTH:</span>
                                <span>{dbStatus.auth}</span>
                            </div>
                            <div className="flex items-center gap-1.5">
                                <div className={`w-2 h-2 rounded-full ${dbStatus.firestore === 'Synced ✓' ? 'bg-emerald-500' : 'bg-rose-500'}`} />
                                <span className="opacity-50">DATA:</span>
                                <span>{dbStatus.firestore}</span>
                            </div>
                            {dbStatus.error && (
                                <div className="text-rose-400 flex items-center gap-1">
                                    <Icon name="AlertTriangle" size={12} />
                                    <span>FAILURE: {dbStatus.error}</span>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://loren-6q.github.io/WETNav/nav.js"></script>
</body>
</html>
