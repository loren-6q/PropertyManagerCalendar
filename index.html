<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROP MGR - Management Suite</title>
    <!-- 1. React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- 3. Tailwind CSS -->

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

</head>
<body class="bg-slate-100 antialiased overflow-x-hidden font-sans text-slate-900 text-[12px]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, Fragment } = React;

        // --- GLOBAL CONSTANTS & CONFIG (Pinned to Top) ---
        const TODAY = new Date(2026, 2, 21);
        const appId = 'prop-mgr-stable-v2';
        const mos = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        
        const urlParams = new URLSearchParams(window.location.search);
        const urlUser = urlParams.get('user') || 'manager_main';

        const myGithubConfig = {
            apiKey: "AIzaSyCF3LiF_63ErJmxwfAqBf-xKmucZGYcyCA", 
            authDomain: "propertycal1.firebaseapp.com",
            projectId: "propertycal1",
            storageBucket: "propertycal1.firebasestorage.app",
            messagingSenderId: "39254504887",
            appId: "1:39254504887:web:368ca09e2a2b1b46376432"
        };

        const isCanvas = typeof __firebase_config !== 'undefined';
        const hasCustomKey = myGithubConfig.apiKey !== "PASTE_YOUR_RESTRICTED_API_KEY_HERE";
        const firebaseConfig = (isCanvas && !hasCustomKey) ? JSON.parse(__firebase_config) : myGithubConfig;

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const STAY_STATUSES = {
            IN: { id: 'checked-in', label: 'In', icon: 'Home', color: 'text-emerald-500', barBg: 'bg-emerald-600' },
            FUT: { id: 'future', label: 'Future', icon: 'Clock', color: 'text-blue-500', barBg: 'bg-blue-600' },
            OUT: { id: 'checked-out', label: 'Out', icon: 'CheckCircle2', color: 'text-slate-400', barBg: 'bg-slate-400' }
        };

        const BILL_CATEGORIES = [
            { id: 'Lease', icon: 'Building2', color: 'text-indigo-600' },
            { id: 'Electric', icon: 'Zap', color: 'text-amber-500' },
            { id: 'Water', icon: 'Droplets', color: 'text-blue-500' },
            { id: 'Wifi', icon: 'Wifi', color: 'text-sky-500' },
            { id: 'Cleaning', icon: 'Sparkles', color: 'text-teal-500' },
            { id: 'Repair', icon: 'Wrench', color: 'text-orange-500' },
            { id: 'Staff', icon: 'Users', color: 'text-purple-500' },
            { id: 'Other', icon: 'MoreHorizontal', color: 'text-slate-400' },
        ];

        const SAMPLE_ROOMS = Array.from({ length: 8 }, (_, i) => ({ id: `r${i}`, name: `${101 + i}`, property: 'Property A' }));

        // --- COMPONENTS ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const paths = {
                Building2: <Fragment><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></Fragment>,
                LayoutGrid: <Fragment><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></Fragment>,
                BellRing: <Fragment><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></Fragment>,
                LayoutDashboard: <Fragment><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></Fragment>,
                Receipt: <Fragment><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5V6.5"/></Fragment>,
                Wallet: <Fragment><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></Fragment>,
                ChevronLeft: <path d="m15 18-6-6 6-6"/>,
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                ChevronUp: <path d="m18 15-6-6-6 6"/>,
                ChevronDown: <path d="m6 9 6 6 6-6"/>,
                PlusCircle: <Fragment><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></Fragment>,
                Home: <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 22V12h6v10"/>,
                Clock: <Fragment><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Fragment>,
                CheckCircle2: <Fragment><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Fragment>,
                AlertTriangle: <Fragment><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></Fragment>,
                History: <Fragment><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5M12 7v5l4 2"/></Fragment>,
                Trash: <Fragment><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></Fragment>,
                Copy: <Fragment><rect width="10" height="10" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></Fragment>,
                Pencil: <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>,
                Check: <path d="M20 6 9 17l-5-5"/>,
                Zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                Droplets: <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5s-3 3.5-3 5.5a7 7 0 0 0 7 7z" />,
                StickyNote: <Fragment><path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3z"/><path d="M15 3v6h6"/><path d="M9 13h6"/><path d="M9 17h3"/></Fragment>,
                Settings: <Fragment><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Fragment>,
                X: <path d="M18 6 6 18M6 6l12 12"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        function App() {
            // --- 1. STATE & CORE VARIABLES ---
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('calendar');
            const [selectedProperty, setSelectedProperty] = useState('All');
            const [viewDate, setViewDate] = useState(new Date(2026, 2, 1));
            
            const [rooms, setRooms] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [paymentLog, setPaymentLog] = useState({});
            const [utilityLog, setUtilityLog] = useState({});
            const [bills, setBills] = useState([]);
            const [properties, setProperties] = useState(['Property A', 'Property B']);
            
            const [dbStatus, setDbStatus] = useState({ auth: 'Wait...', firestore: 'Wait...', error: null });
            const [hasLoaded, setHasLoaded] = useState(false);
            const isReadyToSync = useRef(false);

            // Derived Time State
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const isTodayVisible = TODAY.getFullYear() === year && TODAY.getMonth() === month;
            const todayDay = TODAY.getDate();

            // UI Interaction States
            const [showModal, setShowModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showBillModal, setShowBillModal] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [editingBillId, setEditingBillId] = useState(null);
            const [showLedgerInModal, setShowLedgerInModal] = useState(false);
            const [showNotesInModal, setShowNotesInModal] = useState(false);
            const [showBillLedgerId, setShowBillLedgerId] = useState(null);

            // Form states
            const [formData, setFormData] = useState({ guestName: '', contact: '', room: '', property: '', start: '', end: '', monthlyRate: 5000, isFixedPrice: false, manualStatus: 'auto', notes: '' });
            const [billFormData, setBillFormData] = useState({ title: '', category: 'Electric', property: 'Property A', amount: 0, dueDate: '', payments: [] });

            // --- 2. HELPERS ---
            const toISODate = (date) => date.toLocaleDateString('sv-SE');
            const getMonthYearShort = (date) => `${mos[date.getMonth()]} ${date.getFullYear()}`;
            const formatBarDate = (dateStr) => { if (!dateStr) return '...'; const d = new Date(dateStr); return `${d.getDate()}${mos[d.getMonth()]}`; };
            const formatVacancyDate = (date) => { if (!date) return '∞'; const d = new Date(date); return `${d.getDate()}${mos[d.getMonth()]}${d.getFullYear().toString().slice(-2)}`; };

            const getStatus = (b) => {
                if (!b) return STAY_STATUSES.OUT;
                if (b.manualStatus === 'checked-in') return STAY_STATUSES.IN;
                if (b.manualStatus === 'checked-out') return STAY_STATUSES.OUT;
                const s = new Date(b.start), e = new Date(b.end);
                return (TODAY < s) ? STAY_STATUSES.FUT : (TODAY >= s && TODAY < e) ? STAY_STATUSES.IN : STAY_STATUSES.OUT;
            };

            const getPaymentSchedule = (booking) => {
                if (!booking || !booking.start || !booking.end) return [];
                const start = new Date(booking.start), end = new Date(booking.end);
                const schedule = [];
                let current = new Date(start.getFullYear(), start.getMonth(), 1);
                let isFirst = true;
                while (current <= end) {
                    const cY = current.getFullYear(), cM = current.getMonth();
                    const mD = new Date(cY, cM + 1, 0).getDate();
                    const sDay = (cM === start.getMonth() && cY === start.getFullYear()) ? start.getDate() : 1;
                    const eDay = (cM === end.getMonth() && cY === end.getFullYear()) ? end.getDate() : mD + 1;
                    const days = Math.max(0, eDay - sDay);
                    if (days > 0) {
                        let rent = booking.isFixedPrice ? (isFirst ? (Number(booking.monthlyRate) || 0) : 0) : Math.round((days >= mD ? (Number(booking.monthlyRate) || 0) : ((Number(booking.monthlyRate) || 0) / mD) * days));
                        isFirst = false;
                        const key = `${booking.id}_${cM}_${cY}`;
                        const util = utilityLog[key] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 0, otherAmt: 0, otherNote: '' };
                        const electricOwed = util.elecEnd > 0 ? Math.round(Math.max(0, (util.elecEnd - util.elecStart) * (Number(util.elecRate) || 8))) : 0;
                        const waterOwed = Number(util.water) || 0;
                        const otherOwed = Number(util.otherAmt) || 0;
                        const owed = rent + electricOwed + waterOwed + otherOwed;
                        const paid = (paymentLog[key] || []).reduce((s, p) => s + (Number(p.amount) || 0), 0);
                        schedule.push({ monthIndex: cM, year: cY, label: mos[cM], rent, electricOwed, waterOwed, otherOwed, otherNote: util.otherNote || '', owed, paid, util });
                    }
                    current = new Date(cY, cM + 1, 1);
                }
                return schedule;
            };

            const getBarColor = (b, bal) => {
                const s = getStatus(b);
                if (s.id === 'checked-out') return 'bg-slate-400';
                if (s.id === 'future') return 'bg-blue-600';
                return bal > 0 ? 'bg-rose-600' : 'bg-emerald-600';
            };

            // --- 3. DATA FILTERING & MEMOIZATION ---
            const filteredRooms = rooms.filter(r => selectedProperty === 'All' || r.property === selectedProperty);
            const filteredBookings = bookings.filter(b => rooms.some(r => r.name === b.room && (selectedProperty === 'All' || r.property === selectedProperty)));
            const filteredBills = bills.filter(b => selectedProperty === 'All' || b.property === selectedProperty).sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));

            const groupedRooms = useMemo(() => {
                const propsToGroup = selectedProperty === 'All' ? properties : [selectedProperty];
                return propsToGroup.map(p => ({
                    name: p,
                    rooms: filteredRooms.filter(r => r.property === p).sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric: true}))
                })).filter(g => g.rooms.length > 0);
            }, [filteredRooms, properties, selectedProperty]);

            const accountingData = useMemo(() => {
                let totalIncome = 0; let totalExpense = 0;
                const currentMonthLedger = [];
                const historyMap = {};

                const visibleBookingIds = new Set(filteredBookings.map(b => b.id));
                const bookingLookup = {};
                filteredBookings.forEach(b => bookingLookup[b.id] = b);

                Object.entries(paymentLog).forEach(([key, pays]) => {
                    const parts = key.split('_');
                    if (parts.length === 3) {
                        const bid = parts[0];
                        if (visibleBookingIds.has(bid)) {
                            const b = bookingLookup[bid];
                            const m = parseInt(parts[1]);
                            const y = parseInt(parts[2]);
                            const hKey = `${m}_${y}`;
                            if (!historyMap[hKey]) historyMap[hKey] = { inc: 0, exp: 0, label: `${mos[m]} ${y}`, m, y };
                            (pays || []).forEach(p => {
                                const amt = Number(p.amount) || 0;
                                totalIncome += amt;
                                historyMap[hKey].inc += amt;
                                if (m === month && y === year) currentMonthLedger.push({ date: p.date, label: `${b.guestName} (${b.room})`, amount: amt, type: 'IN' });
                            });
                        }
                    }
                });
                
                filteredBills.forEach(bill => {
                    (bill.payments || []).forEach(p => {
                        const amt = Number(p.amount) || 0;
                        totalExpense += amt;
                        const d = new Date(p.date);
                        const m = d.getMonth();
                        const y = d.getFullYear();
                        const hKey = `${m}_${y}`;
                        if(!historyMap[hKey]) historyMap[hKey] = { inc: 0, exp: 0, label: `${mos[m]} ${y}`, m, y };
                        historyMap[hKey].exp += amt;
                        if (m === month && y === year) currentMonthLedger.push({ date: p.date, label: `${bill.category} (${bill.property})`, amount: amt, type: 'OUT' });
                    });
                });

                return { income: totalIncome, expense: totalExpense, net: totalIncome - totalExpense, monthLedger: currentMonthLedger.sort((a,b) => new Date(b.date) - new Date(a.date)), history: Object.values(historyMap).sort((a,b) => new Date(b.y, b.m) - new Date(a.y, a.m)).reverse() };
            }, [filteredBookings, filteredBills, paymentLog, month, year]);

            const vacancyReportData = useMemo(() => {
                return rooms.map(room => {
                    const rb = bookings.filter(b => b.room === room.name).sort((a,b) => new Date(a.start) - new Date(b.start));
                    let last = new Date(TODAY); const list = [];
                    rb.forEach(b => { const start = new Date(b.start); if (start > last) list.push({ from: new Date(last), to: new Date(start) }); if (new Date(b.end) > last) last = new Date(b.end); });
                    list.push({ from: new Date(last), to: null });
                    return { room, list };
                }).sort((a, b) => (a.list[0]?.from || new Date(2100, 1, 1)) - (b.list[0]?.from || new Date(2100, 1, 1)));
            }, [rooms, bookings]);

            // --- 4. PERSISTENCE ENGINE ---
            const syncData = async (update) => {
                if (!user || !isReadyToSync.current) return;
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('propertyData').doc(urlUser);
                await docRef.set(update, { merge: true });
            };

            const addPayLocal = async (bid, m, y, amt) => {
                const key = `${bid}_${m}_${y}`;
                const newLog = { ...paymentLog, [key]: [...(paymentLog[key] || []), { id: Date.now().toString(), amount: Number(amt), date: toISODate(new Date()) }] };
                setPaymentLog(newLog); await syncData({ paymentLog: newLog });
            };

            const updatePayLocal = async (bid, m, y, pid, field, val) => {
                const key = `${bid}_${m}_${y}`;
                const newLog = { ...paymentLog, [key]: (paymentLog[key] || []).map(p => p.id === pid ? {...p, [field]: field === 'amount' ? Number(val) : val} : p) };
                setPaymentLog(newLog); await syncData({ paymentLog: newLog });
            };

            const deletePayLocal = async (bid, m, y, pid) => {
                const key = `${bid}_${m}_${y}`;
                const newLog = { ...paymentLog, [key]: (paymentLog[key] || []).filter(p => p.id !== pid) };
                setPaymentLog(newLog); await syncData({ paymentLog: newLog });
            };

            const updateUtilLocal = async (bid, m, y, field, val) => {
                const key = `${bid}_${m}_${y}`;
                const newUtil = { ...utilityLog, [key]: { ...(utilityLog[key] || { elecStart: 0, elecEnd: 0, elecRate: 8, water: 0, otherAmt: 0, otherNote: '' }), [field]: field === 'otherNote' ? val : Number(val) } };
                setUtilityLog(newUtil); await syncData({ utilityLog: newUtil });
            };

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        setDbStatus(s => ({ ...s, auth: 'Sign-In...' }));
                        const cred = await auth.signInAnonymously();
                        setUser(cred.user);
                        setDbStatus(s => ({ ...s, auth: `Active: ${auth.currentUser?.uid.slice(0,5)}` }));
                    } catch (e) { setDbStatus(s => ({ ...s, auth: 'Auth Failed', error: e.message })); }
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('propertyData').doc(urlUser);
                return docRef.onSnapshot((snap) => {
                    if (snap.exists) {
                        const d = snap.data();
                        setBookings(d.bookings || []); setRooms(d.rooms || []); setPaymentLog(d.paymentLog || {});
                        setUtilityLog(d.utilityLog || {}); setBills(d.bills || []); setProperties(d.properties || ['Property A', 'Property B']);
                        setDbStatus(s => ({ ...s, firestore: 'Synced ✓' }));
                    } else {
                        setRooms(SAMPLE_ROOMS); setDbStatus(s => ({ ...s, firestore: 'Sample Mode' }));
                    }
                    setHasLoaded(true); isReadyToSync.current = true;
                }, err => setDbStatus(s => ({ ...s, firestore: 'Blocked', error: err.message })));
            }, [user]);

            // --- 5. EVENT HANDLERS ---
            const handleSaveBooking = async (e) => {
                e.preventDefault();
                const newB = editingId ? bookings.map(b => b.id === editingId ? { ...formData, id: editingId } : b) : [...bookings, { ...formData, id: Date.now().toString(), manualStatus: 'auto', notes: '' }];
                setBookings(newB); await syncData({ bookings: newB }); setShowModal(false);
            };

            const handleBillSave = async (e) => {
                e.preventDefault();
                const newBills = editingBillId ? bills.map(b => b.id === editingBillId ? { ...billFormData, id: editingBillId } : b) : [...bills, { ...billFormData, id: Date.now().toString(), payments: [] }];
                setBills(newBills); await syncData({ bills: newBills }); setShowBillModal(false);
            };

            const handleQuickBillPay = (bill) => {
                const paid = (bill.payments || []).reduce((s,p) => s + (Number(p.amount) || 0), 0);
                const balance = Number(bill.amount) - paid;
                if (balance <= 0) return;
                const newBills = bills.map(b => b.id === bill.id ? { ...b, payments: [...(b.payments || []), { id: Date.now().toString(), amount: balance, date: toISODate(new Date()) }] } : b);
                setBills(newBills); syncData({ bills: newBills });
            };

            const handleBillPaymentUpdate = async (billId, paymentId, field, val) => {
                const newBills = bills.map(b => b.id === billId ? {
                    ...b,
                    payments: (b.payments || []).map(p => p.id === paymentId ? { ...p, [field]: field === 'amount' ? Number(val) : val } : p)
                } : b);
                setBills(newBills); await syncData({ bills: newBills });
            };

            const handleBillPaymentDelete = async (billId, paymentId) => {
                const newBills = bills.map(b => b.id === billId ? { ...b, payments: (b.payments || []).filter(p => p.id !== paymentId) } : b);
                setBills(newBills); await syncData({ bills: newBills });
            };

            const handleQuickBillDelete = (id) => {
                if(!confirm('Delete permanently?')) return;
                const n = bills.filter(b => b.id !== id);
                setBills(n); syncData({ bills: n });
            };

            const duplicateBill = async (bill) => {
                const d = new Date(bill.dueDate); d.setMonth(d.getMonth() + 1);
                const updated = [...bills, { ...bill, id: Date.now().toString(), payments: [], dueDate: toISODate(d) }];

                                            <input type="text" placeholder="Contact/WA" className="bg-slate-50 border rounded-xl p-3 focus:bg-white outline-none" value={formData.contact} onChange={e=>setFormData({...formData, contact:e.target.value})} />
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-xl border flex items-center gap-3"><span className="text-[12px] font-black text-slate-400 uppercase shrink-0">Unit:</span><select className="flex-1 bg-transparent text-indigo-700 outline-none font-black" value={formData.room} onChange={e => { const r = rooms.find(x => x.name === e.target.value); setFormData({...formData, room: e.target.value, property: r ? r.property : properties[0]}); }}>{rooms.map(r => <option key={r.id} value={r.name}>{r.name} ({r.property})</option>)}</select></div>
                                        <div className="grid grid-cols-2 gap-2 font-black">
                                            <div><label className="text-[10px] uppercase ml-2 text-slate-400">In</label><input type="date" required className="w-full bg-slate-50 border rounded-xl p-3" value={formData.start} onChange={e=>setFormData({...formData, start:e.target.value})} /></div>
                                            <div><label className="text-[10px] uppercase ml-2 text-slate-400">Out</label><input type="date" required className="w-full bg-slate-50 border rounded-xl p-3" value={formData.end} onChange={e=>setFormData({...formData, end:e.target.value})} /></div>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-xl border flex justify-between items-center"><div className="flex flex-col"><span className="text-[12px] font-black text-slate-400 uppercase">Rate:</span><input type="number" className="bg-transparent font-black text-[18px] text-indigo-700 outline-none" value={formData.monthlyRate} onChange={e=>setFormData({...formData, monthlyRate: Number(e.target.value)})} /></div><div className="flex items-center gap-2"><span className="text-[12px] font-black text-slate-400 uppercase">Fixed?</span><input type="checkbox" className="w-5 h-5 rounded border-slate-300" checked={formData.isFixedPrice} onChange={e=>setFormData({...formData, isFixedPrice: e.target.checked})} /></div></div>
                                        
                                        <div className="border-t pt-3">
                                            <button type="button" onClick={() => setShowNotesInModal(!showNotesInModal)} className="w-full flex items-center justify-between p-3 bg-slate-100 text-slate-600 rounded-xl active:scale-95 transition-all font-black uppercase text-[15px]">
                                                <div className="flex items-center gap-2 font-black"><Icon name="StickyNote" size={16} /><span>Guest Notes</span></div>
                                                <Icon name={showNotesInModal ? "ChevronUp" : "ChevronDown"} size={20}/>
                                            </button>
                                            {showNotesInModal && <textarea className="w-full mt-2 bg-slate-50 border rounded-xl p-3 font-bold text-[13px] h-32" placeholder="Guest specific stay notes..." value={formData.notes || ''} onChange={e => setFormData({...formData, notes: e.target.value})} />}
                                        </div>

                                        {editingId && <Fragment>
                                            <div className="border-t pt-1 font-black">
                                                <button type="button" onClick={() => setShowLedgerInModal(!showLedgerInModal)} className="w-full flex items-center justify-between p-3 bg-indigo-600 text-white rounded-xl shadow-lg active:scale-95 transition-all font-black uppercase text-[15px]">
                                                    <div className="flex items-center gap-2 font-black"><Icon name="History" size={16} /><span>Ledger & Utilities</span></div>
                                                    <Icon name={showLedgerInModal ? "ChevronUp" : "ChevronDown"} size={20}/>
                                                </button>
                                                {showLedgerInModal && <div className="mt-3 space-y-3 max-h-[400px] overflow-y-auto no-scrollbar pr-1">
                                                    {getPaymentSchedule(formData).map((mon, idx) => ( <div key={idx} className="bg-slate-50 border border-slate-200 rounded-2xl p-3 space-y-3 shadow-sm font-black text-[13px]">
                                                        <div className="flex justify-between items-center uppercase border-b pb-2"><span className="text-indigo-600">{mon.label} {mon.year}</span><span className={mon.owed-mon.paid <= 0 ? 'text-emerald-600' : 'text-rose-600'}>Owed: ฿{(mon.owed-mon.paid).toLocaleString()}</span></div>
                                                        <div className="flex flex-wrap gap-x-4 gap-y-1 text-[10px] text-slate-400 uppercase"><span>Rent: ฿{mon.rent}</span><span className="text-amber-600">Elec: ฿{mon.electricOwed}</span><span className="text-blue-600">Water: ฿{mon.waterOwed}</span>{mon.otherOwed>0 && <span className="text-purple-600">Other: ฿{mon.otherOwed}</span>}</div>
                                                        <div className="flex items-center gap-2 bg-white p-2 rounded-xl border"><Icon name="Zap" size={14} className="text-amber-500" /><input type="number" placeholder="Start" className="w-16 bg-slate-50 rounded px-1.5 py-0.5 text-[12px]" value={mon.util.elecStart} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'elecStart', e.target.value)} /><input type="number" placeholder="End" className="w-16 bg-slate-50 rounded px-1.5 py-0.5 text-[12px]" value={mon.util.elecEnd} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'elecEnd', e.target.value)} /><span className="text-slate-300 font-normal">x</span><input type="number" className="w-12 bg-slate-50 rounded px-1.5 py-0.5 text-[12px]" value={mon.util.elecRate} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'elecRate', e.target.value)} /><span className="ml-auto">฿{mon.electricOwed}</span></div>
                                                        <div className="flex items-center gap-2 bg-white p-2 rounded-xl border"><Icon name="Droplets" size={14} className="text-blue-500" /><input type="number" placeholder="Water" className="w-20 bg-slate-50 rounded px-1.5 py-0.5 text-[12px]" value={mon.util.water} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'water', e.target.value)} /><div className="w-px h-4 bg-slate-100 mx-1" /><input type="number" placeholder="Other" className="w-20 bg-slate-50 rounded px-1.5 py-0.5 text-[12px]" value={mon.util.otherAmt} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'otherAmt', e.target.value)} /><input type="text" placeholder="Note" className="flex-1 bg-slate-50 rounded px-1.5 py-0.5 text-[12px]" value={mon.util.otherNote||''} onChange={e=>updateUtilLocal(editingId, mon.monthIndex, mon.year, 'otherNote', e.target.value)} /></div>
                                                        {(paymentLog[`${editingId}_${mon.monthIndex}_${mon.year}`] || []).map(p => ( <div key={p.id} className="flex gap-2 items-center"><input type="date" className="bg-white border rounded px-1.5 py-0.5 text-[12px] w-24" value={p.date} onChange={e => updatePayLocal(editingId, mon.monthIndex, mon.year, p.id, 'date', e.target.value)} /><input type="number" className="flex-1 bg-white border rounded px-1.5 py-0.5 text-[13px]" value={p.amount} onChange={e => updatePayLocal(editingId, mon.monthIndex, mon.year, p.id, 'amount', e.target.value)} /><button type="button" onClick={() => deletePayLocal(editingId, mon.monthIndex, mon.year, p.id)} className="text-rose-400"><Icon name="Trash" size={14} /></button></div> ))}
                                                        <div className="flex gap-2"><div className="flex-1 relative font-black text-[15px]"><input type="number" id={`pay-${idx}`} className="w-full bg-white border rounded-xl px-3 py-2 outline-none" placeholder="฿ Amount" /><button type="button" onClick={() => { const el = document.getElementById(`pay-${idx}`); if(el) el.value = mon.owed-mon.paid > 0 ? mon.owed-mon.paid : 0; }} className="absolute right-2 top-2 text-[10px] text-indigo-500 uppercase">Fill</button></div><button type="button" onClick={()=>{const el=document.getElementById(`pay-${idx}`); if(el && el.value){ addPayLocal(editingId, mon.monthIndex, mon.year, el.value); if (el) el.value=''; } }} className="bg-slate-900 text-white p-2.5 rounded-xl active:scale-90 transition-all"><Icon name="PlusCircle" size={20}/></button></div>
                                                    </div> ))}
                                                </div>}
                                            </div>
                                        </Fragment>}
                                        <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase text-[15px]">Update Database</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {showBillModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 overflow-y-auto">
                                <div className="bg-white rounded-[2rem] w-full max-w-lg shadow-2xl overflow-hidden my-auto animate-in zoom-in duration-200 font-black">
                                    <div className="p-4 border-b bg-slate-50 flex justify-between items-center font-black"><h2 className="text-[15px] uppercase tracking-widest pl-2">Bill Editor</h2><button onClick={() => setShowBillModal(false)} className="p-2 text-slate-400 hover:text-rose-500"><Icon name="X" size={24}/></button></div>
                                    <form onSubmit={handleBillSave} className="p-4 space-y-3">
                                        <div className="grid grid-cols-2 gap-2 font-black"><select className="bg-slate-50 border rounded-xl p-3 text-[15px]" value={billFormData.category} onChange={e=>setBillFormData({...billFormData, category:e.target.value})}>{BILL_CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.id}</option>)}</select><select className="bg-slate-50 border rounded-xl p-3 text-[15px]" value={billFormData.property} onChange={e=>setBillFormData({...billFormData, property:e.target.value})}>{properties.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                                        <div className="grid grid-cols-2 gap-2"><div><label className="text-[10px] uppercase ml-2 text-slate-400">Due Date</label><input type="date" required className="w-full bg-slate-50 border rounded-xl p-3 text-[15px]" value={billFormData.dueDate} onChange={e=>setBillFormData({...billFormData, dueDate:e.target.value})} /></div><div><label className="text-[10px] uppercase ml-2 text-slate-400">Amount</label><input type="number" required className="w-full bg-slate-50 border rounded-xl p-3 text-[15px]" value={billFormData.amount} onChange={e=>setBillFormData({...billFormData, amount:Number(e.target.value)})} /></div></div>
                                        <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase text-[15px]">Save Record</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {showSettings && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 overflow-y-auto">
                                <div className="bg-white rounded-[2rem] w-full max-w-lg shadow-2xl overflow-hidden my-auto animate-in zoom-in font-black"><div className="p-4 border-b bg-slate-50 flex justify-between items-center font-black"><h2 className="text-[15px] uppercase tracking-widest pl-2">System Config</h2><button onClick={() => setShowSettings(false)} className="p-2 text-slate-400 hover:text-slate-600"><Icon name="X" size={24}/></button></div><div className="p-4 space-y-6 max-h-[70vh] overflow-y-auto pr-2">
                                <section className="space-y-2 font-black"><h3 className="text-[12px] text-slate-400 uppercase tracking-widest border-b pb-1 ml-1">Properties</h3>{properties.map((p, i) => ( <div key={i} className="flex gap-2"><input type="text" className="flex-1 bg-slate-50 border rounded-xl p-3 text-[15px]" value={p} onChange={e => { const n = [...properties]; n[i] = e.target.value; setProperties(n); syncData({properties: n}); }} /><button onClick={() => { if(confirm('Delete?')) { const n = properties.filter((_, idx) => idx !== i); setProperties(n); syncData({properties: n}); } }} className="p-2.5 text-rose-500 hover:bg-rose-50 rounded-xl"><Icon name="Trash" size={18} /></button></div> ))}<button onClick={() => { const n = [...properties, `New Prop`]; setProperties(n); syncData({properties: n}); }} className="w-full py-2.5 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-black text-[12px] uppercase tracking-widest">+ ADD PROPERTY</button></section>
                                <section className="space-y-2 font-black"><h3 className="text-[12px] text-slate-400 uppercase tracking-widest border-b pb-1 ml-1">Units</h3>{rooms.map(r => ( <div key={r.id} className="grid grid-cols-2 gap-2 bg-slate-50 p-3 rounded-2xl border items-center"><div className="flex flex-col"><span className="text-[12px] text-slate-400 uppercase ml-1">ID</span><input type="text" className="bg-white p-1.5 rounded-lg font-black text-[15px] border focus:bg-indigo-50" value={r.name} onChange={e => { const n = rooms.map(x => x.id === r.id ? {...x, name: e.target.value} : x); setRooms(n); syncData({rooms: n}); }} /></div><div className="flex gap-2 items-end"><div className="flex flex-col flex-1"><span className="text-[12px] text-slate-400 uppercase ml-1">Property</span><select className="bg-white p-1.5 rounded-lg text-[12px] border font-black" value={r.property} onChange={e => { const n = rooms.map(x => x.id === r.id ? {...x, property: e.target.value} : x); setRooms(n); syncData({rooms: n}); }}>{properties.map(p => <option key={p} value={p}>{p}</option>)}</select></div><button onClick={() => { if(confirm('Delete?')) { const n = rooms.filter(x => x.id !== r.id); setRooms(n); syncData({rooms: n}); } }} className="p-2 text-rose-400"><Icon name="Trash" size={16} /></button></div></div> ))}<button onClick={() => { const n = [...rooms, { id: `r${Date.now()}`, name: 'NEW', property: (properties[0] || 'Property A') }]; setRooms(n); syncData({rooms: n}); }} className="w-full py-2.5 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-black text-[12px] uppercase tracking-widest">+ ADD UNIT</button></section>
                                </div></div>
                            </div>
                        )}

                        {/* DIAGNOSTIC PANEL */}
                        <div className="fixed bottom-0 inset-x-0 bg-slate-900 text-white text-[10px] p-2 flex gap-4 items-center justify-center border-t border-white/10 z-[200]">
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${dbStatus.auth.includes('Active') ? 'bg-emerald-500' : 'bg-rose-500'}`} /><span className="opacity-50 uppercase">Auth:</span><span>{dbStatus.auth}</span></div>
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${dbStatus.firestore === 'Synced ✓' ? 'bg-emerald-500' : 'bg-rose-500'}`} /><span className="opacity-50 uppercase">App ID:</span><span>{appId}</span></div>
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full bg-indigo-500`} /><span className="opacity-50 uppercase">Account:</span><span>{urlUser}</span></div>
                            <div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full bg-sky-500`} /><span className="opacity-50 uppercase">Project:</span><span>{firebaseConfig.projectId}</span></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
